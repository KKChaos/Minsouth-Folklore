<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闽南民俗知识库</title>
<style>
:root{color-scheme:light;--bg:#F8F4EC;--paper:#FDFAF4;--ink:#2C1810;--mid:#5C4033;--muted:#9C8070;--red:#B83A0E;--rbg:#F5E6DF;--bdr:#E5D9CC;--shad:rgba(44,24,16,.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#1E120A;color:#F8F4EC;padding:0 28px;height:56px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:2px solid #B83A0E}
.logo{font-size:18px;font-weight:700;letter-spacing:3px;color:#F0C040}
.sub{font-size:11px;color:rgba(248,244,236,.4);letter-spacing:1px;margin-top:1px}
.hsp{flex:1}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;font-size:12px;color:rgba(248,244,236,.7)}
.searchbar{background:var(--paper);border-bottom:1px solid var(--bdr);padding:10px 28px;display:flex;gap:10px;align-items:center;flex-shrink:0}
.si{flex:1;max-width:400px;padding:7px 14px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;background:#fff;outline:none;color:var(--ink);transition:border-color .2s}
.si:focus{border-color:var(--red)}
.rc{font-size:12px;color:var(--muted);margin-left:auto}
.main{display:flex;flex:1;overflow:hidden}
aside{width:200px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--bdr);overflow-y:auto;padding:16px 12px}
.fg{margin-bottom:20px}
.fh{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.fc{display:flex;align-items:center;gap:7px;width:100%;padding:5px 8px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:12px;color:var(--mid);text-align:left;transition:background .15s}
.fc:hover{background:var(--bdr)}
.fc.on{background:var(--rbg);color:var(--red);font-weight:600}
.fd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fn{margin-left:auto;font-size:10px;color:var(--muted)}
.fc.on .fn{color:var(--red)}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:12px;color:var(--muted);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:16px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,#9C8070)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shad)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cn{font-size:15px;font-weight:600}
.cp{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px}
.cs{font-size:14px;flex-shrink:0}
.cpill{display:inline-block;font-size:10px;font-weight:600;color:#fff;padding:2px 8px;border-radius:4px;margin-bottom:9px}
.ci{font-size:12px;color:var(--mid);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cm{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.rt{font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--bdr);padding:1px 7px;border-radius:4px}
.cred{font-size:10px;color:var(--muted);margin-top:8px}
.stars{color:#E8A020}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,.35);z-index:200}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:0;width:500px;max-width:100vw;height:100vh;background:#fff;overflow-y:auto;box-shadow:-6px 0 28px rgba(44,24,16,.18);transform:translateX(100%);transition:transform .25s ease}
.overlay.open .drawer{transform:translateX(0)}
.dh{padding:20px 24px 16px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:#fff;z-index:1}
.dx{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--bdr);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.dx:hover{background:var(--bg)}
.dbadges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.bdg{font-size:11px;padding:2px 9px;border-radius:5px;background:var(--bg);border:1px solid var(--bdr);color:var(--mid)}
.bdg.catb{color:#fff;border:none}
.dtitle{font-size:20px;font-weight:700;margin-bottom:3px}
.dpinyin{font-size:13px;color:var(--muted);font-style:italic}
.db{padding:20px 24px}
.ds{margin-bottom:18px}
.dsl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.dst{font-size:13px;color:var(--mid);line-height:1.75;white-space:pre-wrap}
.dtags{display:flex;flex-wrap:wrap;gap:5px}
.dtag{font-size:12px;padding:3px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--bdr);color:var(--mid)}
.divl{height:1px;background:var(--bdr);margin:16px 0}
.nlink{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--red);text-decoration:none}
.nlink:hover{text-decoration:underline}
.stepbox{background:var(--bg);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--mid);line-height:1.75;white-space:pre-wrap}
</style>
</head>
<body>

  <div><div class="logo">闽南民俗知识库</div><div class="sub">Bín-lâm Bîn-sio̍k Ji-su-khòo</div></div>

<div class="main">

      <button class="fc" data-cat="👶 人生礼仪" onclick="setCat(this,'👶 人生礼仪')"><span class="fd" style="background:#D4688A"></span>人生礼仪<span class="fn" id="n2"></span></button>
      <button class="fc" data-cat="🎉 岁时节庆" onclick="setCat(this,'🎉 岁时节庆')"><span class="fd" style="background:#E8A020"></span>岁时节庆<span class="fn" id="n3"></span></button>
      <button class="fc" data-cat="🙏 民间信仰" onclick="setCat(this,'🙏 民间信仰')"><span class="fd" style="background:#9B6BB0"></span>民间信仰<span class="fn" id="n4"></span></button>
      <button class="fc" data-cat="🍜 饮食民俗" onclick="setCat(this,'🍜 饮食民俗')"><span class="fd" style="background:#7BA05B"></span>饮食民俗<span class="fn" id="n5"></span></button>
      <button class="fc" data-cat="🌏 侨乡与海外传播" onclick="setCat(this,'🌏 侨乡与海外传播')"><span class="fd" style="background:#4A8DB8"></span>侨乡传播<span class="fn" id="n6"></span></button>
      <button class="fc" data-cat="🏡 传统建筑与工艺" onclick="setCat(this,'🏡 传统建筑与工艺')"><span class="fd" style="background:#8B6914"></span>建筑工艺<span class="fn" id="n7"></span></button>

    <div class="fg">

    </div>
    <div class="fg">
      <div class="fh">适用地区</div>
      <button class="fc on" data-rg="" onclick="setRg(this,'')">🌐 全部地区</button>
      <button class="fc" data-rg="泉州" onclick="setRg(this,'泉州')">泉州</button>
      <button class="fc" data-rg="漳州" onclick="setRg(this,'漳州')">漳州</button>
      <button class="fc" data-rg="厦门" onclick="setRg(this,'厦门')">厦门</button>
      <button class="fc" data-rg="金门" onclick="setRg(this,'金门')">金门</button>
      <button class="fc" data-rg="台湾" onclick="setRg(this,'台湾')">台湾</button>

      <button class="fc" data-rg="东南亚闽南社群" onclick="setRg(this,'东南亚闽南社群')">东南亚</button>
    </div>
  </aside>
  <div class="content">
    <div id="grid" class="grid"><div class="loading">正在初始化…</div></div>
  </div>
</div>
<div class="overlay" id="ov" onclick="maybeClose(event)">
  <div class="drawer" id="dr">
    <div class="dh">
      <button class="dx" onclick="closeDrawer()">✕</button>
      <div class="dbadges" id="dbdg"></div>
