吃元宵汤圆，向天官祈求全年赐福。\n2. 中元节（七月十五）地官赦罪：普渡仪式（详见「普渡」条目），由地官主持赦免亡魂罪过。\n3. 下元节（十月十五）水官解厄：相对低调，部分庙宇举行消灾解厄祭典。\n4. 三元日各地庙宇均设供桌，信众携三牲五果祭拜，焚化适量金纸。\n5. 诵经：道士诵读相关经典，为信众消灾赐福解厄。", "taboo": "祭拜三官大帝时金纸须按等级使用「天公金」（不可以普通金纸代替）；三元节正日不可说不吉利的话；中元节地官赦罪日，忌讳杀生（部分虔诚信众茹素一日）。", "story": "三官信仰源自中国古代天、地、水三才崇拜，经道教系统化后形成「三官大帝」神格。闽南地区的三官信仰与岁时节令密切结合——正月十五上元节结合元宵灯会，是民间新年庆典的最终高潮；七月十五中元节结合普渡，规模最大；十月十五下元节最为低调。正月十五「天官赐福」在闽南被认为是比春节更适合祈求全年平安的时机，庙宇香火极旺。", "diff": "泉州：天后宫等大庙均设三官殿，三元节祭典隆重；漳州：类似泉州，三官信仰普及；台湾：三官大帝庙（「三界公庙」）遍布各地，上元节灯会传统旺盛；新加坡、马来西亚：闽籍华人区有三官大帝庙，中元节（盂兰盛会）规模尤盛。", "url": ""}, {"n": "玄天上帝（上帝公）信仰", "py": "Hiân-thian Siōng-tè (Siōng-tè-kong) sìn-gióng", "c": "🙏 民间信仰", "sc": "北极武神", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历三月初三（玄天上帝诞）", "intro": "玄天上帝（俗称上帝公、真武大帝）是闽南重要的武神，为道教北极四圣之首，形象为披发跣足、踩龟蛇的黑面大神，主司驱邪镇煞，在台湾信众规模庞大，台南北极殿为重要信仰中心。", "items": "三牲（猪、鸡、鱼）、五果、发糕、香烛、金纸；武器模型（剑、方天画戟，纸扎）", "steps": "1. 农历三月初三，庙宇举行大型祭典，供奉三牲五果。2. 信众参拜，祈求身体健康、驱邪避凶。3. 举行绕境巡安，玄天上帝神轿出巡，阵头随行。4. 武馆、练武者特别重视此日，在此日学习或演练武艺以求庇佑。5. 庙宇多设有签筒，信众求签问卜。", "taboo": "进庙须着整洁衣物（不可穿拖鞋）；玄天上帝黑面，庙内不可摆放白花（丧色）；乩童降旨期间旁观者不可嘻笑。", "story": "玄天上帝信仰源于道教星宿崇拜（北方玄武），宋代真宗朝因避讳改称「真武」。明成祖朱棣靖难成功后，尊真武为护国神，武当山成为信仰中心。台南北极殿为台湾最古老、最重要的玄天上帝庙，俗称「大上帝庙」。", "diff": "泉州：玄天上帝信仰以武馆、南拳练武者为核心信众群；漳州：部分大庙主祠；台湾：信众规模庞大，台南北极殿为首，屏东、新北等地均有大型庙宇；新加坡：牛车水天福宫等地有供奉玄天上帝。", "url": "https://app.notion.com/p/3731313e55f3812790fcf1db7be9bc40"}, {"n": "清明培墓", "py": "Tshing-bîng puê-bōng", "c": "🎉 岁时节庆", "sc": "扫墓祭祖 / 春祭", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "清明节前后（阳历四月四或五日）", "intro": "闽南称扫墓为「培墓」，意指为祖先的墓地整修培土。清明当日，家族成员携带供品、纸钱、润饼（春卷）前往祭祖。祭拜完毕，全家在墓地附近分食润饼，是闽南清明最具特色的习俗之一。扫墓后压在墓碑上的「墓纸」（长条彩色纸），代表后代子孙已来祭扫。", "items": "牲礼（鸡、猪肉或三牲）、五果、清茶、米酒、线香、蜡烛、金纸银纸、炮竹、墓纸（彩色长条纸）、小石头、锄头、锄帚、新土、润饼食材", "steps": "1. 选日：闽南清明扫墓通常在清明前后十天内择日，避免在清明后扫墓（俗称「晚墓」，不吉）。\n2. 备供品：准备牲礼（鸡、猪肉或三牲）、五果、清茶、米酒、线香、蜡烛、金纸银纸、炮竹、墓纸（彩色长条纸）、润饼食材。\n3. 到墓地整修：抵达后先清除墓碑周围杂草，修整墓地土堆，添加新土，象征「培墓」。\n4. 祭拜后土：先在墓地右前方祭拜土地公，上香、献供、烧银纸，请求土地神继续守护先人。\n5. 祭拜祖先：移至墓碑前正式祭拜，上香、献供品、倒酒三巡，子孙依序上香。\n6. 压墓纸：将彩色长条墓纸压在墓碑顶端，以小石头固定，象征后代子孙已前来祭扫。\n7. 燃烧金银纸：分别焚烧给祖先（银纸）与后土（土地公金），鸣放炮竹。\n8. 分食润饼：在墓地旁空地，家人共同包润饼食用，象征与祖先共享一顿饭，也是家族团聚的时刻。\n9. 离开：离开前向祖先道别，不可在墓地边走边回头张望。", "taboo": "孕妇与婴幼儿不宜到墓地（阴气重）；扫墓时不能喧闹或说不吉利的话；不能踩踏其他家族墓地；回家前要洗手换衣，不将墓地气场带入家门。", "story": "闽南清明「培墓」（扫墓）源于儒家慎终追远的孝道观念，与汉族共同的清明节习俗相通，但闽南特色在于以「润饼」作为扫墓专用食物，并有完整的「培土、添草、挂纸钱」仪式程序。", "diff": "台湾闽南人清明培墓仪式较完整保留，且润饼习俗至今普遍；福建闽南本地因现代化影响，润饼习俗逐渐简化；海外闽侨社群多保留象征性的扫墓习惯。", "url": "https://app.notion.com/p/3681313e55f3801386f1e8604c9cfe7d"}]);
DATA = DATA.concat([{"n": "保生大帝信仰", "py": "Pó-sing Tāi-tè sìn-îng", "c": "🙏 民间信仰", "sc": "医神信仰 / 闽台连结", "lv": "L2 次区域俗", "rg": ["泉州", "漳州", "厦门", "台湾", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "农历三月十五保生大帝圣诞", "intro": "保生大帝本名吴本（音「滄」），北宋福建同安人，生前为精通医术的民间医师，逝后被神格化为医神，主治病痛。闽南最重要的两座祖庙为漳州龙海的白礁慈济宫与厦门海沧的青礁慈济宫。台湾台南学甲慈济宫以每年农历三月的「上白礁谒祖刈火」仪式闻名，是台湾保生大帝信仰最重要的集体盛典。", "items": "鲜花、水果、三牲、五果、寿面、金纸、香烛、香炉、供桌、药签与抽签筒、药草（药草园采集用）、香袋、进香香火袋", "steps": "1. 求药签：生病或身体不适者前往保生大帝庙，上香禀告姓名、病情，掷筊请示后抽取药签，依药签上的药方至中药行抓药服用（现代多已不施行，但仍保留象征性做法）。\n2. 圣诞祭典：农历三月十五，庙方举行盛大祭典，备三牲五果、寿面（因保生大帝为医神，寿面象征健康长寿），演戏酬神。\n3. 药草园参拜：部分庙宇（如台南学甲慈济宫）设有药草园，信众在圣诞日可至药草园采取辟邪植物带回。\n4. 上白礁谒祖（台湾特有）：台南学甲慈济宫每年农历三月十一日举行「上白礁谒祖刈火」，信众乘船前往海边远祭对岸的漳州白礁慈济宫祖庙，是闽台连结最感人的仪式之一。\n5. 治病祈福：信众为家中病患向保生大帝祈求痊愈，可在庙中过火（让病患的衣物或替身过香炉火）或请道士至家中安符。\n6. 还愿演戏：祈愿实现后还愿，规格最高者为「做醮」或「演大戏」酬谢神明。", "taboo": "求药签后必照签服药，不能擅改；药方不能转让他人；庙中不能吵闹喧哗；祭品不能在祭拜完成前食用。", "story": "保生大帝（吴本）为北宋福建漳州龙海人，精通医术，死后被尊为医神。闽南人移民各地时将保生大帝信仰带出，在台湾、东南亚建立了大量「大道公庙」。", "diff": "台湾台南学甲慈济宫和台北大龙峒保安宫为保生大帝信仰重镇；福建漳州白礁慈济宫为祖庙；新加坡、马来西亚亦有多座保生大帝庙。", "url": "https://app.notion.com/p/3681313e55f380a19240f7a443cdd1bc"}, {"n": "注生娘娘信仰", "py": "Tsù-sing-niû-niû sìn-gióng", "c": "🙏 民间信仰", "sc": "生育守护神信仰", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历三月二十（注生娘娘诞辰）；求子、怀孕、生产时随时可拜", "intro": "注生娘娘（又称「临水夫人」、「陈靖姑」）是闽南民间信仰中掌管生育、护佑孕产妇与婴儿的女神，在闽南及台湾与妈祖地位并列，是最重要的女性保护神之一。信众祈求注生娘娘赐子、保胎、护产，婚后未育或孕期中的妇女尤为虔诚祭拜。", "items": "花（鲜花或纸花，象征「花开结果」即求子）；胭脂水粉（化妆品，供奉给女神）；红汤圆；婴儿鞋（求子时带来，得子后还愿带来成双婴儿鞋）；香烛", "steps": "1. 祭拜时机：婚后求子、怀孕保胎、产前祈安、产后还愿，均可至注生娘娘庙参拜。\n2. 献花：向注生娘娘献上鲜花，求赐子嗣（「花」谐音「化」，意为孕育生命）。\n3. 献胭脂：供奉胭脂水粉，因注生娘娘为女神，信众以女性用品表达心意。\n4. 祈求：在神前诉说心愿（求子、保胎平安），请神明赐福。\n5. 取花：信众将供奉的花取回插于发间，象征得到神明赐予的生育之气。\n6. 还愿：求子成功生产后，须返庙还愿，献上婴儿鞋、油饭等礼物答谢神明。", "taboo": "怀孕妇女拜注生娘娘须避免踩踏庙前香炉（不吉利）；不可以剩余食物献神；还愿时须如实履行（不可食言）。", "story": "注生娘娘的神格来源有两说：一说来源于「陈靖姑」（唐代福建女神），是真实历史人物神化而来，擅长降妖护产；另一说注生娘娘为与泰山娘娘同类的生育女神，掌管生育簿册（「注生」即在生育记录册上注册）。闽南人认为每个人的出生都是注生娘娘赐予的，因此对其十分崇敬。台湾各地注生娘娘庙香火鼎盛，每年三月诞辰时进香人潮众多。", "diff": "泉州、漳州：注生娘娘与妈祖、观音并列为三大重要女神；台湾：注生娘娘庙普及全台，求子信仰保存完整；新加坡、马来西亚：闽籍华人区有注生娘娘庙，但香火规模较台湾小；现代：生育率下降的社会背景下，注生娘娘庙转型兼顾「祈求顺产」及「求好孕」功能。", "url": ""}, {"n": "妈祖信俗", "py": "Má-tsóo sìn-sio̍k", "c": "🙏 民间信仰", "sc": "海神信仰 / 联合国非遗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾", "东南亚闽南社群", "全球闽南社群"], "st": "🟢 已验证", "cr": "★★★★★ 联合国非遗登录", "tm": "农历三月二十三妈祖圣诞", "intro": "妈祖是闽南最重要的海神，本名林默，相传为宋代莆田湄洲人，因能预知天气、救护海难而被神格化，历代皇帝多次加封，最终成为「天上圣母」。妈祖信俗在2009年列入联合国非物质文化遗产。每逢圣诞，各庙举行绕境、进香、演戏等活动。", "items": "鲜花、水果、三牲或五牲、妈祖衣（纸扎）、金纸、香炉、香烛、供桌、炮竹、神轿或神车（绕境）、香火袋、报马仔、妈祖旗、戏班", "steps": "1. 提前备办：圣诞前数日，各家准备鲜花、水果、牲礼、妈祖衣（纸扎）、金纸。\n2. 圣诞前夜「暝」：庙宇举行隆重祭典，演戏酬神，信众通宵守护称「守暝」。\n3. 圣诞当日祭拜：上午由庙方主持大祭典，上香、献花、献果、献牲、读祭文、行三献礼。\n4. 绕境（代香）：妈祖金身请出庙宇置于神轿，由信众扳轿绕境，信众在自家门口摆香案跪拜。\n5. 钻轿底：神轿经过时，信众从轿下钻过，称「钻轿底」，祈求消灾解厄。\n6. 进香谒祖：各分炉庙宇组织进香团，前往湄洲妈祖祖庙谒祖刈火。\n7. 还愿：信众若有心愿实现，需回庙上香还愿。", "taboo": "进庙不踩门槛；绕境队伍行进中不越过神轿；在庙中不能吵架；庙中不能拍神明金身背面。", "story": "妈祖（林默）生于宋代福建莆田湄洲岛，相传能预知海上风浪，死后成为护佑海上航行的神明。闽南沿海渔民、商人将妈祖信仰带至各地，形成跨越中国大陆、台湾、东南亚的广大信仰圈。2009年列入联合国非物质文化遗产。", "diff": "台湾妈祖信仰极为盛行，大甲妈祖绕境是世界级宗教活动；闽南泉漳厦各地均有妈祖庙；东南亚闽南社群也广建天后宫；各地妈祖神像的造型与封号略有差异。", "url": "https://app.notion.com/p/3681313e55f380fb966bf7d77f98867f"}, {"n": "端午扒龙船", "py": "Toan-ngóʔ pê liông-chûn", "c": "🎉 岁时节庆", "sc": "端午竞技", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "农历五月初五", "intro": "闽南端午节最重要的民俗活动之一，各地举行龙舟竞渡（俗称「扒龙船」），鼓声震天，气氛热烈，兼具纪念屈原和祈福驱邪双重含义。泉州晋江、漳州龙海等地均有百年以上龙舟传统。厦门同安龙舟节规模宏大，台湾各县市均举办国际龙舟邀请赛。", "items": "龙船（包括龙头、龙尾）、船桨、锣鼓、彩旗、参赛队服", "steps": "1. 农历四月末，各村社修整或新造龙船，龙船须经开光仪式。\n2. 端午当日，参赛队伍着统一服装，各执船桨列队待发。\n3. 锣鼓响起，龙船竞发，鼓手擂鼓指挥节奏，划手齐力划桨。\n4. 比赛结束后，龙船送回龙船厂（专用存放屋），俗称「送龙」。\n5. 竞渡后，村社备酒席犒赏参赛者。", "taboo": "龙头开光前不可随意触碰；女性传统上不可上龙船（部分地区已开放）；比赛中不可嚷「翻」字（翻船之意）；龙船入水须鸣炮告知水神。", "story": "龙舟竞渡起源可追溯至先秦时代的祭龙仪式，后与纪念屈原的习俗合流。闽南沿海地区因水网发达，龙舟竞渡历史悠久。", "diff": "泉州晋江：龙舟形制修长，强调速度；漳州龙海：保留「游江」传统，龙船绕境各村宫庙；台湾：各县市均举办国际龙舟邀请赛；新加坡：龙舟赛为华人社区年度盛事。", "url": "https://app.notion.com/p/3731313e55f381ffaba1c22bf4d564aa"}, {"n": "嗦啰嗹", "py": "Sô-lô-liân", "c": 田都元帅，不可省略；演员在后台不可对神像做不雅动作；螃蟹供品不可用人造品替代；正式公演中台词出错须向神像致歉。", "story": "田都元帅信仰主要流行于闽南戏曲圈，梨园戏班和南管馆阁普遍供奉。神话中他被遗弃田间时，青蛙为他遮雨，螃蟹以双螯撑开水分喂口哺育，故神像眉目间常见小螃蟹图案。台南市新化区有全台最大的田都元帅庙——都元帅庙，也是戏剧艺人的信仰中心。", "diff": "泉州：梨园戏班和南管馆阁普遍供奉；漳州：芗剧（歌仔戏）团体供奉；台湾：歌仔戏班、布袋戏班均供奉，台南都元帅庙为信仰核心；新加坡、马来西亚：华人戏班保留此信仰。", "url": "https://app.notion.com/p/3731313e55f381d1a339c8f2a32b71e1"}, {"n": "太子爷（哪吒三太子）信仰", "py": "Thài-tsú-ia (Nô-tsiah Sam-thài-tsú) sìn-gióng", "c": "🙏 民间信仰", "sc": "保护神", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历九月初九（太子爷诞）", "intro": "太子爷即哪吒三太子，闽南民间信仰中的勇猛护法神，形象为手持乾坤圈与火尖枪的少年战神，在闽南和台湾拥有庞大信众，尤其受青年族群和驾驶人喜爱。", "items": "麻粩（米酥）、糖果饼干（儿童零食）、乾坤圈模型（纸扎）、香烛、金纸", "steps": "1. 农历九月初九，庙宇举行祭典，供奉麻粩、糖果等儿童食物。2. 信众携子女参拜，祈求孩童健康平安。3. 部分庙宇举行钻轿脚仪式，让孩童从神轿下钻过以求庇佑。4. 举行踩街游行，太子爷神轿出巡，乩童随行起乩。5. 台湾特有习俗：信众驾摩托车列队跟随神轿游行。", "taboo": "太子爷神像前不可摆放猪肉（太子爷杀猪记仇）；许愿须许鲜花素果，不可许荤腥；出巡时女性月事期间应回避神轿。", "story": "哪吒出自《封神演义》，为道教护法神。在闽台民间信仰中，哪吒（太子爷）被独立神格化，获得大量崇拜。台湾新北市土城区的土城太子爷庙为全台最大。", "diff": "泉州、漳州：太子爷信仰规模小于台湾；台湾：太子爷信仰极为普及，年轻族群、机车骑士特别虔诚，庙宇近于200座；新加坡：登路太子庙为本地知名华人庙宇；马来西亚：吉隆坡及槟城均有太子庙。", "url": "https://app.notion.com/p/3731313e55f3814daf70e7c555c8e37a"}, {"n": "冬至搓圆", "py": "Tang-tsì tshò-înn", "c": "🎉 岁时节庆", "sc": "冬至团圆 / 祈丁黏圆", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "冬至（阳历十二月二十一或二十二日）", "intro": "闽南冬至的核心习俗是全家一起揉汤圆，称为「搓圆」。糯米粉加水揉成面团，搓成大小不一的圆球，红白两色，煮熟后先祭祖神，再全家食用。闽南俗语说「冬至圆，食了添一岁」，意指吃了冬至汤圆便算长了一岁。搓圆也有「添丁」的象征：搓完后故意留几颗黏在门框、灶台、猪圈、牛舍等处，祈求人丁兴旺、六畜平安。", "items": "糯米粉、温水、食用红色素或红麦粉、生姜、红糖或片糖、锅、碗筷、香烛、供桌（祭祖用）", "steps": "1. 备料：糯米粉、温水、食用红色素（或红麦粉）。比例约糯米粉1杯：温水0.4杯。备一锅清水或姜汤（加片糖或红糖）作为汤底。\n2. 揉面团：将糯米粉与温水混合，揉成不黏手的光滑面团。取三分之一面团加入红色素揉匀，制成红色面团；其余为白色。\n3. 全家一起搓：这是冬至最重要的环节。家中大小（包括孩子）围坐一起搓汤圆，大人搓大圆、孩子搓小圆，象征圆满团聚。搓圆时不可说不吉利的话，要说「搓圆仔好」「大细粒，卡好命」等吉祥话。\n4. 留「鸡母狗仔」：另外捏些动物形状的小糯米团（鸡、狗、猪、牛等，闽南语称「鸡母狗仔」），代表六畜兴旺。\n5. 黏贴祈福：搓好的汤圆先不全部下锅，取几颗（通常红色）分别黏贴在门框、灶台、水缸、农具等处，祈求人丁旺盛、六畜平安、农事顺利。\n6. 煮汤圆：烧开姜汤（加红糖或片糖），下入汤圆，待浮起后再煮约一分钟即可起锅。\n7. 祭祖神：汤圆煮好后先盛碗供奉神明与祖先，上香禀告，再由家人食用。\n8. 全家食用：每人至少吃一颗，闽南俗语「吃圆添一岁」，象征平安增寿。", "taboo": "搓圆时不能说「没了」「完了」；煮汤圆不能频繁开锅盖；祭祖前全家不能先吃。", "story": "冬至搓圆源于闽南「冬至大过年」的观念，认为冬至是一年阴阳转换的重要时刻，全家搓汤圆象征团圆圆满。搓好的汤圆要黏在门框、家具上，称「黏圆」，代表家宅平安。", "diff": "泉州地区汤圆以无馅红白小圆为主；台湾闽南习俗与泉州相近，也有包馅汤圆；漳州部分地区以「菜包」替代汤圆；海外闽南社群多保留搓圆传统。", "url": "https://app.notion.com/p/3681313e55f3802a90e2e7debb64e370"}, {"n": "姜母鸭", "py": "Kiunn-bó-ah", "c": "🍜 饮食民俗", "sc": "药膳滋补食俗", "lv": "L2 特定地区俗", "rg": ["泉州", "漳州", "厦门", "台湾"], "st": "🟢 已验证", "cr": "★★ 在地媒体与机构网站", "tm": "冬至前后（农历十月至十二月滋补季）；立冬", "intro": "姜母鸭（闽南语：kiunn-bó-ah）是以老姜（「姜母」即老姜）、麻油与番鸭（菜鸭）为主料慢炖而成的闽南冬季药膳，具有驱寒暖身、补气活血的功效。在台湾已发展为冬季最受欢迎的滋补火锅之一，街头姜母鸭专卖店冬季座无虚席。在闽南本地，姜母鸭是冬至家庭进补的传统食俗。", "items": "番鸭（菜鸭）一只（约2至3公斤）；老姜（姜母）大量（约300克以上）；黑麻油（胡麻油）；米酒（高粱酒或米酒头）；当归、川芎、熟地等中药材；盐、酱油", "steps": "1. 备料：番鸭洗净切块；老姜不去皮，洗净拍扁或切片（带皮更香）。\n2. 爆姜：冷锅倒入大量黑麻油，放入老姜中小火慢炒，至姜片边缘微焦（「爆姜」是关键步骤，去腥增香）。\n3. 炒鸭：将鸭块下锅，大火翻炒至表面变色、油脂逼出。\n4. 加酒：沿锅边倒入大量米酒（酒量与鸭肉相当，几乎无水加入），大火烧去酒精。\n5. 加药材：放入当归等中药材，加少量盐调味。\n6. 慢炖：转小火加盖慢炖40至60分钟至鸭肉软嫩、汤汁浓郁。\n7. 上桌：以砂锅或铸铁锅上桌保温，可涮入高丽菜、冻豆腐、冬粉等配料食用。", "taboo": "哺乳期妇女忌大量食用（麻油与米酒过热，体质燥热者须谨慎）；感冒发烧者不宜食用（药性偏热）；姜母鸭以番鸭为佳，不可以肉鸭代替（肉鸭脂肪过多、腥味重）。", "story": "「姜母」是老姜的闽南俗称，指已生长超过一年、纤维粗老的老姜，药性比嫩姜强烈，驱寒效果最佳。闽南人冬至进补的传统与中医「冬令进补」理念契合，而麻油、老姜、米酒的组合在中医中被认为是「温补」的黄金搭档。姜母鸭在台湾商业化发展极为成功，从家庭料理演变为连锁专卖店，成为台湾饮食文化的代表之一，并随台湾移民传播至日本、东南亚。厦门、泉州一带仍保留冬至家庭煮姜母鸭进补的传统，但规模不及台湾商业化程度高。", "diff": "闽南本地（泉州、漳州、厦门）：姜母鸭以家庭自制为主，冬至进补传统；台湾：已高度商业化，姜母鸭专卖店（如「羊城姜母鸭」等连锁品牌）冬季经营火爆，是台湾最具代表性的冬令进补美食之一。", "url": ""}]);

let activeCat='', activeSt='', activeRg='', filtered=[];

function updateCounts(){
  const cats=[
    ['na',''],
    ['n1','🏠 宗族与日常礼节'],['n2','👶 人生礼仪'],['n3','🎉 岁时节庆'],
    ['n4','🙏 民间信仰'],['n5','🍜 饮食民俗'],['n6','🌏 侨乡与海外传播'],
    ['n7','🏡 传统建筑与工艺'],['n8','🎭 戏曲与口传文艺']
  ];
  cats.forEach(([id,cat])=>{
    const el=document.getElementById(id);
    if(!el)return;
    const n=cat?DATA.filter(e=>e.c===cat).length:DATA.length;
    el.textContent=' '+n;
  });
}
function setCat(btn,cat){
  activeCat=cat;
  document.querySelectorAll('.fc[data-cat]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}
function setSt(btn,st){
  activeSt=st;
  document.querySelectorAll('.fc[data-st]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}
function setRg(btn,rg){
  activeRg=rg;
  document.querySelectorAll('.fc[data-rg]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('sq')||{value:''}).value.toLowerCase();
  filtered=DATA.filter(e=>{
    if(activeCat&&e.c!==activeCat)return false;
    if(activeSt&&e.st!==activeSt)return false;
    if(activeRg&&!(e.rg||[]).includes(activeRg))return false;
    if(q&&!(e.n+' '+(e.intro||'')).toLowerCase().includes(q))return false;
    return true;
  });
  const rc=document.getElementById('rc');
  if(rc)rc.textContent='显示 '+filtered.length+' / '+DATA.length+' 条';
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');
  if(!g)return;
  if(!filtered.length){g.innerHTML='<div class="empty">无匹配条目</div>';return;}
  g.innerHTML=filtered.map((e,i)=>{
    const cc=CC[e.c]||'#9C8070';
    const rgs=(e.rg||[]).slice(0,3).map(r=>'<span class="rt">'+r+'</span>').join('');
    const tm=e.tm?'<div class="cred">🕐 '+e.tm.split('（')[0].split('；')[0]+'</div>':'';
    return '<div class="card" style="--cc:'+cc+'" onclick="openDrawer('+i+')">'
      +'<div class="ct"><div><div class="cn">'+e.n+'</div>'+(e.py?'<div class="cp">'+e.py+'</div>':'')+'</div>'
      +'<div class="cs">'+e.c.split(' ')[0]+'</div></div>'
      +'<span class="cpill" style="background:'+cc+'">'+e.sc+'</span>'
      +'<div class="ci">'+(e.intro||'')+'</div>'
      +'<div class="cm">'+rgs+'</div>'
      +tm
      +'</div>';
  }).join('');
}

function openDrawer(idx){
  const e=filtered[idx];
  if(!e)return;
  const cc=CC[e.c]||'#9C8070';
  const bdg=document.getElementById('dbdg');
  const cred=(e.cr||'').replace(/★/g,'<span class="stars">★</span>');
  bdg.innerHTML='<span class="bdg catb" style="background:'+cc+'">'+e.c+'</span>'
    +'<span class="bdg">'+e.sc+'</span>'
    +(e.lv?'<span class="bdg">'+e.lv+'</span>':'')
    +(e.st?'<span class="bdg">'+e.st+'</span>':'');
  document.getElementById('dtit').textContent=e.n;
  document.getElementById('dpy').textContent=e.py||'';
  const rows=[
    ['时间/时节',e.tm],
    ['适用地区',(e.rg||[]).join('、')],
    ['简介',e.intro],
    ['所需物品',e.items],
    ['操作步骤',e.steps,true],
    ['禁忌',e.taboo],
    ['背后故事',e.story],
    ['地域差异',e.diff],
    ['可信度/来源',cred],
  ];
  let html='';
  rows.forEach(([label,val,isStep])=>{
    if(!val)return;
    html+='<div class="ds"><div class="dsl">'+label+'</div>';
    if(isStep)html+='<div class="stepbox">'+val+'</div>';
    else html+='<div class="dst">'+val+'</div>';
    html+='</div>';
  });
  if(e.url)html+='<div class="divl"></div><a class="nlink" href="'+e.url+'" target="_blank">📎 在 Notion 中查看</a>';
  document.getElementById('dbody').innerHTML=html;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDrawer(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

function maybeClose(e){
  if(e.target===document.getElementById('ov'))closeDrawer();
}

document.getElementById('pill').textContent='共 '+DATA.length+' 条民俗';
updateCounts();
applyFilters();

</script>
