<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闽南民俗知识库</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background: #F8F4EC;
  color: #2C1810;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  background: #1E120A;
  color: #F8F4EC;
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  border-bottom: 2px solid #B83A0E;
}
.logo-text { font-size: 18px; font-weight: 700; letter-spacing: 3px; color: #F0C040; }
.logo-sub  { font-size: 11px; color: rgba(248,244,236,0.4); letter-spacing: 1px; margin-top: 2px; }
.hsp { flex: 1; }
.stat-pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 4px 14px;
  font-size: 12px; color: rgba(248,244,236,0.7);
}
.reload-btn {
  background: none; border: 1px solid rgba(255,255,255,0.2);
  color: rgba(248,244,236,0.6); border-radius: 6px;
  padding: 4px 10px; font-size: 12px; cursor: pointer;
}
.reload-btn:hover { background: rgba(255,255,255,0.1); color: #F8F4EC; }

/* Search bar */
.search-bar {
  background: #FDFAF4;
  border-bottom: 1px solid #E5D9CC;
  padding: 10px 28px;
  display: flex; gap: 10px; align-items: center;
}
.search-input {
  flex: 1; max-width: 400px;
  padding: 7px 14px;
  border: 1.5px solid #E5D9CC; border-radius: 8px;
  font-size: 13px; background: white; outline: none;
  color: #2C1810; transition: border-color .2s;
}
.search-input:focus { border-color: #B83A0E; }
.rc { font-size: 12px; color: #9C8070; margin-left: auto; }

/* Layout */
.main { display: flex; flex: 1; min-height: 0; }

/* Sidebar */
aside {
  width: 200px; flex-shrink: 0;
  background: #FDFAF4;
  border-right: 1px solid #E5D9CC;
  overflow-y: auto; padding: 16px 12px;
}
.fg { margin-bottom: 20px; }
.fh {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  color: #9C8070; text-transform: uppercase;
  padding: 0 6px; margin-bottom: 6px;
}
.fc {
  display: flex; align-items: center; gap: 7px;
  width: 100%; padding: 5px 8px;
  border: none; background: none;
  border-radius: 6px; cursor: pointer;
  font-size: 12px; color: #5C4033;
  text-align: left; transition: background .15s;
}
.fc:hover { background: #E5D9CC; }
.fc.on { background: #F5E6DF; color: #B83A0E; font-weight: 600; }
.fd { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.fn { margin-left: auto; font-size: 10px; color: #9C8070; }
.fc.on .fn { color: #B83A0E; }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* Loading */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px; gap: 12px; color: #9C8070;
}
.spinner {
  width: 28px; height: 28px;
  border: 3px solid #E5D9CC; border-top-color: #B83A0E;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.card {
  background: white; border: 1px solid #E5D9CC;
  border-radius: 10px; padding: 16px;
  cursor: pointer; transition: transform .18s, box-shadow .18s;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--cc, #9C8070);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44,24,16,.07); }
.ct { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.cn { font-size: 15px; font-weight: 600; }
.cp { font-size: 10px; color: #9C8070; font-style: italic; margin-top: 2px; }
.cs { font-size: 14px; flex-shrink: 0; }
.cpill {
  display: inline-block; font-size: 10px; font-weight: 600;
  color: white; padding: 2px 8px; border-radius: 4px; margin-bottom: 9px;
}
.ci {
  font-size: 12px; color: #5C4033; line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.cm { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.rt {
  font-size: 10px; color: #9C8070; background: #F8F4EC;
  border: 1px solid #E5D9CC; padding: 1px 7px; border-radius: 4px;
}
.cred { font-size: 10px; color: #9C8070; margin-top: 8px; }
.stars { color: #E8A020; }
.empty { text-align: center; padding: 60px; color: #9C8070; font-size: 14px; }

/* Drawer */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(44,24,16,.35); z-index: 200;
}
.overlay.open { display: block; }
.drawer {
  position: fixed; top: 0; right: 0;
  width: 500px; max-width: 100vw; height: 100vh;
  background: white; overflow-y: auto;
  box-shadow: -6px 0 28px rgba(44,24,16,.18);
  transform: translateX(100%);
  transition: transform .25s ease;
}
.overlay.open .drawer { transform: translateX(0); }
.dh {
  padding: 20px 24px 16px;
  border-bottom: 1px solid #E5D9CC;
  position: sticky; top: 0; background: white; z-index: 1;
}
.dx {
  position: absolute; top: 16px; right: 16px;
  background: none; border: 1px solid #E5D9CC;
  border-radius: 6px; width: 28px; height: 28px;
  cursor: pointer; font-size: 14px; color: #9C8070;
  display: flex; align-items: center; justify-content: center;
}
.dx:hover { background: #F8F4EC; }
.dbadges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.badge {
  font-size: 11px; padding: 2px 9px; border-radius: 5px;
  background: #F8F4EC; border: 1px solid #E5D9CC; color: #5C4033;
}
.badge.catb { color: white; border: none; }
.dtitle { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
.dpinyin { font-size: 13px; color: #9C8070; font-style: italic; }
.db { padding: 20px 24px; }
.ds { margin-bottom: 18px; }
.dsl {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: #9C8070; margin-bottom: 6px;
}
.dst { font-size: 13px; color: #5C4033; line-height: 1.75; white-space: pre-wrap; }
.dtags { display: flex; flex-wrap: wrap; gap: 5px; }
.dtag { font-size: 12px; padding: 3px 10px; border-radius: 6px; background: #F8F4EC; border: 1px solid #E5D9CC; color: #5C4033; }
.div { height: 1px; background: #E5D9CC; margin: 16px 0; }
.nlink { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #B83A0E; text-decoration: none; }
.nlink:hover { text-decoration: underline; }
.stepbox { background: #F8F4EC; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #5C4033; line-height: 1.75; white-space: pre-wrap; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">闽南民俗知识库</div>
    <div class="logo-sub">Bín-lâm Bîn-sio̍k Ji-su-khòo</div>
  </div>
  <div class="hsp"></div>
  <div class="stat-pill" id="statPill">载入中…</div>
  <button class="reload-btn" onclick="loadData()">↻ 刷新</button>
</header>

<div class="search-bar">
  <input class="search-input" id="searchQ" type="text" placeholder="搜索条目名称、介绍…" oninput="applyFilters()">
  <div class="rc" id="rc"></div>
</div>

<div class="main">
  <aside>
    <div class="fg">
      <div class="fh">大类</div>
      <button class="fc on" data-cat="" onclick="setCat(this,'')">
        <span class="fd" style="background:#9C8070"></span>全部<span class="fn" id="na"></span>
      </button>
      <button class="fc" data-cat="🏠 宗族与日常礼节" onclick="setCat(this,'🏠 宗族与日常礼节')">
        <span class="fd" style="background:#E07B39"></span>宗族礼节<span class="fn" id="n1"></span>
      </button>
      <button class="fc" data-cat="👶 人生礼仪" onclick="setCat(this,'👶 人生礼仪')">
        <span class="fd" style="background:#D4688A"></span>人生礼仪<span class="fn" id="n2"></span>
      </button>
      <button class="fc" data-cat="🎉 岁时节庆" onclick="setCat(this,'🎉 岁时节庆')">
        <span class="fd" style="background:#E8A020"></span>岁时节庆<span class="fn" id="n3"></span>
      </button>
      <button class="fc" data-cat="🙏 民间信仰" onclick="setCat(this,'🙏 民间信仰')">
        <span class="fd" style="background:#9B6BB0"></span>民间信仰<span class="fn" id="n4"></span>
      </button>
      <button class="fc" data-cat="🍜 饮食民俗" onclick="setCat(this,'🍜 饮食民俗')">
        <span class="fd" style="background:#7BA05B"></span>饮食民俗<span class="fn" id="n5"></span>
      </button>
      <button class="fc" data-cat="🌏 侨乡与海外传播" onclick="setCat(this,'🌏 侨乡与海外传播')">
        <span class="fd" style="background:#4A8DB8"></span>侨乡传播<span class="fn" id="n6"></span>
      </button>
      <button class="fc" data-cat="🏡 传统建筑与工艺" onclick="setCat(this,'🏡 传统建筑与工艺')">
        <span class="fd" style="background:#8B6914"></span>建筑工艺<span class="fn" id="n7"></span>
      </button>
      <button class="fc" data-cat="🎭 戏曲与口传文艺" onclick="setCat(this,'🎭 戏曲与口传文艺')">
        <span class="fd" style="background:#6B7B8D"></span>戏曲文艺<span class="fn" id="n8"></span>
      </button>
    </div>

    <div class="fg">
      <div class="fh">完成状态</div>
      <button class="fc on" data-st="" onclick="setSt(this,'')">🗂 全部</button>
      <button class="fc" data-st="🟢 已验证" onclick="setSt(this,'🟢 已验证')">🟢 已验证</button>
      <button class="fc" data-st="🟡 部分完成" onclick="setSt(this,'🟡 部分完成')">🟡 部分完成</button>
      <button class="fc" data-st="🔴 待填" onclick="setSt(this,'🔴 待填')">🔴 待填</button>
    </div>

    <div class="fg">
      <div class="fh">适用地区</div>
      <button class="fc on" data-rg="" onclick="setRg(this,'')">🌐 全部地区</button>
      <button class="fc" data-rg="泉州" onclick="setRg(this,'泉州')">泉州</button>
      <button class="fc" data-rg="漳州" onclick="setRg(this,'漳州')">漳州</button>
      <button class="fc" data-rg="厦门" onclick="setRg(this,'厦门')">厦门</button>
      <button class="fc" data-rg="金门" onclick="setRg(this,'金门')">金门</button>
      <button class="fc" data-rg="台湾" onclick="setRg(this,'台湾')">台湾</button>
      <button class="fc" data-rg="新加坡" onclick="setRg(this,'新加坡')">新加坡</button>
      <button class="fc" data-rg="马来西亚" onclick="setRg(this,'马来西亚')">马来西亚</button>
      <button class="fc" data-rg="东南亚闽南社群" onclick="setRg(this,'东南亚闽南社群')">东南亚</button>
    </div>
  </aside>

  <div class="content">
    <div id="grid" class="grid">
      <div class="loading">
        <div class="spinner"></div>
        <div style="font-size:13px">正在载入条目…</div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="drawer" id="drawer">
    <div class="dh">
      <button class="dx" onclick="closeDrawer()">✕</button>
      <div class="dbadges" id="dbadges"></div>
      <div class="dtitle" id="dtitle"></div>
      <div class="dpinyin" id="dpinyin"></div>
    </div>
    <div class="db" id="dbody"></div>
  </div>
</div>

<script>
const CAT_COLOR = {
  '🏠 宗族与日常礼节':'#E07B39','👶 人生礼仪':'#D4688A',
  '🎉 岁时节庆':'#E8A020','🙏 民间信仰':'#9B6BB0',
  '🍜 饮食民俗':'#7BA05B','🌏 侨乡与海外传播':'#4A8DB8',
  '🏡 传统建筑与工艺':'#8B6914','🎭 戏曲与口传文艺':'#6B7B8D'
};

let allEntries = [], filtered = [];
let activeCat = '', activeSt = '', activeRg = '';

async function loadData() {
  allEntries = [];
  document.getElementById('grid').innerHTML =
    '<div class="loading"><div class="spinner"></div><div style="font-size:13px">正在载入…</div></div>';
  document.getElementById('statPill').textContent = '载入中…';
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('无法载入 data.json: ' + res.status);
    allEntries = await res.json();
    document.getElementById('statPill').textContent = `共 ${allEntries.length} 条`;
    updateCounts();
    applyFilters();
  } catch(err) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">⚠️ 载入失败：${err.message}</div>`;
    document.getElementById('statPill').textContent = '错误';
  }
}

function updateCounts() {
  document.getElementById('na').textContent = allEntries.length;
  const map = {
    '🏠 宗族与日常礼节':'n1','👶 人生礼仪':'n2','🎉 岁时节庆':'n3',
    '🙏 民间信仰':'n4','🍜 饮食民俗':'n5','🌏 侨乡与海外传播':'n6',
    '🏡 传统建筑与工艺':'n7','🎭 戏曲与口传文艺':'n8'
  };
  for (const [cat, id] of Object.entries(map)) {
    const el = document.getElementById(id);
    const n = allEntries.filter(e => e['大类'] === cat).length;
    if (el) el.textContent = n || '';
  }
}

function setCat(btn, v) { activeCat = v; document.querySelectorAll('[data-cat]').forEach(b=>b.classList.toggle('on',b.dataset.cat===v)); applyFilters(); }
function setSt(btn, v)  { activeSt  = v; document.querySelectorAll('[data-st]').forEach(b=>b.classList.toggle('on',b.dataset.st===v));  applyFilters(); }
function setRg(btn, v)  { activeRg  = v; document.querySelectorAll('[data-rg]').forEach(b=>b.classList.toggle('on',b.dataset.rg===v));  applyFilters(); }

function applyFilters() {
  const q = document.getElementById('searchQ').value.toLowerCase().trim();
  filtered = allEntries.filter(e => {
    if (activeCat && e['大类'] !== activeCat) return false;
    if (activeSt  && e['完成状态'] !== activeSt)  return false;
    if (activeRg  && !(e['适用地区']||[]).includes(activeRg)) return false;
    if (q) {
      const hay = [e['条目名称'],e['简单介绍'],e['子类'],e['白话字／拼音']].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('rc').textContent = allEntries.length
    ? `${filtered.length} / ${allEntries.length} 条` : '';
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">🔍 没有符合条件的条目</div>'; return;
  }
  grid.innerHTML = filtered.map((e, i) => {
    const cat   = e['大类'] || '';
    const color = CAT_COLOR[cat] || '#9C8070';
    const title = e['条目名称'] || e._title || '（无标题）';
    const pinyin= e['白话字／拼音'] || '';
    const intro = (e['简单介绍'] || '').replace(/<br>/g,' ').trim();
    const rgns  = (e['适用地区']||[]).slice(0,3);
    const extra = (e['适用地区']||[]).length - 3;
    const st    = e['完成状态']||'';
    const sEmoji = st.includes('已验证')?'🟢':st.includes('部分')?'🟡':st.includes('待')?'🔴':'';
    const cred  = (e['可信度']||'').replace(/★/g,'<span class="stars">★</span>');

    return `<div class="card" style="--cc:${color}" data-idx="${i}">
      <div class="ct">
        <div>
          <div class="cn">${title}</div>
          ${pinyin?`<div class="cp">${pinyin}</div>`:''}
        </div>
        <div class="cs">${sEmoji}</div>
      </div>
      ${cat?`<div class="cpill" style="background:${color}">${cat}</div>`:''}
      <div class="ci">${intro||'暂无简介'}</div>
      <div class="cm">
        ${rgns.map(r=>`<span class="rt">${r}</span>`).join('')}
        ${extra>0?`<span class="rt">+${extra}</span>`:''}
      </div>
      ${cred?`<div class="cred">${cred}</div>`:''}
    </div>`;
  }).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openDrawer(parseInt(card.dataset.idx)));
  });
}

function openDrawer(idx) {
  const e = filtered[idx];
  if (!e) return;
  const cat   = e['大类']||'';
  const color = CAT_COLOR[cat]||'#9C8070';

  const badges = [];
  if (cat) badges.push(`<span class="badge catb" style="background:${color}">${cat}</span>`);
  if (e['地域层级']) badges.push(`<span class="badge">${e['地域层级']}</span>`);
  if (e['完成状态']) badges.push(`<span class="badge">${e['完成状态']}</span>`);
  if (e['可信度']) {
    const n = (e['可信度'].match(/★/g)||[]).length;
    badges.push(`<span class="badge"><span class="stars">${'★'.repeat(n)}</span>${e['可信度'].replace(/★+\s*/,'')}</span>`);
  }

  document.getElementById('dbadges').innerHTML = badges.join('');
  document.getElementById('dtitle').textContent  = e['条目名称'] || e._title;
  document.getElementById('dpinyin').textContent = e['白话字／拼音']||'';

  const s = (label, text) => text
    ? `<div class="ds"><div class="dsl">${label}</div><div class="dst">${text.replace(/<br>/g,'\n').trim()}</div></div>`
    : '';
  const t = (label, items) => items&&items.length
    ? `<div class="ds"><div class="dsl">${label}</div><div class="dtags">${items.map(x=>`<span class="dtag">${x}</span>`).join('')}</div></div>`
    : '';
  const D = '<div class="div"></div>';

  let parts = '';
  parts += s('简介', e['简单介绍']);
  if (e['时间／时节']) parts += D + s('时间 / 时节', e['时间／时节']);
  if (e['子类']) parts += D + s('子类', e['子类']);
  if ((e['适用地区']||[]).length) parts += D + t('适用地区', e['适用地区']);

  if (e['所需物品']) {
    const items = e['所需物品'].split(/[、，,]/).map(x=>x.trim()).filter(Boolean);
    parts += D + (items.length>2 ? t('所需物品',items) : s('所需物品',e['所需物品']));
  }

  if (e['操作步骤']) {
    const steps = e['操作步骤'].replace(/<br>/g,'\n').trim();
    parts += D + `<div class="ds"><div class="dsl">操作步骤</div><div class="stepbox">${steps}</div></div>`;
  }

  if (e['禁忌与避讳']) {
    parts += D + `<div class="ds"><div class="dsl">禁忌与避讳</div><div class="dst" style="color:#B83A0E">${e['禁忌与避讳']}</div></div>`;
  }

  if (e['背后故事']) parts += D + s('背后故事', e['背后故事']);
  if (e['地域差异']) parts += D + s('地域差异', e['地域差异']);
  if (e['资料来源']) parts += D + s('资料来源', e['资料来源']);

  const url = e['url'] || e._url || '';
  parts += D + `<a class="nlink" href="${url}" target="_blank">↗ 在 Notion 中查看完整条目</a>`;

  document.getElementById('dbody').innerHTML = parts;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').scrollTop = 0;
}

function closeDrawer() { document.getElementById('overlay').classList.remove('open'); }
function maybeClose(e) { if (e.target===document.getElementById('overlay')) closeDrawer(); }

loadData();
</script>
</body>
</html>
