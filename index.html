</div>
<script>
const CC={"🏠 宗族与日常礼节":"#E07B39","👶 人生礼仪":"#D4688A","🎉 岁时节庆":"#E8A020","🙏 民间信仰":"#9B6BB0","🍜 饮食民俗":"#7BA05B","🌏 侨乡与海外传播":"#4A8DB8","🏡 传统建筑与工艺":"#8B6914","🎭 戏曲与口传文艺":"#6B7B8D"};
let DATA=[];
DATA = DATA.concat([{"n": "闽南婚礼", "py": "Bín-lâm hûn-lé", "c": "👶 人生礼仪", "sc": "人生大礼 / 婚姻传统", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "全年（喜日由算命师选定）", "intro": "闽南传统婚礼分三大阶段：送定（订婚）：男方携聘金、礼饼、猪脚等六样或十二样礼品至女方家，双方喝甜茶、换戒指，完成订婚。完聘（过大礼）：迎取前数日，男方送更丰厚的完聘礼。迎取（婚礼当日）：新娘由兄长或好命婆抱出门，新娘头顶遮黑伞代表带走娘家的福气；入新家后跨过火盆象征除旧迎新。", "items": "聘金、订婚饼（双数）、猪脚、糖果、罐头、布料、六礼或十二礼礼盒、甜茶、茶杯、压茶瓯红包、戒指（金饰）、黑伞或米笛、火盆、瓦片、红毯、汤圆、炮竹", "steps": "《第一阶段：送定（订婚）》\n1. 男方请算命师合八字、选定订婚吉日。\n2. 男方备「订婚礼」：聘金、礼饼（需为双数）、猪脚、糖果、罐头、布料等，通常为六礼或十二礼。\n3. 男方携礼至女方家，女方奉甜茶，男方代表饮茶后将茶杯放回托盘时置入红包（压茶瓯）。\n4. 互换戒指：由好命婆协助，新郎新娘互戴戒指。\n5. 女方收下聘金与礼饼后，回赠男方「回礼」（如西装料、皮带、皮鞋等）。\n《第二阶段：婚礼当日迎取》\n6. 婚礼当日清晨，新娘由好命婆为其梳头（「上头」），边梳边念吉祥话。\n7. 新郎迎亲队伍抵达，新娘头顶黑伞出门，脚不踩地——由兄长或好命婆抱出或垫红毯而行。\n8. 新娘向父母行礼辞别，父亲泼水（「嫁出去的女儿，泼出去的水」）。\n9. 抵达男方家，新娘跨过火盆（去邪气）、踏破瓦片（破旧迎新）。\n10. 拜堂：新人向天地、祖先、父母行礼，夫妻对拜。\n11. 入洞房后，新人吃「合婚圆」（甜汤圆），象征婚姻甜蜜圆满。", "taboo": "新娘脚不能踩地（出娘家至新郎家）；孕妇不宜观看新娘梳妆；婚礼当天不提死亡离别字眼；新娘不能回头。", "story": "闽南婚礼程序源于儒家「六礼」（纳采、问名、纳吉、纳徵、请期、亲迎），在民间演化为「送定」「完聘」「迎取」三大核心程序，并融入大量闽南特色的吉祥物品与禁忌。", "diff": "台湾闽南婚礼保留较多传统程序，尤其「压轿饼」「过火炉」等习俗；泉州婚礼仪式较繁复，聘金习俗各地差异大；漳州婚礼相对简化；马来西亚、新加坡闽南婚礼因多元文化影响，常有创新融合。", "url": "https://app.notion.com/p/3681313e55f38073b4a2e47a3f3b2ca5"}, {"n": "闽南丧葬", "py": "Bín-lâm song-tsòng", "c": "👶 人生礼仪", "sc": "丧葬仪式 / 二次葬传统", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "全年", "intro": "闽南丧葬仪式繁复，主要节点：临终（寿终正寝、移铺）→小殓大殓（入棺）→做功德（请道士或和尚诵经超度）→出山（出柩）→作七（往生后每七天做一次法事，共49天）→作百日→做对年→做三年→拣骨（二次葬，将骨灰重新装瓮安葬）。各阶段均有严格禁忌。", "items": "寿衣（奇数件，非黑色）、棺木、随葬品、孝服、孝杖、香烛、金银纸、纸扎（纸房子、纸车、纸衣物）、灯笼、丧帜、骨灰坛（金斗瓮）", "steps": "1. 临终与移铺：长者病危时，子女须守在床侧，通常在断气前将老人移至厅堂正厅的木板床（「移铺」），让其寿终正寝。\n2. 报丧：逝世后立即通知至亲，请道士或礼仪师到场主持后续仪式。\n3. 小殓：为往生者净身、更换寿衣（件数为奇数，不可用黑色）。\n4. 大殓（入棺）：在道士指定的吉时，将往生者移入棺木，放入随葬品，由长子「封钉」，家属转身回避。\n5. 做功德（办丧礼）：灵柩停放厅堂，子女守灵，请道士或和尚办法事诵经超度。\n6. 出山（出柩）：择吉日出柩，送葬队伍由道士领路，长子手持「孝杖」，棺木由杠夫抬出，孝眷哭丧（「哭路头」）。\n7. 安葬：棺木下葬后，道士主持安土仪式，燃烧纸扎让往生者在另一世界衣食无缺。\n8. 作七：往生后每七天做一次法事，共七七四十九天。\n9. 拣骨（二次葬）：土葬约五至十年后，择吉日开墓，由专业「土公仔」（拣骨师）将骨骸拣起、洗净、阴干，依头脚顺序放入「金斗瓮」（骨灰坛），再择地安葬，称「进金」。", "taboo": "守丧期间不贴红春联；服丧期不入他人家拜年；封棺时家属须转身回避；丧期不穿红衣；孕妇不宜进灵堂。", "story": "闽南丧葬融合道教、佛教与儒家孝道观念，形成独特的「做七」和「拣骨」（二次葬）传统。拣骨文化反映闽南人对祖先遗骸的高度重视，以及「入土为安」后再择吉地安葬的信仰。", "diff": "台湾闽南丧葬保留较完整的「做七」和「拣骨」习俗；福建闽南因火葬政策影响，传统土葬习俗已有改变；海外闽南社群因各地法规不同，做法各异。", "url": "https://app.notion.com/p/3681313e55f380618676e9abe00e6102"}, {"n": "做三朝", "py": "Tsò sann-tsiau", "c": "👶 人生礼仪", "sc": "出生礼仪 / 洁净迎福", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "婴儿出生后第三天", "intro": "婴儿出生第三天，母亲第一次正式为婴儿洗澡，称为「洗三朝」。洗澡水中加入艾草、石榴叶、柚子叶等辟邪植物，再放入鸡蛋、硬币滚过婴儿身体，象征去秽迎福。仪式完成后，家人分送红蛋、油饭给亲友报喜。", "items": "艾草、石榴叶、柚子叶、盐、熟鸡蛋（带壳）、硬币一枚、澡盆、热水、外婆家送的新衣（头尾礼）、鸡酒（米酒炖麻油鸡）、油饭食材、红蛋染料", "steps": "1. 第一天（出生当日）：通知外婆家母子平安，外婆家须于三朝日前送来鸡酒、鸡蛋、姜、麻油等坐月子食材。\n2. 三朝日准备洗澡水：产后第三天上午，烧一锅热水，加入艾草、石榴叶、柚子叶（均有辟邪去秽作用）、少许盐，让水冷却至约37-38°C。\n3. 准备「鸡卵」与钱币：备一颗熟鸡蛋（带壳）和一枚硬币，待用。\n4. 洗三朝：由好命婆或外婆主持，将婴儿放入澡盆，用艾草水轻轻擦洗全身。边洗边用鸡蛋在婴儿身上滚过，说吉祥话：「鸡卵身，鸭卵面，手抱元宝脚踏钱。」硬币也在身上轻轻触碰，象征财运随身。\n5. 包巾与穿衣：洗完后以外婆家送来的新衣为婴儿穿上，象征外婆家对外孙的祝福。\n6. 备油饭红蛋：准备油饭（糯米加猪肉香菇炒制）和红蛋（水煮蛋染红），分送给亲友报喜。\n7. 收礼：亲友收到红蛋油饭后，需回赠红包或鸡腿。", "taboo": "洗三朝用水不能给外人使用；仪式期间外人不宜进入产房；洗澡水须妥善处理不可乱泼。", "story": "三朝（出生后第三天）洗浴仪式源于古代的洁净信仰，意在洗去婴儿在灵界的污秽，使其正式进入人间。仪式中的香花、鸡蛋、艾草各有象征——香花求美丽、鸡蛋求圆满、艾草驱邪。", "diff": "泉州地区三朝仪式由产婆主持，附带向福德正神报告新生；台湾闽南三朝仪式较简化，多由家人代办；漳州地区时间有时延至第五天或第七天。", "url": "https://app.notion.com/p/3681313e55f380ecaf6dd3068aab2998"}, {"n": "做满月", "py": "Tsò muá-guẻh", "c": "👶 人生礼仪", "sc": "生命里程碑 / 满月庆贺", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "婴儿出生后第三十天", "intro": "婴儿满一个月，家人大办满月酒宴庆祝，称为「做满月」。当天为婴儿剃去胎发，称「剃头」，象征去除胎气、开始新生。外婆家须准备「头尾礼」（从头到脚一整套衣物），以及油饭、红蛋、鸡腿等。主人家则回赠红蛋与油饭给所有亲友。", "items": "外婆家「头尾礼」（帽子、衣服、鞋袜、装饰品一套）、油饭食材（糯米、猪肉、香菇、虾米）、鸡腿、红蛋、红色染料、剃头工具、红布（保存胎发）", "steps": "1. 提前备办：满月前一周，外婆家准备「头尾礼」——从头（帽子）到脚（鞋子）一整套婴儿衣物，加上大量油饭、红蛋、鸡腿。\n2. 剃胎发：满月当日上午，请剃头师傅或家中长辈为婴儿剃去胎发，称「剃头」。剃下的头发以红布包起保存。剃头时大人说吉祥话：「头毛剃离离，聪明阁贡知。」\n3. 着新衣：为婴儿换上外婆家送来的新衣，由好命婆协助穿戴，象征吉祥。\n4. 摆满月酒：中午或傍晚办桌请客，广邀亲友、邻里，菜色丰盛，油饭为必上的主食之一。\n5. 分送油饭红蛋：请客时或事先备好的油饭红蛋分送给所有来宾及邻里，收到者需回赠红包。\n6. 外婆家入席上座：请客席中外婆家坐主宾席，为最尊贵的客人，主人家需特别敬酒致谢。\n7. 收礼登记：家人设礼簿记录各亲友礼金，日后对方家有喜事需回赠相当金额。", "taboo": "剃胎发时剪刀不能碰到耳朵；胎发不能随意丢弃；油饭不能中途停送；孕妇不宜参加他人满月宴。", "story": "满月礼源于对婴儿度过最脆弱时期的庆贺。古代婴儿死亡率高，满月代表婴儿存活的重要里程碑。油饭与红蛋是必备赠礼，油饭象征滋养丰足，红蛋象征生命圆满。", "diff": "台湾闽南满月油饭至今仍是重要习俗，常以外烩篮送赠亲友；泉州地区以「汤饼」（面条）替代油饭；厦门地区两者兼有；新加坡、马来西亚闽南人多送姜米饭。", "url": "https://app.notion.com/p/3681313e55f38075af0cf63ce7ee428c"}, {"n": "做四月日", "py": "Tsò sì-guẻh-ji̩t", "c": "👶 人生礼仪", "sc": "生命礼仪 / 成长祈福", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "婴儿满四个月", "intro": "婴儿满四个月，家人举行「收涎」仪式，象征收起婴儿爱流口水的阶段，祈求孩子健康长大、不再多病。仪式做法是用以红线串起的十二个（或二十四个）小圆饼（收涎饼），由长辈依序在婴儿嘴边轻轻擦过，边擦边说吉祥话。仪式完成后，收涎饼分送给亲友食用，亲友回赠压岁钱或礼物。", "items": "收涎饼一串（十二个或二十四个小圆饼）、红线、供品、香烛、神明厅供桌、婴儿新衣", "steps": "1. 备收涎饼：提前向饼店订制或自行烘焙收涎饼（圆形小饼干，通常红色或印有吉祥图案），数量为12个（代表一年十二个月）或24个，以红线串成一串。\n2. 备供品祭祖神：四月日当天，先在神明厅摆供品上香，告知神明今日为孩子做收涎，祈求孩子健康平安。\n3. 收涎仪式：长辈（通常为外婆或好命婆）拿起收涎饼串，依序取每一块饼在婴儿嘴角轻轻擦过，边擦边说吉祥话，例如：「收涎收离离，快快大汉好育饯。」\n4. 众亲友轮流：在场的亲友长辈也可轮流拿饼为婴儿收涎，每人说一句吉祥话。\n5. 分送收涎饼：仪式完成后，将收涎饼分送给在场所有人食用，收到的人也需说一句祝福婴儿的话。\n6. 亲友回赠：亲友收到收涎饼通常回赠小红包或婴儿用品。", "taboo": "收涎饼不能掉落（落地不吉）；仪式不能由单身男性主持；收涎饼分出后不能收回。", "story": "收涎源于闽南对婴儿流涎（口水）的民俗诠释——认为婴儿口水是「世间事物的垂涎」，收涎仪式象征婴儿不再执着于俗世，开始健康成长。", "diff": "台湾闽南收涎习俗至今普遍，且多在婴儿四个月时举行；泉州地区也有但不如台湾普及；漳州地区此习俗较少见。", "url": "https://app.notion.com/p/3681313e55f38035b727fe5766dcdc9f"}, {"n": "做度晬", "py": "Tsò tōo-tsuè", "c": "👶 人生礼仪", "sc": "周岁礼 / 抓周占卜", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "婴儿满周岁", "intro": "婴儿满一周岁举行「度晬」（周岁礼），核心仪式是「抓周」：在大圆盘或竹笛上摆放各种物品，让婴儿自由抓取，以第一件抓到的物品占卜孩子的未来志向与才能。传统物品包括书本（读书人）、算盘（商人）、葱（聪明）、芹菜（勤劳）、印章（当官）、剪刀或针线（手艺人）等；现代加入鼠标、听诊器、麦克风等。", "items": "大圆盘或竹笛托盘、书本或笔、算盘或纸币、葱、芹菜、印章、剪刀或针线、尺、鸡腿、听诊器、鼠标、金饰（金手环、项链）、油饭、红蛋", "steps": "1. 备供品祭祖神：周岁当天上午，先在神明厅备供品祭祖、谢神。\n2. 外婆家送礼：外婆家须送来「度晬礼」，包含新衣、金饰（金手环、金手链或金项链）、油饭、红蛋及各式食品。\n3. 准备抓周物品：在大圆盘上摆放8-12样物品，传统选项：书本或笔、算盘或纸币、葱、芹菜、印章、剪刀或针线、尺、鸡腿。现代加入：听诊器、鼠标、计算器、麦克风等。\n4. 放婴儿抓取：将盘子放在婴儿面前，让其自由爬行抓取，家人在旁观看但不干预，记录婴儿第一件抓到的物品。\n5. 宣布吉兆：不论婴儿抓到什么，长辈一律说吉祥话，例如抓到葱说「未来聪明过人」。\n6. 办桌请客：下午或晚上办周岁酒席，广邀亲友。\n7. 分送油饭红蛋：同满月，分送油饭红蛋，亲友回赠红包。", "taboo": "不能干预婴儿抓取；不能对抓到物品说负面话；不能强行替换婴儿抓取的东西。", "story": "抓周源于古代占卜信仰，以婴儿的自然本能抓取物品来预测其天赋与未来职业。此习俗广泛存在于汉族文化中，闽南版本特色在于摆放物品的选择与顺序，以及由长辈引导的仪式程序。", "diff": "台湾闽南抓周至今流行，物品选择趋向现代化（加入电脑、听诊器等）；泉漳厦传统版本保留较多传统物品（文房四宝、算盘等）；海外闽南社群多已简化为家庭聚会形式。", "url": "https://app.notion.com/p/3681313e55f3806d8ee6dfde95af2a6f"}, {"n": "闽南奉茶礼节", "py": "Bín-lâm hōng-tê lé-tsiat", "c": "🏠 宗族与日常礼节", "sc": "待客礼仪 / 功夫茶文化", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "日常", "intro": "闽南人以茶待客，客人一到便泡工夫茶相迎，是日常礼节的核心。工夫茶讲究茶具（盖碗或紫砂壶、小茶杯）、水温（沸水）、茶叶（安溪铁观音或冻顶乌龙）、手法（高冲低斟、关公巡城、韩信点兵）。奉茶时以双手捧杯递给长辈或客人，受茶者以食指与中指轻叩桌面两下表示谢意。拒绝喝茶视为失礼。", "items": "茶盘、紫砂壶或盖碗、小茶杯（多个）、茶叶（安溪铁观音或清香型乌龙）、热水壶、茶则或茶匙、茶海（公道杯）、茶滤、茶巾", "steps": "1. 备茶具：准备茶盘、茶壶（紫砂壶或盖碗）、小茶杯（若干）、茶叶（以安溪铁观音为宜）、热水壶。\n2. 温壶烫杯：先用滚烫热水冲入茶壶及茶杯中，旋转温热后倒掉，称「温壶烫杯」，去除异味、提升茶温。\n3. 置茶：以茶则取适量茶叶（约茶壶容量的三至五分之一）放入壶中。\n4. 洗茶（头泡不喝）：第一泡用沸水快速冲入、立即倒掉，称「洗茶」，此泡不饮。\n5. 冲泡：第二泡起正式饮用，沸水高冲入壶，加盖静置约15-30秒。\n6. 关公巡城：将茶汤从壶中逐一低斟入各茶杯，来回循环，使每杯茶色、茶味均匀，称「关公巡城」。\n7. 韩信点兵：最后几滴茶汤最为浓郁，逐滴均匀点入各杯，称「韩信点兵」，确保每杯品质一致。\n8. 双手奉茶：以双手端持茶杯或茶托，向长辈或客人躬身奉上，说「请喝茶」。辈分低者先奉年长者，再奉其他客人。\n9. 叩桌致谢：客人接到茶后，以食指与中指轻叩桌面两下，表示谢意（代替行礼，是工夫茶文化的特有礼节）。\n10. 续杯：客人茶杯见底后主动续添，不可等客人开口要求，以示好客。", "taboo": "拒绝喝茶视为对主人失礼；茶杯不能放在地上；奉茶须由辈分低者先奉长者；不能等客人开口才添茶。", "story": "闽南功夫茶文化源于唐宋茶道在福建的在地化，泉州作为海上丝路起点，茶叶贸易发达，奉茶待客成为重要社交礼仪。功夫茶的泡法、奉茶的顺序均有严格规范，体现了闽南人对「礼」的重视。", "diff": "潮汕地区的功夫茶文化与闽南高度相似；台湾茶文化受日本影响，现代台湾茶道融合了闽南与日式元素；新加坡、马来西亚闽南社群的奉茶礼仪略有简化。", "url": "https://app.notion.com/p/3681313e55f3806c9938f7b52e1fa6ca"}, {"n": "闽南语言禁忌", "py": "Bín-lâm gí-giân kìm-kī", "c": "🏠 宗族与日常礼节", "sc": "语言习俗 / 谐音禁忌", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "日常", "intro": "闽南语有大量因谐音而形成的语言禁忌，深刻影响日常用词与行为。例如：「雨伞」的「伞」谐音「散」，不可送人；「钟」谐音「终」，不可送钟；「梨」谐音「离」，祭祖不用梨。过年期间禁说「破」「死」「苦」「穷」等字，打破东西要说「岁岁平安」（碎谐音岁）。", "items": "无特别器物（为语言习俗与行为规范）；避免送礼清单：雨伞、钟、梨、鞋、扇子", "steps": "以下为闽南日常最常见的语言禁忌与对应做法：\n\n【家居日常】\n- 打破碗碟 → 不说「破了」，改说「岁岁平安」（碎谐音岁）。\n- 有人去世 → 不说「死」，改说「过身」「去了」「老了」。\n- 说到不吉利的事 → 立即说「童言无忌」或敲木头化解。\n\n【拜访送礼】\n- 不送雨伞（伞谐音「散」，象征分散）。\n- 不送钟（送钟谐音「送终」）。\n- 不送梨（梨谐音「离」，象征分离）。\n- 不送鞋（鞋谐音「邪」）。\n- 不送扇子给情人（扇谐音「散」）。\n\n【过年期间】\n- 初一至十五不说「破」「死」「苦」「穷」「坏」等字。\n- 不向人讨债、不骂人、不哭泣。\n- 不扫地（把财气扫出去），非扫不可则由外往内扫。\n\n【厨房与饮食】\n- 筷子不可直插入碗中（形似祭祀香炉，象征诅咒）。\n- 吃鱼不可说「翻鱼」（谐音翻船），要说「顺过来」。\n- 煮饭时锅铲不可敲打锅边（象征乞丐讨饭）。\n\n【祭祀场合】\n- 进庙宇不踩门槛（门槛象征神明的肩膀）。\n- 丧期回家前需在门口以香或艾草熏身，去除晦气再进门。", "taboo": "过年期间避说「破」「死」「苦」「穷」；不送伞、钟、梨；打破碎说「岁岁平安」；筷子不插碗中；吃鱼不说「翻鱼」。", "story": "闽南语言禁忌源于民间对语言力量的信仰——认为语言具有「召唤」力量，说不吉利的话会招致厄运。闽南语的丰富谐音使语言禁忌尤为发达，几乎涵盖生活的各个层面。", "diff": "台湾闽南语言禁忌与泉漳厦高度一致；部分禁忌因闽南移民而传入海外，在新加坡、马来西亚闽南社群中也有保留；随着现代化，年轻世代对语言禁忌的遵守程度普遍降低。", "url": "https://app.notion.com/p/3681313e55f380f5a019eed532e1e795"}, {"n": "润饼", "py": "Jūn-piánn", "c": "🍜 饮食民俗", "sc": "传统点心 / 清明饮食", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "清明节（主要）、春节、日常", "intro": "润饼是闽南最具代表性的传统食物，以极薄的麦粉皮包裹多种炒熟饼料，不加热食用。传统饼料包括高丽菜、豆芽、豆干、红萝卜、蛋皮丝、花生粉、糖粉等，部分地方加入海苔、蒜苗、韭黄或豆腐干。清明节培墓后在墓地旁分食润饼是闽南特有习俗，象征与祖先共享食物。新加坡和马来西亚称之为「薄饼」（Popiah），已成为当地融合饮食文化的一部分。", "items": "润饼皮（麦粉、盐、水，或现成购买）、高丽菜、豆芽、豆干、红萝卜、鸡蛋、蒜苗或韭黄、海苔片、花生粉、白糖、蒜、盐", "steps": "1. 备润饼皮：可向市场或饼店购买现成薄饼皮，或自制：麦粉加盐和水调成稀薄麦糊，以不黏锅小火摊成薄皮，每张直径约20-25公分。\n2. 备饼料（传统）：\n   - 炒高丽菜（加蒜、少许盐）\n   - 炒豆芽\n   - 炒豆干（切丝）\n   - 炒红萝卜丝\n   - 蛋皮丝（蛋打散煎薄皮后切丝）\n   - 蒜苗或韭黄（可选）\n   所有炒料需充分滤干水分，否则薄皮易破。\n3. 备包裹调料：\n   - 花生粉（研磨成粗粉，是闽南润饼灵魂）\n   - 细白糖（与花生粉搭配）\n   - 海苔片（可选）\n4. 包润饼：\n   - 取一张薄饼皮平铺于手心或桌上。\n   - 先铺一层花生粉与糖（打底，防皮湿掉）。\n   - 依序放上各种饼料，叠放于薄皮中央偏下三分之一处。\n   - 先将薄饼皮下缘往上折盖住饼料，再将左右两侧向内折，最后往上卷起成长条形。\n5. 即包即食：润饼包好后需立即食用，放太久薄皮会因饼料水分而软烂破裂。\n6. 清明特别意义：清明培墓后，家人在墓地旁或返家途中共同包食润饼，象征与祖先同享一餐。", "taboo": "润饼包好后必须立即食用；清明培墓时的润饼要在墓地旁食用才有意义；花生粉是必备材料，不可省略。", "story": "润饼（薄饼）源于古代的「春饼」传统，是清明节培墓后的必食之物，象征以春天的食材包裹家人的祝福。闽南地区的润饼饼料丰富，花生糖粉是不可或缺的材料。", "diff": "台湾闽南润饼在清明节和日常均可食用，台南和彰化有各自的特色饼料；泉州润饼以清淡口味为主；新加坡、马来西亚的「薄饼」（Popiah）融合了南洋食材，已发展为独立的当地小食。", "url": "https://app.notion.com/p/3681313e55f38062af3dc0ba4d190bf1"}, {"n": "侨批", "py": "Kheh-phue", "c": "🌏 侨乡与海外传播", "sc": "海外移民 / 侨批", "lv": "L2 次区域俗", "rg": ["泉州", "漳州", "厦门", "新加坡", "马来西亚", "菲律宾", "印尼"], "st": "🟢 已验证", "cr": "★★★★★ 联合国非遗登录", "tm": "十九世纪末至二十世纪中（历史民俗）", "intro": "侨批（又称番批）是闽南、潮汕移民从海外寄回家乡的书信兼汇款凭证，是十九世纪末至二十世纪中叶「过番」（出洋）风潮的独特产物。一封侨批通常夹带现金或汇票，交由专门的「批局」（民间金融汇兑机构）传递。2013年，侨批文物（共16万件）列入联合国《世界记忆遗产》名录，是闽南海洋移民文化最珍贵的文字实物。", "items": "（历史文物，现代以查阅为主）侨批信封、侨批信件本文（闽南语书面语）、汇款凭证、批局收据、回执纸、家族族谱（查访用）、侨批博物馆参观证件", "steps": "1. 了解寄送流程（历史）：\n   - 海外华工将书信与现金交给「水客」或交予「批局」（批信局，民间金融汇兑机构）。\n   - 批局收妥后出具收据，承诺在约定时日内送达。原乡家属收到批信后在回执纸上签字或盖章，由批局带回海外作为已妥投的证明。\n2. 认识侨批格式：一封侨批通常包含：\n   - 信封：写明收件人住址、发件人姓名。\n   - 信件本文：开头套语，报告自身平安、工作状况，询问家中老小，附上汇款金额说明。\n   - 汇款：以现金、支票或批局凭条夹入。\n3. 阅读一封侨批：如有机会接触真实侨批（泉州闽台缘博物馆、厦门华侨博物院、汕头侨批文物馆均有展示），阅读时注意：\n   - 书写文字为闽南语书面语（带有口语化文言文）。\n   - 金额单位（光洋、港币、南洋币）反映不同历史时期与汇路。\n4. 寻找家族侨批：若祖上曾「过番」（移民东南亚），可向年长亲属询问是否保留有旧批信，或联系泉州闽台缘博物馆查询。\n5. 意义延伸：阅读侨批是了解先人生活最直接的方式，每封批信都是一段真实的离散故事——可对照家族族谱，找出写信人与收信人的辈分关系，还原祖先的生命轨迹。", "taboo": "收到侨批的家属须在回执上签字才能动用汇款；批信不能扣押不交；家族批信不宜公开外传（私密家书性质）。", "story": "侨批是19世纪至20世纪中期，闽南（及潮汕）海外移民通过私人批信局寄回家乡的信件兼汇款凭证，是「以信带款、以款带信」的独特形式。侨批记录了无数海外闽南人的离乡奋斗史，也是研究海外移民史的重要史料。2013年列入联合国记忆遗产。", "diff": "闽南侨批主要来自东南亚（泰国、新加坡、马来西亚、印尼、菲律宾）；潮汕地区也有大量侨批，常与闽南侨批并称；汕头、泉州、厦门均设有侨批博物馆。", "url": "https://app.notion.com/p/3681313e55f380c09926e7c48b3a5aee"}, {"n": "红砖厝", "py": "Âng-tsng-tshuù", "c": "🏡 传统建筑与工艺", "sc": "传统民居 / 闽南建筑", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "—（建筑形制，非时节性习俗）", "intro": "红砖厝是闽南传统民居的标志，以红色砖墙、燕尾脊屋顶、白石基座为最显著特征。「燕尾脊」指正脊两端向上翘起如燕子尾巴，是闽南建筑最具辨识度的元素，只有有功名的士绅家庭才能使用燕尾脊，一般人家只能用「马背脊」（圆弧形）。平面格局以「三间起」（三开间）为基本单元，大户人家扩展为「五间张」加两侧护龙，形成多进纵深格局。", "items": "闽南红砖（泉州或厦门碑窑烧制）、花岗岩条石（基座与「出砖入石」工法用）、木材（栋、柱、门窗）、剪瓷雕装饰材料（瓷碗碎片）、泥塑与石雕装饰、花格窗", "steps": "1. 辨识燕尾脊：站在建筑正面，看屋顶正脊两端是否向上翘起如燕子尾巴——若是，即为燕尾脊，代表建造者有功名（秀才以上），或为庙宇。一般民居若无功名，屋顶两端为圆弧形的「马背脊」。\n2. 辨识红砖墙：闽南红砖为砖窑烧制，色泽偏橙红，质地较细密，有别于北方青砖。部分古厝外墙采「出砖入石」工法——花岗岩条石与红砖交错叠砌，形成几何图案，是厦门、金门一带的特色做法。\n3. 认识平面格局：\n   - 「三间起」：最基本格局，一厅两房，厅堂居中。\n   - 「五间张」：五开间，左右各加一房，适合大户人家。\n   - 「一落」：单进院落（一个天井）。\n   - 「多落」：多进纵深（二落、三落），形成多个天井。\n4. 认识装饰细节：\n   - 屋脊上常见剪瓷雕装饰（以瓷碗碎片镶嵌成花鸟龙凤图案）。\n   - 门楣上方有泥塑或石雕，常见花草、历史故事。\n   - 窗户多为花格窗，以石材或砖材雕刻，花纹精细。\n   - 大门两侧有石鼓（门当）或石狮，地位越高规格越大。\n5. 参观推荐：\n   - 福建泉州西街（最完整的闽南旧城区）、晋江五店市传统街区。\n   - 厦门集美、同安传统古厝群。\n   - 金门水头聚落（保存最完整的闽南传统民居群之一）。\n   - 台湾台南安平、鹿港老街。", "taboo": "无功名者不能使用燕尾脊（只可用马背脊）；厅堂神明位置不可随意更动；主屋大门不能正对厕所或厨房；屋脊不能与邻屋屋脊相对（对冲）。", "story": "闽南红砖厝的建筑风格源于闽南地区丰富的红土烧砖传统，结合了中原汉族建筑与闽南海洋文化的特色，形成以「燕尾脊」（皇宫起）和「马背脊」区分社会地位的建筑语法。闽南移民将此建筑传统带至台湾和东南亚，形成独特的「红砖文化圈」。", "diff": "台湾闽南红砖厝保存最多（尤其在台南、彰化、金门）；福建泉漳厦农村仍有大量传统红砖厝；东南亚峇峇娘惹建筑融合了闽南红砖与南洋元素。", "url": "https://app.notion.com/p/3681313e55f380dfa164fa655cd3b7d7"}, {"n": "南音", "py": "Lâm-im", "c": "🎭 戏曲与口传文艺", "sc": "传统音乐 / 南音", "lv": "L2 次区域俗", "rg": ["泉州", "厦门", "台湾", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★★★ 联合国非遗登录", "tm": "全年（尤其节庆与庙会）", "intro": "南音又称南管、弦管，是闽南现存最古老的音乐形式，被誉为「中国音乐史的活化石」，于2009年列入联合国非物质文化遗产。南音以琵琶（横抱）、三弦、二弦、洞箫四件乐器为核心，演唱者配拍板，曲调深沉典雅，歌词多为闽南语古语。传统南音在「郎君祭」中演出，由乐人朝向孟府郎君（音乐神）演奏，完毕后才面向观众。", "items": "琵琶（横抱式）、三弦、二弦、洞箫（尺八型）、拍板（主唱者持用）、南音谱书（工尺谱记谱）、乐谱架、演奏桌、茶具（馆阁接待用）、郎君爷神位（孟府郎君，南音守护神）、香烛与供品（郎君祭用）", "steps": "1. 认识四大主奏乐器：\n   - 琵琶（横抱，有别于一般直抱方式）\n   - 三弦（长颈拨弦乐器）\n   - 二弦（闽南特有的擦弦乐器，音色尖细）\n   - 洞箫（尺八型，音色低沉）\n   另有拍板由主唱者持用。\n2. 认识南音结构：南音分「指」「谱」「曲」三大类——「指」为有词有谱的套曲，「谱」为纯器乐曲，「曲」为散曲（最常见的表演形式）。\n3. 欣赏姿态规范：南音演奏者与演唱者均应保持端庄坐姿，琵琶手横抱琵琶、右手拨弦，表情平静。观众也宜保持安静，不可喧哗打断。\n4. 郎君祭仪式：传统南音演出前须举行「郎君祭」，乐人朝向孟府郎君（南音守护神）演奏，完毕后才转向观众；现代多已简化或省略。\n5. 学习入门：有兴趣学习者可联系各地南音社（馆阁）。泉州有数十个传统南音社，定期公开排练，欢迎旁听。入门乐器多从洞箫或琵琶开始。\n6. 节庆欣赏机会：农历春节、元宵、中秋、庙会等节庆，泉州各南音社常至庙前广场公开演出，是最容易接触南音的场合。", "taboo": "演出时观众不能喧哗打断；演奏者不能在演出途中离席；不能擅改曲调；郎君祭仪式期间乐人不能面向观众。", "story": "南音（又称南管）被认为是保存了唐宋古乐遗韵的活化石，是迄今保存最完整的汉族古乐之一。其记谱法（南音记谱）独特，演奏乐器和演唱语言均保留古闽南语特色。2009年列入联合国非物质文化遗产。", "diff": "泉州为南音的发源地和保存最完整的地区，有众多南音社；台湾各地也有南音社（鹿港、台南等地）；东南亚闽南社群设有南音馆；各地在曲目传承和表演风格上略有差异。", "url": "https://app.notion.com/p/3681313e55f380afb3f1e0dec0348901"}, {"n": "梨园戏", "py": "Lê-hōn̂-hì", "c": "🎭 戏曲与口传文艺", "sc": "戏曲 / 宋元南戏遗韵", "lv": "L2 次区域俗", "rg": ["泉州", "台湾"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "全年（庙会、婚寿喜庆、节日）", "intro": "梨园戏是闽南最古老的剧种，起源于宋元时期，迄今已有八百年以上历史，被誉为「宋元南戏的活化石」，现为国家级非物质文化遗产。梨园戏分为「下南」「上路」「七子班」三支，以独特的程式化身段（尤其手指指法「十八步科母」）著称，表演动作细致、节奏舒缓。代表剧目有《陈三五娘》《朱文走鬼》。", "items": "戏服（生、旦、净、丑角色服饰）、头饰（凤冠）、面化妆品（脸谱颜料）、戏台、南音伴奏乐器（琵琶、三弦、二弦、洞箫、拍板）、锣鼓、剑、扇子等手持道具、田都元帅神位（戏神，后台祭拜）", "steps": "1. 认识三个流派：\n   - 下南：流行于泉州南部（晋江、石狮、南安），音乐节奏较活泼。\n   - 上路：流行于泉州北部（惠安、仙游），音乐风格较庄重。\n   - 七子班（小梨园）：以七名演员为基本班底，表演更精练细致，多演才子佳人故事。\n2. 认识「十八步科母」：梨园戏最独特的程式化身段，包含18种基本手指指法，每种指法对应特定情绪与动作，是演员入门必学的基本功。欣赏时可注意演员的手指动作是否细致。\n3. 代表剧目：\n   - 《陈三五娘》：闽南版罗密欧与朱丽叶，泉州公子陈三爱上漳州美女五娘的爱情故事。\n   - 《朱文走鬼》：宋元南戏留存的珍贵剧目。\n4. 欣赏场合：泉州梨园实验剧团定期在泉州府文庙广场等地演出，逢庙会或大型节庆也有公演。\n5. 音乐伴奏：梨园戏以南音音乐为基础，欣赏时可同时感受南音的音乐特色。", "taboo": "传统上演员不能改动「十八步科母」程式动作；演出前须祭拜田都元帅（戏神）；演员在台上不出现非程式动作。", "story": "梨园戏被认为是中国现存最古老的剧种之一，源于宋元时期的泉州，保留了宋代南戏的演唱、科步与服装程式，尤以「十八步科母」的程式化动作为最大特色。", "diff": "梨园戏主要流行于泉州及闽南地区；台湾在清代以前有梨园戏，现已几近失传；东南亚闽南社群曾有梨园戏班，现多已转型；福建梨园戏剧团是现存最重要的传承机构。", "url": "https://app.notion.com/p/3681313e55f380948b68fc44215c6b1b"}, {"n": "送王船", "py": "Sàng ông-tsûn", "c": "🙏 民间信仰", "sc": "驱瘟仪式 / 联合国非遗", "lv": "L2 次区域俗", "rg": ["厦门", "漳州", "台湾", "马来西亚"], "st": "🟢 已验证", "cr": "★★★★★ 联合国非遗登录", "tm": "每三年或五年一次（各地不同）", "intro": "送王船是闽南、台湾与东南亚共有的大型祭典，已于2020年由中国与马来西亚联合申报列入联合国非物质文化遗产。仪式核心是建造一艘真实大小的木造船，供奉「代天巡狩」的王爷千岁出巡，最后将满载供品的王船焚烧或推入海中，象征王爷带走瘟疫与厄运。整个活动历时数日，包括迎王、绕境、宴王、送王等程序，是闽南民间信仰中规模最大、最壮观的祭典之一。", "items": "大型木造王船（含帆、桨、罗盘、厨房）、王爷神位、船员纸扎、王旗、神轿、鲜花、水果、三牲五牲、酒、香烛、香炉、金银纸扎、米粮、衣物、药材、生活用品纸扎、炮竹、锣鼓、阵头装扮、戏班（酬神用）、点火火把", "steps": "1. 迎王：举行前数月，庙方以掷筊方式请示神明，确认王爷驾临的「府姓」（李、池、吴、朱、范等各府千岁），竖立王旗，宣告迎王活动展开。\n2. 建造王船：工匠开始建造大型木造王船，依神明指示制作，配备帆、桨、罗盘、厨房等一应俱全，内部供奉各府王爷神位及船员纸扎。建造过程全程由工匠持斋戒。\n3. 绕境代天巡狩：王船建成后，举行数日绕境，王爷神轿与王船巡行全境，信众在自家门口摆香案迎接，王爷「代天巡狩」视察民情、收押境内邪祟。\n4. 宴王：绕境结束后举行盛大筵席宴请王爷，庙方备办丰盛酒席，演戏酬神，连演数夜。\n5. 添载：送王前，信众将各种补给品（米粮、金银财宝纸扎、衣物、药材、生活用品）放入王船，让王爷带走充足资源。\n6. 送王（化王）：择定吉时，将王船移至海边或指定场地，在炮竹、锣鼓声中点火焚烧（或推入海），称「化王」。整艘王船连同所有供品在火光中化为灰烬，象征王爷带走境内的瘟疫与不祥。\n7. 送王后禁忌：王船燃烧期间及之后，信众不可捡拾灰烬，需保持肃穆直至王船完全烧尽。", "taboo": "王船燃烧期间及之后不可捡拾灰烬；不能说不吉利的话；建造王船期间工匠必须持斋戒；观看燃烧时不能背对王船。", "story": "送王船源于闽南沿海驱瘟逐疫的古老信仰，以建造纸制或木制王船，载上「王爷」神明和供品，最后焚烧或放流入海，象征将瘟疫、灾厄随船送走。此习俗体现了闽南海洋文明对疫病的特殊应对方式。2020年中马联合申报列入联合国非物质文化遗产。", "diff": "福建闽南地区（泉州、漳州沿海）送王船以焚烧为主；台湾南部（台南、屏东）送王船规模最大，常有实际入海的木制王船；马来西亚马六甲、槟城也保留此习俗，且保留了早期「放流入海」的传统。", "url": "https://app.notion.com/p/3681313e55f38013801dea65af7edb48"}, {"n": "土地公（福德正神）信仰", "py": "Thóo-tī-kong (Hok-tek Tsìng-sîn) sìn-gióng", "c": "🙏 民间信仰", "sc": "地方保护神", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "农历二月初二（土地公诞）；每月初二、十六做牙", "intro": "土地公是闽南最普及的地方守护神，负责管理一方土地的平安与财富，几乎每个社区、道路旁、田间都有土地公神坛，信众最广泛，祭拜频率最高（每月两次做牙）。", "items": "三牲或肉品、水果、糕品、土地公金（福金）、香烛、小鞭炮", "steps": "1. 每月初二、十六（做牙日），在土地公神坛或家中神明桌前摆设供品。2. 供品包括三牲或肉品、糕品、水果、糕饼。3. 点香祭拜，祈求地方平安、出入平安、财源广进。4. 焚烧金纸（土地公专用福金）。5. 燃放小鞭炮。6. 土地公诞（二月初二）：规模较大，部分社区举行绕境巡安。", "taboo": "土地公神坛不可背对大路（须朝路口）；祭拜时须先向土地公上香，再祭其他神明；不可称土地公为「土地爷」（不够尊重，闽南忌此称）。", "story": "土地公信仰源于上古土地崇拜，秦汉时定型为「社神」。闽南土地公形象为慈祥白须老翁，手持如意或元宝，身穿官袍。闽南语称土地公为福德正神，亦有称土地公伯，语气亲切如同邻家长辈。", "diff": "泉州：土地公神坛（称土地庙）遍布街巷，每逢做牙香火鼎盛；漳州：部分地区土地公庙规模较大，有专祠土地公娘（土地婆）的神坛；台湾：土地公庙数量全台最多（超过所有其他神庙之和），伯公信仰深入每个社区；新加坡：大伯公（福德正神）庙是最普遍的华人庙宇类型。", "url": "https://app.notion.com/p/3731313e55f381e3abc8fe4c63b39cfc"}, {"n": "王爷千岁信仰", "py": "Ông-iâ Chhian-sùi sìn-gióng", "c": "🙏 民间信仰", "sc": "瘟疫神／代天巡守", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★★★ 联合国非遗登录", "tm": "各王爷诞辰不一；送王船仪式农历不定期（三年或十二年一次）", "intro": "王爷千岁信仰是闽台最具特色的民间信仰之一，王爷（千岁）被视为代天巡守的天神使者，负责巡查人间、驱瘟镇邪，与送王船仪式密切相关，2020年已列入联合国非遗。", "items": "三牲五果、香烛、金纸；送王船仪式另需王船（纸扎或实体船）及各类供品", "steps": "1. 各王爷庙依所祠千岁诞辰举行祭典，备三牲五果。2. 举行绕境巡安，王爷神轿出巡，阵头随行，鞭炮轰鸣。3. 信众在路旁燃香恭迎神轿过境。4. 宫庙演歌仔戏或布袋戏供神。5. 送王船仪式为最盛大仪式，每隔数年举行一次。", "taboo": "王爷出巡时，孕妇及产后未满月者须回避神轿；神轿过门前须先燃炮迎接；不可称王爷为鬼（王爷为天神非鬼）。", "story": "王爷信仰起源于唐末五代，相传源自瘟神信仰。宋明时期士大夫阶层对瘟疫的恐惧使王爷信仰升格，由瘟疫神转化为巡守神（天庭钦差）。闽南各地王爷庙供奉的千岁各不相同（如朱、邢、李、池府千岁等），合称五府千岁。台南南鲲鯓代天府为全台王爷庙之首。", "diff": "泉州：以开基庙为正统，王爷信仰规模较台湾小；漳州：东山岛送王船为代表性仪式，已列入非遗；台湾南部：王爷信仰规模全球最大，台南南鲲鯓代天府为首；马来西亚：槟城、马六甲等地闽南社群保留送王船仪式。", "url": "https://app.notion.com/p/3731313e55f38141ab2bfa012b368306"}, {"n": "公妈厅祭祖", "py": "Kong-má-thiann tsè-tsóo", "c": "🏠 宗族与日常礼节", "sc": "宗族礼仪 / 祖先崇拜", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "除夕、清明、中元、冬至及各神明圣诞", "intro": "闽南家庭的正厅（大厅）设有神明厅与祖先牌位，闽南语称「公妈厅」，「公妈」即祖先。神明厅正中供奉主神，神明厅下方或两侧设祖先牌位龛，逢年过节必须先祭神、再祭祖，按辈分上香。日常每逢初一、十五也需换清水、换花、上香。", "items": "香炉（神明与祖先各一）、香（三炷一组）、蜡烛、鲜花、供杯与清水、三牲或五牲（节日）、糕饼、五果、米酒、茶、寿金、刈金（神明用）、银纸（祖先用）、供桌", "steps": "1. 日常维护：每逢初一、十五，更换神明厅的清水、换新鲜花朵、上三炷香，保持香火不断。\n2. 备供品（节日）：逢除夕、清明、中元、冬至等重要节日，备办较丰盛的供品：三牲或五牲、糕饼、五果、酒、茶。\n3. 祭神在前，祭祖在后：供品摆放顺序为先向神明上香、敬供，再向祖先牌位上香、敬供，不可颠倒。\n4. 上香礼节：持香以双手捧持，高举至眉心行三鞠躬，再将香插入炉中，插香以三炷为一组，中间高、两侧略低。\n5. 禀告事项：上香时于心中（或低声）向神明与祖先禀告家中近况、重要事件（如有人考试、出远门、生病、添丁等），请求庇佑。\n6. 献酒：以三个小酒杯盛米酒，依序向神明及祖先各敬三次，将酒轻倒在供桌前，完成献酒。\n7. 燃烧金纸：烧给神明的用「寿金」「刈金」，烧给祖先的用「银纸」（冥纸），两者不可混烧。\n8. 撤供：待香烧完后撤下供品，家人分食，视为分享神明与祖先的庇福。", "taboo": "祭神在前祭祖在后，顺序不可颠倒；寿金（给神明）与银纸（给祖先）不可混烧；香火不能中断。", "story": "公妈厅（祖先神主牌位厅）是闽南宗族文化的核心空间，源于儒家的祖先崇拜观念。「公妈」为闽南语对祖先的尊称，祭祖仪式体现闽南人对宗族血脉延续的重视，也是维系宗族认同的重要机制。", "diff": "台湾闽南家庭公妈厅保留完整，神明与祖先同祭于厅堂为一大特色；泉漳厦农村地区宗族祠堂祭祖仪式规模更大；海外闽南社群因生活环境改变，多以简化的祖先牌位替代。", "url": "https://app.notion.com/p/3681313e55f380889e2ce37c4768ae41"}, {"n": "面线（寿面）", "py": "Mī-suànn (Siū-mī)", "c": "🍜 饮食民俗", "sc": "节庆食俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（生辰、婚嫁、坐月子、乔迁、病愈等重要时刻）", "intro": "面线是闽南最具代表性的吉祥食物，细如发丝、长而不断，象征长寿与好运。凡人生重要时刻——生日、婚礼、生子、病愈、乔迁——桌上必有面线。闽南俗谚「食面线，卡紧大汉」，是闽南人情感与祝福的重要载体。", "items": "面线（喜庆用红面线，日常用白面线）；猪脚（生日用）；寿蛋（红蛋）；香菇、虾仁；猪骨高汤", "steps": "1. 备汤底：猪脚、香菇炖煮成浓汤（生日用猪脚寓意「脚踏实地、步步高升」）。\n2. 烫面线：另起一锅热水，面线快速烫熟约10秒，切勿久煮断线。\n3. 摆碗：面线置碗中，浇上汤底，码上卤猪脚、荷包蛋、虾仁。\n4. 生日必备：碗中加一颗煮熟红蛋（寿蛋），象征圆满长寿。\n5. 呈上：于寿星面前亲手递上，说吉祥话「食面线，长命百岁」。", "taboo": "煮面线严禁剪断（断线象征短寿）；不可催人「先吃」（须等主人示意）；丧事场合不用红面线；送礼须成把，不可散送。", "story": "面线之「线」谐音「延」，寓意延年益寿。泉州、漳州至今保留手工面线作坊，工匠在露天大架上反复拉伸晒干。「面线猪脚卵」（面线+猪脚+鸡蛋）是闽南母亲给坐月子女儿送的第一份食物，将食补与情感融为一体。", "diff": "泉州：面线糊（面线煮成糊状，加卤大肠、醋肉、豆腐）是泉州早餐名吃，与寿面分属两种吃法；台湾：生日吃面线已成全台习俗，超市有现成寿面礼盒；新加坡、马来西亚：闽籍华人以红面线为寿诞必备。", "url": ""}, {"n": "土笋冻", "py": "Thóo-sún-tàng", "c": "🍜 饮食民俗", "sc": "地方特色食俗", "lv": "L2 泉州/厦门", "rg": ["泉州", "厦门"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "全年（秋冬品质最佳）", "intro": "土笋冻是闽南（尤以泉州、厦门）特有的传统冷食，以海边沙滩中的「土笋」（方格星虫，学名Phascolosoma esculenta）熬煮后天然凝冻而成。外形似果冻，内含完整虫体，口感Q弹爽滑，蘸酱醋蒜末食用，是外地游客必尝的闽南奇特名小吃。", "items": "土笋（方格星虫，鲜活为佳）；清水；小圆模具；蘸料（酱油、醋、蒜末、芥末或辣椒酱）", "steps": "1. 处理：活土笋反复揉搓清洗，去除内脏与沙粒，换水多次至水清。\n2. 熬煮：清水下锅放入土笋，大火煮沸后转中火约30分钟，至汤汁浓稠胶质充分析出。\n3. 装模：土笋逐一放入小圆模具，倒入汤汁至满。\n4. 冷却凝固：常温放凉后移入冰箱（或冬季室温下）约2小时至凝固。\n5. 脱模食用：倒扣模具取出，呈透明圆柱形；调蘸料（酱油+醋+蒜末）蘸食，可加芥末或辣椒酱。", "taboo": "须选鲜活土笋（死虫制成的易腥）；孕妇慎食（性偏寒）；不可加热（受热即溶化）；不宜存放超过两天。", "story": "土笋冻的发明有传说与郑成功有关：明末清初郑成功于厦门驻兵，粮草不足，士兵挖取海边土笋充饥，煮后发现汤汁天然凝冻、滋味鲜美，遂流传开来。此传说真实性难考，但土笋冻作为泉厦独特食俗已有数百年历史，核心原料方格星虫只生长于特定海岸沙滩，无法人工养殖，是真正意义上的「地方限定」食俗。", "diff": "泉州：产地主要在晋江、石狮海岸，家庭小作坊为主，圆柱形；厦门：商业化程度较高，岛内各市场均有售；金门、台湾：有少量引进但未成主流；海外闽南社群：因原料依赖特定沿海生态，几乎无法复制。", "url": ""}, {"n": "沙茶面", "py": "Sa-tê mī", "c": "🍜 饮食民俗", "sc": "地方特色食俗", "lv": "L2 厦门/漳州", "rg": ["厦门", "漳州", "泉州", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年", "intro": "沙茶面是厦门最具代表性的民间小吃，以沙茶酱为汤底，加入各式荤素配料。沙茶酱源自东南亚马来语satay，随南洋华人回流带入厦门后本地化，形成有别于东南亚沙爹的独特厦门风味，是闽南饮食中「侨乡交融」最典型的案例。", "items": "碱水面（或油面）；厦门沙茶酱（以花生、椰丝、虾米、香料制成）；猪血、大肠、豆腐干、豆芽、海蛎（可选配）；猪骨高汤", "steps": "1. 熬汤底：猪骨高汤大量加入沙茶酱，搅匀煮沸，调入盐、酱油。\n2. 烫面：碱水面用漏勺放入开水烫熟约20秒，置碗中。\n3. 烫配料：猪血、大肠等荤料另行处理后加入；豆芽与面一同烫熟。\n4. 浇汤：将沙茶汤底浇于面上，配料铺顶，可另加辣椒酱或醋调味。", "taboo": "沙茶酱含花生，花生过敏者忌；汤底浓稠易上火，体质燥热者适量食用；以现点现烫为佳，久置面条发烂失味。", "story": "沙茶面的沙茶酱来自马来群岛的「沙爹」（satay）酱料，由下南洋的闽南华人带回。19世纪末至20世纪初，大批归侨将东南亚饮食习惯带入厦门，沙茶酱经本地化改造——增加花生比例、减少椰奶——形成与马来沙爹截然不同的厦门风味。沙茶面因此成为闽南饮食融合移民文化的活化石，一碗面里藏着侨乡历史。", "diff": "厦门：沙茶面遍布全市，各家沙茶酱配方不一，是最具代表性的厦门早餐之一；漳州、泉州：有沙茶面，但汤底配料略有不同；台湾：台南一带有沙茶牛肉吃法，与厦门沙茶面同源不同流；新加坡、马来西亚：当地sataythee（沙茶面）保留闽南风格，是著名小贩中心食物。", "url": ""}]);
DATA = DATA.concat([{"n": "碗糕", "py": "Uánn-kué", "c": "🍜 饮食民俗", "sc": "节庆糕点", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年（正月、节庆祭祀时尤为常见）", "intro": "碗糕是闽南传统米食，以在来米磨浆加糖蒸制，盛于陶碗中，顶部蒸后自然开裂呈花瓣状，称「笑碗糕」。「笑」象征笑口常开、诸事顺心，是闽南祭祀神明与祖先最常见的供品之一，红碗糕（红糖）用于喜庆，白碗糕（白糖）日常皆宜。", "items": "在来米（籼米）；红砂糖（红碗糕）或白砂糖（白碗糕）；酵母（或老面引子）；陶碗或纸碗；蒸锅", "steps": "1. 浸米：在来米提前浸泡4小时，沥干。\n2. 磨浆：浸好的米加水磨成细浆（可用食物处理机）。\n3. 调味：米浆加入糖，搅拌至完全溶化。\n4. 发酵：加少量酵母静置发酵1–2小时（传统以老面引子需4–6小时）。\n5. 装碗：发酵米浆倒入陶碗至八分满。\n6. 蒸制：大火蒸约20分钟，顶部自然裂开呈花瓣状（即「笑」）。\n7. 放凉：稍凉后供奉或食用。", "taboo": "蒸制时不可中途开盖（影响开裂）；糖量不足则不笑（开裂不完全，被视为不吉）；供奉用须完整，不可预先切开；丧事只用白碗糕，不用红碗糕。", "story": "碗糕之所以成为祭祀首选，关键在于「笑」的象征——顶部开裂似笑脸，代表神明高兴、祭祀顺利。闽南人十分重视碗糕是否「有笑」，开裂越完整越吉利。发酵程度与糖量是决定「会不会笑」的关键，老一辈主妇凭经验掌控，是技艺也是智慧。", "diff": "泉州：碗糕是元宵、做牙等节庆必备供品，泉州老城区仍有碗糕老店；漳州：碗糕与泉州大同小异，部分地区会加花生；台湾：「碗粿」在台湾演变为加肉燥、香菇的咸食版本，与闽南原版甜食碗糕分道扬镳；新加坡：称「kuih mangkok」，仍以甜食为主。", "url": ""}, {"n": "满煎糕", "py": "Muá-tsian-kué", "c": "🍜 饮食民俗", "sc": "传统糕饼", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年（庙会、元宵节前后尤盛）", "intro": "满煎糕是闽南传统街头食物，以糯米粉制成厚实软糯圆饼，内填花生糖或芝麻糖馅，于铁鼎中用猪油煎制，外皮金黄微脆，内层绵软甜香。庙会、夜市最为常见，「满」取「满满当当、富足圆满」之意，是闽南人从小吃到大的集体味觉记忆。", "items": "糯米粉；清水；猪油；花生碎+红砂糖（馅料）；熟芝麻（表面用）", "steps": "1. 和面：糯米粉加温水揉成软硬适中的面团，醒发20分钟。\n2. 调馅：花生碎加红砂糖、少许熟芝麻混匀（亦可用芝麻糖）。\n3. 分剂：面团分成若干份，每份擀成圆形薄皮。\n4. 包馅：将馅料包入面皮，捏紧封口，轻压成厚约1.5厘米的圆饼。\n5. 热锅：铁制平鼎加猪油，中小火。\n6. 煎制：圆饼入锅加盖煎至底面金黄翻面，两面均金黄熟透，全程约10分钟。\n7. 起锅：表面撒少许芝麻，趁热食用。", "taboo": "煎制宜用猪油（色泽与香气最佳）；火不可过大（外焦里生）；不宜久置（冷后变硬，口感大打折扣）。", "story": "满煎糕的「满」象征富足圆满，因此在闽南喜庆场合极为常见。传统制作者使用特制厚重铁鼎，火候全凭经验掌控。泉州老城区至今仍有坚持传统做法的摊贩，沿街叫卖声与煎糕香气混合，是泉州街巷的声音与气味记忆。", "diff": "泉州：馅料以花生糖为主，体型较大；漳州：花生馅中有时加椰丝；台湾：称「满煎糕」或「煎粿」，各地夜市均可见，馅料变化较多（红豆、花生等）；新加坡、马来西亚：称「min chian kueh」，是闽南华人传统糕点，目前以小贩中心为主要售卖场所。", "url": ""}, {"n": "肉粽（闽南粽子）", "py": "Bah-tsàng", "c": "🍜 饮食民俗", "sc": "节庆食俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历五月初五端午节（日常亦有售）", "intro": "闽南肉粽（bah-tsàng）以糯米包裹猪肉、香菇、栗子、虾仁、咸蛋黄等丰盛馅料，以竹叶扎紧蒸煮，是闽南端午节必备食物，也是逢年过节馈赠亲友的重要礼品。与北方粽子不同，闽南肉粽馅料极为丰富，食用时蘸酱油膏，体现闽南饮食「宁可食无菜，不可食无料」的哲学。", "items": "长糯米；猪五花肉（卤过）；香菇；栗子；虾仁；咸蛋黄；花生；竹叶；棉绳；卤肉酱汁", "steps": "1. 备料：糯米浸泡4小时；竹叶热水烫软；猪肉加酱油、五香粉腌制后略炒；香菇泡发切块；栗子煮熟；虾仁盐腌备用。\n2. 卷叶：两片竹叶叠放，卷成漏斗形。\n3. 装米：填入一层糯米，压实。\n4. 填馅：加猪肉、香菇、栗子、虾仁、咸蛋黄，再覆一层糯米。\n5. 封口：竹叶折叠封紧，棉绳扎牢。\n6. 蒸煮：大锅蒸2小时（或水煮3–4小时）。\n7. 食用：解开竹叶，配酱油膏、甜辣酱食用。", "taboo": "煮制须保持水量（中途只可加热水，加冷水则粽子夹生）；捆绑须扎紧（否则煮散）；拆粽后须当日食用。", "story": "一颗上好的闽南肉粽需耗时半天以上备料制作，馅料可多达八九种，体现了闽南人对「丰盛」的执着。端午前，闽南家家户户包粽，街巷间弥漫竹叶与肉香，是最具闽南集体感官记忆的节庆场景。闽南肉粽也是南洋华人最重要的年节礼品，新加坡、马来西亚的「粽子节」热度延续至今。", "diff": "泉州：馅料最丰富，以咸蛋黄为必备；漳州：偏咸鲜，有时加五香豆干；厦门：体型略小，商业化程度高；台湾：南部粽（台南、高雄）水煮后接近闽南原型，北部粽蒸制有所不同；新加坡、马来西亚：「娘惹粽」是融合峇峇文化的变体，加入香兰叶等东南亚香料。", "url": ""}, {"n": "扁食（闽南馄饨）", "py": "Pián-si̍t", "c": "🍜 饮食民俗", "sc": "地方特色食俗", "lv": "L2 泉州/漳州", "rg": ["泉州", "漳州", "厦门", "台湾"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年（冬至、生日、婚庆尤盛）", "intro": "扁食是闽南（尤以泉州）特有的薄皮馄饨，以猪腿肉手工捶打成胶状肉泥为馅，包入薄如蝉翼的面皮，煮后浇清汤食用，口感嫩滑弹牙。泉州扁食以「手捶」著称——用木棒将猪腿肉反复捶打而非绞碎，形成有别于机器绞肉的独特弹牙口感，是泉州老城区最具代表性的传统面食。", "items": "薄面皮（扁食皮，比北方馄饨皮更薄）；猪腿肉（手捶肉泥）；虾仁（可选）；猪骨清汤；葱花、香菜、白胡椒粉；少量酱油", "steps": "1. 捶肉：猪腿肉剔去筋膜，置于石板上，用木棒反复捶打约30分钟，至肉质呈胶状、有黏性（此为弹牙口感的关键）。\n2. 调馅：肉泥加盐、少量酱油、葱花拌匀，反复摔打至起黏性。\n3. 包制：取面皮挑入少量肉馅，对折后捏成元宝形（泉州特色）。\n4. 煮汤：猪骨熬制清汤备用。\n5. 下锅：沸水下扁食，浮起后再烫约30秒，捞入碗中。\n6. 浇汤：浇猪骨清汤，加香菜、葱花、白胡椒粉、少量猪油。", "taboo": "肉馅须手工捶打（机器绞肉口感差，失去扁食精髓）；面皮不可过厚（厚皮盖过肉香）；清汤宜清淡，不宜重调料（喧宾夺主）；不可久泡汤中（面皮发烂）。", "story": "「扁食」之名源于其薄皮，与北方馄饨厚皮相区别。泉州扁食以「手捶」著称，与泉州民间对食材原味的执着相关——捶打而非绞碎，保留猪肉纤维结构，使肉馅既嫩又弹。泉州老城区至今仍有坚持手工捶肉的老字号，捶肉声是泉州街巷的传统声音景观，已成为城市记忆的一部分。", "diff": "泉州：手捶肉馅最具代表性，以清汤版本为主；漳州：馅料有时加入虾仁或荸荠；厦门：也有扁食但不如泉州具代表性；台湾：「扁食」一词在台南仍沿用，制法与泉州相近，是闽南移民带去的饮食记忆；新加坡、马来西亚：部分闽南老字号仍制作扁食，称「pian sip」。", "url": ""}, {"n": "歌仔戏", "py": "Ko-á-hì", "c": "🎭 戏曲与口传文艺", "sc": "地方戏曲", "lv": "L1 共通闽南俗", "rg": ["漳州", "厦门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（庙会、节庆、婚寿喜庆）", "intro": "歌仔戏是20世纪初在台湾发展成熟、后传回闽南的地方戏曲，以闽南语演唱，融合台湾本土歌谣、锦歌（漳州民间音乐）与北管音乐，是唯一发源于台湾的汉族传统戏曲剧种，也是现存闽南语地方戏中传播最广、影响最大的剧种。", "items": "舞台（或野台搭建）；戏服（生旦净末丑各行当）；文武场乐器（壳仔弦、大广弦、月琴、笛、锣鼓）；剧本（多为历史传奇、神话故事）", "steps": "1. 请戏：庙宇或主家向戏班下聘，确定演出日期、剧目、价格。\n2. 搭台：演出前一日搭设野台（户外舞台），对向神明（「内台」朝向神明，「外台」朝向观众）。\n3. 开锣：演出前敲锣，吸引观众聚集。\n4. 扮仙：正式演出前必先演「扮仙戏」，以八仙、天官等神仙出场为神明祝寿祈福。\n5. 正戏：演出主体剧目，一场完整演出通常历时3–4小时。\n6. 谢神：演出结束后向神明行礼致谢，撤台。", "taboo": "扮仙戏不可省略（为神明演戏，必须先敬神）；演出中不可背对神明方向；戏台上禁止非演职人员随意进入；演出期间忌说不吉利的话。", "story": "歌仔戏约于20世纪初由台湾宜兰一带发展成形，以漳州移民带来的「歌仔」（民间说唱）为基础，融合多种音乐元素，迅速在台湾闽南族群中流行。日据时期曾遭打压，以「内台歌仔戏」（室内商业演出）形式延续。光复后歌仔戏逐渐回传至漳州、厦门，形成「歌仔戏」与「芗剧」两个并行称谓（芗剧为大陆官方名称）。", "diff": "台湾：歌仔戏在台湾保存最完整，有野台戏、内台戏、电视歌仔戏等多种形式，国家重视传承，设有专业剧团；漳州、厦门：以「芗剧」名称为主，有专业院团，但民间野台演出不如台湾普遍；新加坡、马来西亚：闽南社群保留歌仔戏演出传统，多在庙会时邀请台湾或本地戏班演出。", "url": ""}, {"n": "高甲戏", "py": "Ko-kah-hì", "c": "🎭 戏曲与口传文艺", "sc": "地方戏曲", "lv": "L2 泉州/厦门", "rg": ["泉州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（庙会、神诞、婚寿喜庆）", "intro": "高甲戏是闽南（尤以泉州）最具代表性的地方戏曲剧种之一，以泉州方言演唱，起源于明末清初的民间化装游行（宋江阵），逐渐发展为融合北管、南管音乐的成熟戏曲。以丑角表演最具特色，有「无丑不成戏」之说，丑角表演技艺被列入国家非物质文化遗产。", "items": "舞台；泉州传统戏服；南北管乐器（唢呐、壳仔弦、锣鼓）；面具（部分丑角用）", "steps": "1. 请戏：主家或庙宇下聘戏班，协商剧目。\n2. 扮仙：演出必先「扮仙」祝寿祈福。\n3. 正戏：演出历史传奇或神话剧目，文戏（生旦表演）与武戏（打斗特技）交替进行。\n4. 丑角表演：高甲戏精华在于丑角，有「文丑」「武丑」「女丑」等细分，以即兴插科打诨见长。", "taboo": "扮仙戏不可省略；丑角不可在后台着妆状态面朝神明方向（丑角形象不雅，避免冒犯神明）；演出中忌演员在台上摔倒不起（须迅速站起，不可停留地面）。", "story": "高甲戏起源说法多样，主流说法认为其前身是清代泉州民间盛行的「宋江阵」武阵表演，后吸收梨园戏、北管等音乐，并从京剧引入部分行当与剧目，逐渐发展为成熟剧种。「高甲」之名，一说来源于表演者登高台（「高台」），另一说与闽南语「高」（身份高贵）有关。泉州现有国家级高甲戏剧团，定期演出并承担传承职责。", "diff": "泉州：高甲戏最为兴盛，有国家级剧团，代表剧目有《连升三级》《大闹花府》等；厦门：也有高甲戏演出但不如泉州普遍；金门：保留传统高甲戏演出习俗；台湾：台湾早期有高甲戏班，现已式微，但部分文化团体仍致力推广；新加坡、马来西亚：闽南移民带去了高甲戏传统，目前以庙会演出为主。", "url": ""}, {"n": "提线木偶戏", "py": "Thê-suànn bo̍k-ngóo-hì", "c": "🎭 戏曲与口传文艺", "sc": "传统傀儡艺术", "lv": "L2 泉州", "rg": ["泉州", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（神诞、庙会、婚寿喜庆；开幕仪式必用）", "intro": "泉州提线木偶戏（傀儡戏）是中国现存历史最悠久的傀儡戏剧种之一，木偶以30余根细线操控，可完成眨眼、吐舌、变脸、书写等精细动作。在闽南，提线木偶戏不仅是表演艺术，更具宗教仪式功能——开幕仪式、神明圣诞必不可少，被视为沟通人神的媒介。", "items": "提线木偶（高约60–80厘米，由头、躯干、四肢组成，附30余根操控线）；操偶架（挑担式）；南管伴奏乐器；幕布与舞台", "steps": "1. 开幕仪式：演出前必演《扶桑》或《下山》等开幕仪式戏，迎神纳祥。\n2. 正戏演出：操偶师站于幕后，以双手及腕部操控悬线，驱动木偶表演。精熟操偶师可同时操控一只木偶完成复杂动作。\n3. 唱念做：操偶师兼顾操线与唱腔，或另有专职唱念演员配合。\n4. 收幕：演出结束后木偶须妥善收存，不可随意摆放（视为有神灵附身）。", "taboo": "木偶不可头朝下存放（被视为对神灵不敬）；演出仪式戏不可省略；非演出时木偶不可随意示人把玩；操偶师演出前须洁净（传统上要求沐浴斋戒）。", "story": "泉州提线木偶戏历史可追溯至唐代，宋元时期随泉州成为「东方第一大港」，傀儡戏随商贸传播至东南亚各地。其木偶头雕刻技艺独树一帜，江加走（1871–1954）所雕木偶头被誉为「国宝」，现存三百余件，生动呈现了闽南美学的精髓。2012年，泉州提线木偶戏被列入联合国教科文组织人类非物质文化遗产代表作名录。", "diff": "泉州：提线木偶戏保存最完整，有国家级剧团「泉州市木偶剧团」，长期巡演世界各地；金门：保留提线木偶的宗教仪式功能，庙会必请；台湾：台湾傀儡戏（吊线傀儡）与泉州提线木偶同源，仍保留婚丧礼俗中的使用传统；新加坡、马来西亚：闽南移民带去了傀儡戏，华人庙宇庆典时仍可见演出。", "url": ""}, {"n": "布袋戏（掌中戏）", "py": "Pòo-tē-hì (Tsióng-tiong-hì)", "c": "🎭 戏曲与口传文艺", "sc": "传统傀儡艺术", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾", "新加坡", "马来西亚"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（庙会、神诞、节庆；台湾电视布袋戏全年播出）", "intro": "布袋戏（掌中戏）以手掌套入木偶头身操控，是闽南与台湾共有的传统表演艺术。木偶头套于手指，食指撑头、拇指与中指各控一臂，单手即可操演一偶，技艺高超者双手同时操控对打场面。在台湾，布袋戏经过20世纪的电视化与商业化，发展出「金光布袋戏」等独特流派，成为影响几代台湾人的大众文化。", "items": "布袋戏偶（木雕头、布制身衣、手套式躯体）；布景彩楼（戏台）；南管或北管伴奏；剧本（历史、武侠或神话题材）", "steps": "1. 搭台：布袋戏台（「彩楼」）精心雕刻装饰，演出时置于庙前或室内。\n2. 扮仙开场：与其他闽南戏曲同，演出前必演扮仙戏祝寿纳祥。\n3. 正戏：操偶师于幕后将手伸入偶身，以指法控制木偶动作；唱念或另请人配音，或操偶师自行演唱。\n4. 武打场面：双手各操一偶，以身形节奏模拟格斗，是最考验技艺的段落。", "taboo": "布袋戏偶不可头朝下放置；传统上偶头不可随意示人（视为有神性）；演出前须祭拜「田都元帅」（戏神）；女性演员传统上不可接触戏偶（部分保守传统）。", "story": "布袋戏起源于17世纪的泉州、漳州一带，相传由落第书生梁炳麟所创——他科举屡试不中，将满腹诗书化为偶戏剧本，偶戏因而兼具文学性与表演性。布袋戏传入台湾后，在20世纪50–70年代迎来黄金时期，外台布袋戏场场爆满；1970年代起进入电视，「云州大儒侠史艳文」创下95%收视率的神话，开创台湾「金光布袋戏」时代。", "diff": "泉州、漳州：传统布袋戏保留南管伴奏与文学唱词，风格典雅，现有国家级传承人；台湾：布袋戏走向商业化、特效化，「霹雳布袋戏」系列以史诗武侠为题材，拥有数十年剧集，是独特的台湾流行文化现象；新加坡、马来西亚：闽南华人保留传统布袋戏演出，庙会时邀请戏班演出。", "url": ""}, {"n": "闽南童谣与谚语", "py": "Bín-lâm tâng-iâu kap iân-gí", "c": "🎭 戏曲与口传文艺", "sc": "口传文艺", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "全年（日常口传；部分与节庆对应）", "intro": "闽南童谣与谚语是闽南语口传文化的核心组成，承载着语言教育、生活智慧、民俗信仰与历史记忆。童谣以简单韵律帮助幼儿习得方言与生活常识；谚语则浓缩了闽南人对天候农时、人情世故、饮食健康的代代观察，是活态的民间哲学。", "items": "无需物品（纯口头传承）；部分童谣配合拍手、跳绳等动作游戏", "steps": "【童谣传承】\n1. 长辈在日常照料中随口吟唱（哄睡、喂食、游戏时）。\n2. 孩子在模仿中习得语音与韵律，进而习得方言。\n3. 童谣配合肢体游戏（如「月光光，秀才郎」配合拍手节奏），强化记忆。\n【谚语运用】\n1. 长辈在日常对话中引用谚语点评事物（如「爱拼才会赢」激励晚辈）。\n2. 节庆场合（如端午、冬至）引用对应谚语（如「冬至圆仔呷落去，添岁又添福」）。", "taboo": "部分谚语有禁忌语境（如描述霉运的谚语不在新年期间说）；童谣中涉及死亡、鬼怪的内容不在夜晚随意吟唱（传统忌讳）。", "story": "闽南谚语数量庞大，仅泉州地区收录的谚语就超过万条，涵盖天候（「未食五月粽，破裘不敢放」——端午前天气仍不稳，不可收起厚衣）、饮食（「医生惊治嗽，土水惊抹壁」——医生怕治咳嗽、泥水匠怕抹墙，指两件最难的事）、人情（「在生一粒豆，卡好死了拜猪头」——生前一颗豆胜过死后祭品，强调及时孝顺）等方方面面。这些谚语以闽南语的音韵美为载体，一旦翻译成普通话便失去大半魅力。", "diff": "泉州：谚语体系最完整，学界已有系统整理；漳州：部分谚语与泉州共通，但语音与用词有别；台湾：台湾闽南语谚语与福建同源，但融入了台湾本土经验，产生部分新谚语；新加坡、马来西亚：南洋闽南社群的谚语融合了当地生活经验，出现「番仔谚语」（融合马来语的闽南谚语）等变体。", "url": ""}, {"n": "讲古（闽南说书）", "py": "Kóng-kòo", "c": "🎭 戏曲与口传文艺", "sc": "口传说唱艺术", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年（茶馆、庙埕、家庭聚会；现多为广播/电台节目）", "intro": "讲古（kóng-kòoo）是闽南民间说书艺术，以闽南语讲述历史故事、神话传奇、民间故事，一人主讲，听众围坐，是电视普及前闽南社会最重要的大众娱乐与知识传播方式。讲古艺人声调抑扬、情节跌宕，往往在紧要关头「收煞」（卖关子），让听众明日再来。", "items": "折扇或醒木（提神道具，可选）；茶桌（传统在茶馆表演）；无需其他道具（以口语为核心）", "steps": "1. 开场：讲古人以一段定场词或诗句引入，吸引听众注意。\n2. 铺陈：交代背景人物，以闽南语俗语、谚语点缀，建立情景。\n3. 推进：情节逐步推进，配合声调变化、节奏快慢模拟不同人物声音与情绪。\n4. 关子（收煞）：在情节高潮处突然停止，「欲知后事如何，且听下回分解」。\n5. 互动：听众可提问，讲古人即兴回应，维持现场气氛。", "taboo": "讲古忌照本宣科（须有现场发挥，否则失去口传精髓）；忌讲述时间过短（听众有「不值」感）；传统上丧事期间不讲喜庆故事（须调整题材）。", "story": "讲古在闽南社会曾有极高地位，是知识传播与道德教化的重要渠道——不识字的民众通过讲古了解历史典故、忠孝节义。20世纪中期，台湾广播讲古风靡一时，吴乐天（1931–2017）是最具代表性的台湾讲古人，其闽南语说书节目伴随了几代台湾人的成长记忆。电视普及后，讲古逐渐式微，但在部分地方电台与网络平台仍有传承。", "diff": "泉州、漳州：讲古曾在茶馆与庙埕广场流行，现多为民俗表演；台湾：讲古曾在广播时代极为兴盛，现仍有爱好者在Podcast等新媒体上延续；新加坡、马来西亚：闽南华人社群中有讲古传统，部分文化团体定期举办讲古活动以传承闽南语文化。", "url": ""}, {"n": "惠安石雕", "py": "Huì-an tsio̍h-tiau", "c": "🏡 传统建筑与工艺", "sc": "传统工艺", "lv": "L2 泉州", "rg": ["泉州"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "—（建筑工艺，非时节性习俗）", "intro": "惠安石雕是福建省泉州市惠安县的传统雕刻工艺，已有1600余年历史，以花岗岩为主要材料，擅长雕刻人物、动物、建筑构件与宗教器物。惠安石雕遍布闽南宫庙、祠堂、红砖厝的柱础、龙柱、石狮，是闽南建筑美学的物质基础，2006年被列入国家级非物质文化遗产名录。", "items": "花岗岩（青斗石、白石为上品）；凿子、锤子（传统手工具）；砂轮机（现代辅助）；设计图稿", "steps": "1. 选料：按雕刻用途选取合适石材，宗教器物多用青斗石（质地细密）。\n2. 放样：在石料表面用墨线勾勒草图，确定比例与结构。\n3. 打荒：用大锤凿去多余石料，取得大致形态（粗坯）。\n4. 细雕：换用小型凿子逐步雕出细节——衣纹、面部表情、毛发鳞片等。\n5. 打磨：用砂纸或砂轮将表面磨光，去除凿痕。\n6. 安装：建筑构件（柱础、门墩）按图纸安装于建筑相应位置。", "taboo": "宗教雕刻（神明像、龙柱）须由有经验的老师傅主持；雕刻神明面部时须沐浴洁身；神明像安装后须经「开光」仪式方可供奉。", "story": "惠安石雕随闽南移民足迹遍布东南亚，马来西亚槟城、新加坡的华人庙宇，多有惠安石雕留存。惠安县崇武镇至今是全国最重要的石雕产地，当地形成「石雕村」格局，几乎家家户户从事石雕相关产业。惠安女（惠安妇女）因其男性长年外出从事石雕，形成了独立撑家的文化特色，成为另一道闽南风景。", "diff": "惠安：石雕工艺最完整，青斗石龙柱、石狮为代表作；泉州城区：宫庙中大量使用惠安石雕构件；台湾：许多日据时期及光复后所建庙宇聘请惠安师傅主持石雕工程，留下大量作品；东南亚：新加坡天福宫、槟城极乐寺等著名华人庙宇均有惠安石雕。", "url": ""}, {"n": "漆线雕", "py": "Tshat-suànn-tiau", "c": "🏡 传统建筑与工艺", "sc": "传统工艺", "lv": "L2 泉州", "rg": ["泉州"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "—（建筑工艺，非时节性习俗）", "intro": "漆线雕是泉州独有的传统手工艺，以天然生漆调和砖粉、铁红粉等制成柔韧「漆线」，在佛像、器物表面盘绕成精细图案，再施以贴金或彩绘，形成富丽堂皇的立体装饰效果。因工艺繁复、造型精美，漆线雕主要用于神佛造像的袍服装饰，是泉州「佛具四艺」（木雕、泥塑、漆线雕、彩绘）之一，2006年列入国家非遗名录。", "items": "生漆（中国大漆）；砖粉、铁红粉（调制漆线用）；漆线盘（辅助盘线工具）；木胎或泥胎底材；金箔；彩漆", "steps": "1. 调制漆线：将生漆与砖粉、铁红粉按比例混合，反复揉搓至细腻均匀，搓成如细线般的漆线条。\n2. 起稿：在胎体表面用铅笔勾勒图案轮廓（云纹、龙凤、花草等传统纹样）。\n3. 盘线：将漆线按图案轮廓，用指尖细心盘压粘附于胎体，形成凸起线条。\n4. 填充：在线条框定的区域内填入漆线堆叠，形成立体浮雕效果。\n5. 贴金：干燥后在漆线表面涂贴金箔，呈现金碧辉煌效果。\n6. 彩绘：部分区域施以矿物彩漆，与金色形成对比。", "taboo": "漆线调制须在适当温湿度环境中进行（过干则漆线易断）；贴金须在无风环境中操作（风吹则金箔飞散）；神佛像漆线雕完成后须经开光方可供奉。", "story": "漆线雕技艺在泉州已有千年历史，与泉州兴盛的佛教信仰紧密相关——宋元时期泉州庙宇林立，对精美神佛造像的大量需求，催生了漆线雕技艺的繁荣。泉州蔡氏漆线雕已传承十三代，第十三代传人蔡水况被认定为国家级非遗传承人，其工作室至今仍以手工制作漆线，坚持传统工艺。", "diff": "泉州：漆线雕技艺独有，与其他地区同类工艺有明显区别；厦门、漳州：使用泉州漆线雕神像，但本地无独立漆线雕工艺；台湾：台湾佛具业早期大量引进泉州漆线雕神像；东南亚华人庙宇：神佛造像多来自泉州，漆线雕是其重要特征。", "url": ""}, {"n": "德化瓷器", "py": "Ti̍k-huà hûi-khì", "c": "🏡 传统建筑与工艺", "sc": "传统工艺", "lv": "L2 泉州", "rg": ["泉州", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "—（传统工艺，非时节性习俗）", "intro": "德化瓷器产自福建省泉州市德化县，以「象牙白」（中国白）最为著名，胎质细腻、釉色如玉，是中国三大古瓷都之一（与景德镇、醴陵并列）。宋元时期德化瓷经泉州港销往全球，海外又称「中国白」（Blanc de Chine）。德化瓷以白釉人物塑像（观音、达摩等）最具代表性，是闽南宗教信仰与艺术美学的结晶。", "items": "高岭土（德化本地特有瓷土）；拉坯机（轮制）或模具（注浆）；釉料（透明白釉为主）；窑炉（传统龙窑或现代梭式窑）", "steps": "1. 选土：取德化本地高岭土，经淘洗、陈腐备用。\n2. 成型：可轮制拉坯（器皿类）或模具注浆（人物雕塑类）。\n3. 修坯：半干状态下修整器形，雕刻细节（衣纹、发丝、手指）。\n4. 施釉：干燥后浸釉或喷釉，德化白釉厚而均匀。\n5. 装窑烧制：高温（1280–1320℃）烧制，传统用松柴龙窑，现多用电窑或气窑。\n6. 出窑检验：冷却后出窑，检视釉色与器形，次品剔除。", "taboo": "神佛题材瓷塑（观音、弥勒等）传统上不得将废品随意丢弃（须集中处理，以示尊重）；开窑时有仪式，须先祭拜窑神（德化窑神为「田公元帅」）。", "story": "德化瓷器自宋代起便是泉州海上丝绸之路的核心出口商品。16–17世纪，欧洲贵族以拥有「中国白」（Blanc de Chine）为时尚，法国凡尔赛宫、英国皇室均有收藏。何朝宗（明代）是德化最著名的瓷塑大师，其署名观音像被誉为「东方艺术明珠」，现为国际博物馆珍藏。德化窑址于2021年列入世界文化遗产（泉州史迹之一）。", "diff": "德化县：现代德化是全国最大的陶瓷出口基地，传统「象牙白」工艺与现代工业生产并存；泉州：德化瓷广泛用于闽南宫庙的神佛像与供器；台湾：许多台湾寺庙中的白瓷观音像来自德化；东南亚：华人庙宇和家庭供奉的德化白瓷神像随处可见，是闽南信仰文化的物质载体。", "url": ""}, {"n": "闽南木雕", "py": "Bín-lâm bo̍k-tiau", "c": "🏡 传统建筑与工艺", "sc": "传统工艺", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "—（建筑工艺，非时节性习俗）", "intro": "闽南木雕是闽南传统建筑与工艺的重要组成，以樟木、杉木为主要材料，运用透雕、浮雕、圆雕等技法，雕刻神龛、神轿、供桌、建筑梁枋与门窗装饰。闽南木雕以「精工细作」著称，一件神轿或神龛往往需数名师傅耗时数年完成，是宗教信仰与民间美学的综合体现。", "items": "樟木（防虫蛀，神龛神轿用）、杉木（建筑构件用）；各式雕刻刀（平刀、圆刀、斜刀）；木工榫卯工具；金漆（完成后涂饰）", "steps": "1. 设计：依照用途绘制图稿，确定尺寸与纹样（龙凤、人物故事、花鸟鱼虫）。\n2. 开料：选取合适木材，按图开料。\n3. 打坯：用大刀具去除余料，确定体量与大致形态。\n4. 细雕：换用小刀具雕刻细节，透雕（镂空）、浮雕（凸起）、圆雕（立体）各显其能。\n5. 打磨：细砂纸磨平雕刻面，去除刀痕。\n6. 上漆贴金：传统工艺最后涂金漆、贴金箔，使木雕呈现金碧辉煌效果，也起到防腐作用。", "taboo": "神龛、神轿雕刻须由有经验师傅操作；雕刻神明形象时不得嬉笑玩闹（须保持庄重）；完工的神龛须经「开光点眼」仪式后方可安神。", "story": "闽南木雕技艺随闽南移民遍及台湾与东南亚。台湾鹿港是保存闽南木雕技艺最完整的地区之一，当地「鬼斧神工」的神轿制作吸引全台订单。漳州木偶头雕刻是闽南木雕的特殊分支，与提线木偶戏紧密相连。东南亚华人庙宇的精美木雕神龛，多出自闽南（尤其泉州、漳州）师傅之手。", "diff": "泉州：木雕以神龛、神轿、供桌为大宗，与宗教信仰紧密结合；漳州：漳州木偶头雕刻独树一帜，是傀儡戏艺术的物质基础；台湾：鹿港木雕以神轿、佛桌著称，保留了完整的闽南木雕技法；新加坡、马来西亚：华人庙宇中保存大量闽南木雕精品，部分已超过百年。", "url": ""}, {"n": "闽南刺绣（抽纱）", "py": "Bín-lâm tshì-siù (thiu-se)", "c": "🏡 传统建筑与工艺", "sc": "传统工艺", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "—（传统工艺，非时节性）", "intro": "闽南刺绣以泉州、漳州为中心，主要用于宗教服饰（神明袍服、庙宇幡旗）、婚嫁礼服与日常织物。其中「抽纱」（又称「花边」）是近代兴起于汕头、闽南一带的特色工艺，以棉布为底，抽去部分纬纱后再刺绣，形成镂空图案，曾是闽南出口创汇的重要手工艺品，远销欧美。", "items": "绣架；丝线或金线（神明袍服用金线）；底布（绸缎、棉布）；绣针；图稿", "steps": "【宗教刺绣（神明袍服）】\n1. 依神明体形裁制袍服底布。\n2. 在底布上描绘图案（龙、凤、八仙、吉祥纹样）。\n3. 以金线或彩色丝线按图案刺绣，运用平绣、盘绣、浮绣等多种针法。\n4. 完成后须经仪式「更衣」，为神明换上新袍服。\n【抽纱工艺】\n1. 在底布上抽去规律性纬纱，形成网格结构。\n2. 用针线在网格上绣制图案，结合镂空效果形成独特纹样。\n3. 洗涤熨烫后装裱或制成桌布、台布等出口商品。", "taboo": "神明袍服须由技艺精湛的师傅制作；为神明刺绣袍服期间传统上须素食、洁净；破损的神明袍服须以特定仪式处理，不可随意丢弃。", "story": "闽南神明袍服刺绣历史悠久，与闽南宗教信仰密不可分——每尊神明至少有数套袍服（节庆袍、日常袍），由信众捐献，绣工越精美越表示对神明的虔诚。抽纱工艺则是19世纪末在西方传教士的影响下引入闽南的，融合西方图案设计与闽南刺绣技法，成为出口贸易的重要商品，高峰期从事抽纱的绣娘多达数十万人。", "diff": "泉州：神明袍服刺绣最为精细，以金线盘绣为主；漳州：漳绣历史悠久，有自身独特风格；厦门：厦门刺绣曾为出口重要商品；台湾：台湾神明袍服刺绣与闽南同源，鹿港一带保留较完整的传统；东南亚：华人庙宇神明袍服早期多订制于闽南，现当地绣坊也可制作。", "url": ""}, {"n": "闽南传统造船", "py": "Bín-lâm tsuân-thóng tsō-tsûn", "c": "🏡 传统建筑与工艺", "sc": "传统工艺", "lv": "L2 泉州/漳州", "rg": ["泉州", "漳州", "厦门"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "—（传统工艺，非时节性习俗）", "intro": "闽南传统造船技艺以泉州为中心，可追溯至宋元时期「海上丝绸之路」的鼎盛年代。泉州传统木船以「福船」为代表，特点为高大船体、V形尖底、水密隔舱，适合远洋航行，是中国古代造船技术的杰出成就。「水密隔舱」技术2010年被列入联合国教科文组织急需保护非物质文化遗产名录。", "items": "杉木、樟木（船板材料）；桐油（防水用）；铁钉、麻缆；传统造船工具（斧、凿、锯）；造船图纸（师傅口传心授，部分无文字图纸）", "steps": "1. 选材：按船型选取优质杉木（船板）与樟木（龙骨），晾干备用。\n2. 立龙骨：龙骨为船体骨架核心，按设计尺寸安装。\n3. 安装肋骨：在龙骨两侧安装横向肋骨，形成船体框架。\n4. 铺设船板：在框架外铺设船板，以传统工艺嵌缝（填入桐油与麻丝，防水密封）。\n5. 水密隔舱：将船体内部分隔为若干独立舱室，某一舱室进水不影响整体（现代船舶此设计源于此）。\n6. 涂装：全船涂刷桐油或油漆，防腐防水。\n7. 下水仪式：新船下水前须进行「安龙骨」祭礼（祭拜妈祖、水神），祈求行船平安。", "taboo": "安装龙骨时须选吉日，忌犯冲；造船过程忌说「翻」「沉」「破」等不吉利词汇；下水仪式须在吉时进行，缺一仪式则被认为不吉。", "story": "宋元时期，泉州是全球最重要的贸易港之一，福船技术使闽南商人得以驾驭印度洋、东南亚海域。水密隔舱技术比西方早数百年，马可·波罗记录泉州船只时对此惊叹不已。郑和下西洋所用宝船，据学者研究与福船建造传统密切相关。现代泉州仍有少数老师傅保存传统造船技艺，泉州海交史博物馆馆藏有宋代沉船「泉州湾宋代海船」，是研究闽南造船史的珍贵实物。", "diff": "泉州：传统福船技艺保存最多，惠安、晋江一带曾是重要造船地；漳州：月港（今海澄）是明代重要出口港，有自身造船传统；厦门：近代轮船业取代传统木船后，传统造船业式微，现主要在民俗展示中保留；台湾：澎湖、鹿港一带保留了与闽南同源的传统木船建造习俗。", "url": ""}, {"n": "宗祠文化", "py": "Tsong-sû bûn-huà", "c": "🏠 宗族与日常礼节", "sc": "宗族礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（春秋两祭为核心；节庆、婚丧亦用）", "intro": "宗祠（祠堂）是闽南宗族文化的核心建筑与精神空间，供奉本族历代祖先神主牌，是宗族凝聚力的象征。闽南宗祠不仅用于祭祀，还承担族务议事、族人教育、婚丧礼仪等社会功能。闽南人重视宗祠修建，「有祠堂才有族」，宗祠建筑往往是一个聚落中规格最高、装饰最精美的建筑。", "items": "祖先神主牌（木制，刻有历代祖先名讳）；香炉、烛台、供桌；三牲（猪、鸡、鱼）或五牲；族谱；祭祀仪式用具", "steps": "【春秋两祭（清明与冬至）】\n1. 族长或房长提前通知各房准备祭品，确定参与人员。\n2. 祭祀当日，族人聚集宗祠，依辈分排列行礼。\n3. 主祭（族长或长辈）上香、读祭文，代表全族向列祖列宗禀告年内大事。\n4. 依序行三叩首礼，全体族人齐拜。\n5. 焚化纸钱，撤供品，供品由族人分食（「食祖」，象征祖先庇佑）。\n6. 族务会议：祭祀后召开族人大会，讨论族内事务、修缮祠堂、更新族谱等。", "taboo": "祠堂内不可嬉闹喧哗；女性出嫁后传统上不得进入夫家以外宗族的宗祠；祭祀用品须洁净，不可使用破损餐具；神主牌不可随意移动或触碰。", "story": "闽南宗祠文化是中原汉族宗法制度在南方移民社会中的高度发展。唐宋时期大量中原世家南迁入闽，带来了严密的宗族制度，在闽南社会中生根并强化。闽南宗祠往往与「堂号」紧密相连——如陈氏「颍川堂」、李氏「陇西堂」——堂号追溯中原祖地，是宗族历史记忆的锚点。东南亚闽南社群至今保留完善的宗亲会组织，是宗祠文化在海外的延伸。", "diff": "泉州：宗祠规模宏大，建筑多采用「皇宫起」（宫殿式）规制，装饰繁复；漳州：宗祠建筑风格略有不同，部分融合客家元素；台湾：台湾各地宗祠林立，许多宗亲会定期举办「寻根」活动返闽祭祖；新加坡、马来西亚：以「宗亲会馆」形式延续宗祠功能，是海外闽南社群最重要的社会组织之一。", "url": ""}, {"n": "族谱修撰", "py": "Tso̍k-phóo siu-suàn", "c": "🏠 宗族与日常礼节", "sc": "宗族礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "不定期（传统每三十年修撰一次；现代每二十年或适时续修）", "intro": "族谱（家谱）是记录闽南宗族世系、人物、历史与迁徙脉络的文献，是宗族的「生命档案」。闽南人视修谱为宗族大事，「三十年一大修，十年一小补」，通过族谱确认血脉关系、规范辈分称谓、追溯中原祖地。族谱同时是海外闽南华人寻根认祖的核心依据，也是人类学、移民史研究的重要一手资料。", "items": "旧版族谱（续修参考）；各房记录（出生、婚嫁、死亡、迁居信息）；专职修谱人员（文字能力强的族内长者或聘请专业人员）；印刷或手抄材料", "steps": "1. 议决修谱：族长召集各房代表，议定修谱事宜，成立「修谱委员会」，筹集经费。\n2. 收集资料：各房向委员会提交本房世系更新信息（新生儿、婚嫁、去世成员、迁居地点）。\n3. 核对旧谱：与旧版族谱对照，订正错漏，续写新增世系。\n4. 寻根调查：对迁往外地或海外的族人展开联络，补录失散支系。\n5. 撰写修谱序：由族中有学识的长者撰写本次修谱序言，说明修谱经过。\n6. 审校：多人反复校对，确保世系准确无误。\n7. 印制颁谱：装订成册，分发各房，举办「颁谱典礼」，以香案祭祖后将族谱颁发各房保管。", "taboo": "族谱不可随意示人（尤其不可让外姓人翻阅详细世系）；族谱须妥善保存，不可损毁或遗失（视为对祖先不敬）；入谱须严格核实血缘关系（防止冒认）；传统上女性出嫁后入夫家族谱，不入娘家族谱（现代部分族谱已改革此规定）。", "story": "闽南族谱是连接两岸及东南亚华人社群的重要纽带。改革开放后，大批台湾、东南亚闽南华人携族谱返乡寻根，通过比对族谱确认祖籍地，这一「对谱」（核对族谱）活动至今仍在进行。泉州现存族谱数量巨大，图书馆及民间保存的族谱超过数千种，记录了唐宋以来数十代的家族历史，是无可替代的历史档案。", "diff": "泉州、漳州：族谱修撰传统最为完善，部分大族族谱已有数十册；台湾：日据时期族谱曾被日本殖民政府限制，光复后大规模续修；新加坡、马来西亚：南洋闽南宗亲会保存族谱副本，定期续修以记录海外支系；全球华人：「对谱寻根」成为全球华人文化认同的重要仪式，部分族谱已数字化上网供全球族人查阅。", "url": ""}, {"n": "入厝（乔迁之喜）", "py": "Ji̍p-tshù (Kiâu-tshian tsi hí)", "c": "🏠 宗族与日常礼节", "sc": "生活礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（乔迁时择吉日举行）", "intro": "入厝（ji̍p-tshù）是闽南乔迁新居的重要礼俗，新居落成或购入后，须择吉日举行一套完整的入宅仪式，包括「暖厝」（邀亲友聚餐温热新居）与神明安位，方能正式入住。入厝礼俗体现了闽南人对「气场」与「风水」的重视，以及对家宅护佑的祈求。", "items": "米缸（装满米，象征丰衣足食）；炉（旧灶或新炉）；扫帚；红包；鞭炮；三牲或五果；香烛金纸；米筛（盖于米缸上，辟邪）；新扫帚（象征扫入财运）", "steps": "1. 择吉日：请风水师或查阅黄历，选定入宅吉日吉时。\n2. 先入家当：吉时前将日常生活物品（床铺、炊具）先行搬入。\n3. 主人先入：吉时一到，户主（夫妻共同）率先踏入新居门槛，带入米缸、炉具、扫帚，象征带入「财丁旺气」。\n4. 安神位：将神明（土地公、祖先牌位）安置于预定神龛位置，上香点烛，禀告神明新居位置。\n5. 暖厝：邀请亲友到新居聚餐（「暖厝酒」），亲友携带礼品（红包、实用品）祝贺，热闹喜庆以驱散「阴气」，带旺新居人气。\n6. 燃放鞭炮：入宅或暖厝时燃放鞭炮，声响越大越吉利。", "taboo": "入宅吉日忌与户主生肖相冲；孕妇不可参与入厝仪式（怕冲煞）；哭泣者不可入新居（不吉）；入新居须带「旺气之物」进门（空手进门不吉）；搬入新居当晚须在新家过夜，不可外宿（否则「气」散）。", "story": "入厝礼俗的核心逻辑是「人气旺则宅气旺」——闽南人相信新居需要人的活动与喜庆气氛来「暖热」空间，驱散空置时积累的阴冷之气。「暖厝」中的亲友聚餐不仅是社交活动，更是一种集体的空间净化仪式。此俗在海外闽南社群中保留完整，新加坡、马来西亚华人乔迁时几乎无一例外地举办暖厝仪式。", "diff": "泉州、漳州：入厝仪式较完整，暖厝宴席规模视家境而定；台湾：入厝习俗保留完整，「暖厝」是台湾华人社会普遍习俗，亲友馈赠以红包和实用家居品为主；新加坡、马来西亚：入厝仪式基本保留，风水师（地理先生）仍被广泛请用；现代都市：公寓乔迁时仍举行简化版入厝仪式，核心步骤（带米缸进门、暖厝聚餐）保留。", "url": ""}, {"n": "做生日（生辰礼俗）", "py": "Tsò-senn-ji̍t", "c": "🏠 宗族与日常礼节", "sc": "生活礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（个人生辰当日；逢十大寿尤为隆重）", "intro": "闽南「做生日」是庆贺生辰的礼俗，核心食物为面线与红蛋，象征长寿与圆满。日常生辰以家庭聚餐为主；逢十大寿（五十、六十、七十等）则办「寿桌」大宴，宾客赠寿礼，寿星穿寿衣，仪式规格接近婚礼，是人生重要的礼仪节点。", "items": "面线（红面线，象征长寿）；红蛋（煮熟染红）；猪脚（卤制，生日必备）；寿桃糕饼；红包；寿衣（大寿时穿）；寿烛（大红蜡烛，逢十大寿用）", "steps": "【日常生辰】\n1. 生辰当日，家人为寿星煮一碗面线猪脚，置红蛋于碗中。\n2. 家人围坐共食，说祝福语「食面线，长命百岁」。\n3. 亲近亲友送来红包或礼品，寿星回赠红蛋（一人两颗）。\n【逢十大寿】\n1. 提前择定寿宴日期（习惯上提早，不可延后——早寿长寿，晚寿折寿）。\n2. 寿星穿寿衣，接受晚辈行跪拜礼（「拜寿」）。\n3. 开寿宴，宾客入席，以长寿面线为必备菜。\n4. 晚辈向寿星敬酒、献寿礼，寿星回赠红包、寿桃糕饼。\n5. 宴后寿星分赠红蛋与寿桃糕给亲友，「分享寿气」。", "taboo": "大寿宴须提早办，不可推迟（迟办折寿）；寿宴菜色忌上「丧葬菜」（如白斩鸡须染红，不可白色上桌）；不可送钟（「送终」谐音）；不可送梨（「离」谐音）；寿烛须燃至自然熄灭，不可吹灭。", "story": "闽南「做生日」最特别之处在于大寿须「提前」，且愈早愈好——这与北方习俗「做寿不可提前」恰好相反。闽南人的逻辑是：寿宴是活人享受的喜事，越早庆祝说明寿星健康长寿，推迟则不吉。红蛋（染红的熟鸡蛋）是闽南喜庆的万用礼品，生日、满月、婚礼皆用，象征圆满与新生，赠予亲友有「分享福气」之意。", "diff": "泉州、漳州：大寿宴席讲究排场，「六十大寿」尤为隆重，宾客可达数百人；台湾：台湾闽南人保留做生日习俗，面线猪脚蛋是台湾超市常见的生日礼盒组合；新加坡、马来西亚：闽籍华人大寿宴席保留完整，酒楼包厢是常见寿宴场所；现代都市：西式生日蛋糕与闽南面线并行，「吃蛋糕+吃面线」成为新旧结合的都市过生日方式。", "url": ""}]);
DATA = DATA.concat([{"n": "分家习俗", "py": "Pun-ke si̍p-siok", "c": "🏠 宗族与日常礼节", "sc": "宗族礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年（长子婚后或父母年迈时择吉日进行）", "intro": "分家（pun-ke）是闽南宗族生活中的重要礼俗，指父母年迈或诸子皆婚后，将家产、房产、田地与祭祀责任按照约定规则分配给各房子嗣，各房另立门户的仪式与法律行为。分家过程须有族中长辈与见证人在场，立下「分家字据」，以避免日后纷争。", "items": "分家字据（书面文书，由长辈或公证人书写）；见证人（族长、叔伯辈长辈）；香烛（向祖先禀告）；酒席（分家后宴请族人）", "steps": "1. 提出分家：通常由父母主动提出，或子媳之间协商后请父母同意。\n2. 邀请见证：请族中长辈（叔伯、族长）与非利益相关人在场见证，确保公正。\n3. 清点家产：逐一清点土地、房产、存款、农具、神明器具等共有财产。\n4. 分配原则：闽南传统以「诸子均分」为主（长子可能多得一份「长房份」）；神明供奉与祭祖责任须明确划分（通常轮流负责）。\n5. 立字据：分家方案经各房同意后，由长辈书写分家字据，各方签押（或按手印），见证人签名。\n6. 祭祖禀告：在祖先牌位前上香，禀告分家事宜，祈求祖先见证与庇佑。\n7. 设宴：分家后置酒席款待见证人与亲族，正式宣告各房独立。", "taboo": "分家须在父母健在时进行（父母去世后分家易起纠纷）；神明与祖先供奉不可因分家而中断（须明确落实到具体人）；分家字据须妥善保管（是法律凭证）；分家过程须避免争吵（不吉且伤亲情）。", "story": "闽南分家传统体现了宗族法律与情感的平衡。「分家字据」在传统社会中具有法律效力，族长与见证人的签名是公信力的来源。闽南分家中最复杂的往往不是财产分配，而是「神明轮祀」——共同供奉的神明与祖先由哪房负责、何时轮换，处理不当极易引发长期家族矛盾。现代闽南家庭分家仪式已大幅简化，但书面协议与见证人制度仍普遍保留。", "diff": "泉州、漳州：分家习俗保留较完整，族长在场见证仍是惯例；台湾：台湾闽南家庭分家已与现代法律结合，公证处公证取代传统字据；新加坡、马来西亚：华人家庭分家趋向现代化，但邀请长辈见证、祭祖禀告的传统仍有保留；现代都市：随着核心家庭普及，大家庭分家场景减少，但继承分配纠纷反映出此俗的深层需求仍在。", "url": ""}, {"n": "闽南称谓体系", "py": "Bín-lâm tshing-huî thé-hē", "c": "🏠 宗族与日常礼节", "sc": "宗族礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "日常", "intro": "闽南语亲属称谓体系是汉语方言中最复杂精细的之一，对父系、母系、长幼、内外亲属均有严格区分，且同一称谓在不同辈分下有不同叫法。掌握称谓体系是闽南人融入家族社会的基本功，称谓用错被视为极度失礼，反映出闽南宗族文化对血缘与辈分的高度重视。", "items": "无需物品（口头称谓体系）", "steps": "【核心称谓示例（泉州腔）】\n父亲：爸（pà）/ 阿爸\n母亲：妈（má）/ 阿妈\n祖父（父父）：阿公（a-kong）\n祖母（父母）：阿嬷（a-má）\n外祖父（母父）：外公（guā-kong）\n外祖母（母母）：外嬷（guā-má）\n伯父（父兄）：阿伯（a-peh）\n叔父（父弟）：阿叔（a-tsik）\n姑母（父姐妹）：阿姑（a-koo）\n舅父（母兄弟）：阿舅（a-tsū）\n姨母（母姐妹）：阿姨（a-î）\n兄：阿兄（a-hiann）\n姐：阿姊（a-tsí）\n弟：小弟（sió-tī）\n妹：小妹（sió-muē）\n【使用规则】\n1. 与长辈说话须以称谓开头，直呼名字为严重失礼。\n2. 介绍自己的亲属给外人时须降辈自谦（如介绍父亲说「我阿爸」而非「家父」——后者为书面语）。\n3. 配偶的亲属称谓另有一套（如称丈夫父亲为「家官」，称妻子父亲为「丈人」）。", "taboo": "称呼长辈时不可直呼其名；不可将父系亲属称谓用于母系亲属（如将舅父称为「叔」是严重错误）；已故长辈称谓前加「先」或「亡」字以示区别。", "story": "闽南称谓体系的复杂性直接反映了宗族制度的严密程度——同样是「祖父」，父系祖父（阿公）与母系祖父（外公）称呼截然不同，体现了父系宗族的优先地位。这套称谓系统也是闽南方言教育的重要内容：孩子学说话时，长辈首先教的就是如何称呼各个亲戚，称谓掌握程度反映出一个家族对传统文化的重视程度。在方言日益式微的今天，称谓体系的保存成为闽南语传承的重要指标之一。", "diff": "泉州：称谓体系最为完整，区分最为细致；漳州：与泉州大同小异，部分称谓语音不同；台湾：台湾闽南语（台语）称谓体系与泉漳同源，但受国语影响，年轻一代部分改用普通话称谓；新加坡、马来西亚：南洋闽南社群称谓体系保留较好，但随着英语教育普及，英文称谓（uncle、auntie等）正逐渐替代传统闽南语称谓。", "url": ""}, {"n": "订婚礼俗（送定）", "py": "Tìng-hun lé-siok (Sàng-tīng)", "c": "👶 人生礼仪", "sc": "婚嫁礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（婚前择吉日举行）", "intro": "闽南订婚礼（「送定」或「文定」）是婚礼前最重要的礼仪节点，男方携聘礼至女方家，双方正式确立婚约。闽南订婚礼礼数繁琐、礼品讲究成双成对，是男方家庭诚意与财力的展示，也是女方家庭谈判聘金的正式场合，其重要程度在传统上不亚于婚礼本身。", "items": "聘金（现金，金额由双方协商）；金饰（戒指、手环、项链，成双成对）；礼饼（闽南订婚饼，必须成双；分发亲友告知订婚消息）；布料；双数礼品（糖、烟、酒、罐头各一对）；红纸袋包装", "steps": "1. 议亲：双方家长通过媒人（或直接）协商聘金金额、嫁妆数量，达成基本共识。\n2. 择吉日：请算命师择定送定吉日，避开双方生肖相冲的日子。\n3. 送定当日：男方家长率队（通常为偶数人）携礼品至女方家。\n4. 呈聘：将聘金、金饰、礼品按序摆放，男方家长正式呈上。\n5. 戴戒指：男方为女方戴上订婚戒指（或男女互换），象征婚约成立。\n6. 女方回礼：女方家长收下聘礼，回赠男方礼品（鞋子、腰带等）。\n7. 分发礼饼：女方将订婚饼分发给亲友，告知订婚消息；男方亦分发给己方亲友。\n8. 设宴：女方设简单酒席款待男方来客，正式宣告两家结为亲家。", "taboo": "礼品数量须成双（忌单数）；聘金须用红纸包裹（不可裸金）；订婚日不可有丧事（须回避）；女方若退还全部聘礼，则表示退婚（须谨慎对待）；订婚后至婚礼前，男方不可随意进入女方闺房。", "story": "闽南订婚礼的核心「聘金」制度历史悠久，体现了传统社会对女儿出嫁的经济补偿逻辑——女儿出嫁后主要照顾夫家，娘家失去劳动力，聘金是男方对此的补偿。现代闽南聘金金额有时高达数十万，成为两家财力较量的场合，引发社会讨论。礼饼分发仍是告知亲友订婚消息的传统方式，闽南礼饼铺在婚季生意极旺。", "diff": "泉州：聘金传统较高，礼数较繁；漳州：与泉州大同小异，部分礼品略有不同；台湾：台湾订婚仪式保留「文定」之名，仪式与闽南相似，但现代化程度较高；新加坡、马来西亚：闽籍华人保留送定习俗，但简化程度因家庭而异；现代都市：聘金协商已趋向象征性，但礼饼分发仍普遍。", "url": ""}, {"n": "收涎（牙关饼）", "py": "Siu-nuā (Gê-kuan-piánn)", "c": "👶 人生礼仪", "sc": "育儿礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟢 已验证", "cr": "★★ 在地媒体与机构网站", "tm": "婴儿约四至六个月大时（开始流口水后）", "intro": "收涎（siu-nuā）是闽南为流口水的婴儿举行的传统仪式，以饼干或糕点在婴儿嘴边擦拭，象征「收住口水」，祈求孩子快快长大、聪明伶俐。闽南人认为婴儿流口水是「还没学会收」，通过仪式协助婴儿「学收」，是充满趣味与寓意的育儿民俗。", "items": "收涎饼（小圆饼干，以红线串成项链状）；红线；剪刀；红包；亲友到场", "steps": "1. 选时：婴儿约四至六个月大、开始明显流口水时择吉日举行。\n2. 制收涎项链：将若干小圆饼干（数量视亲友人数而定）以红线串成项链形，套于婴儿颈项。\n3. 亲友依序擦拭：参与仪式的亲友每人取下一块饼干，在婴儿嘴边轻轻擦拭一圈，同时说吉祥话（「收涎收离离，明年生小弟」或「收涎收好好，乖巧卡快大」）。\n4. 擦拭后饼干可食用（象征分享孩子的福气）。\n5. 亲友赠红包，家长回赠油饭、红蛋。", "taboo": "收涎日不可与家中长辈忌日重叠；仪式中说话须说吉祥话，不可说负面词语；饼干须事先准备足够数量（每位亲友各一块）。", "story": "收涎习俗的医学背景是婴儿约四至六个月时唾液腺发育完善，开始大量分泌唾液，但吞咽反射尚未成熟，因此「流口水」。闽南人以仪式化的方式面对这一生理现象，将其转化为充满祝福的社交事件。收涎项链由亲友共同参与，既是对婴儿的祝福，也强化了家族与社群的联结。台湾近年将收涎仪式与现代创意结合，出现「创意收涎饼」客制化市场。", "diff": "泉州、漳州：收涎仪式较简单，以家庭聚会为主；台湾：台湾收涎仪式保留完整，并发展出创意饼干造型（印有可爱图案）；新加坡、马来西亚：闽籍华人保留收涎习俗，在家庭聚会中举行。", "url": ""}, {"n": "开笔礼（拜文昌）", "py": "Khai-pit-lé (Pài Bûn-tshiong)", "c": "👶 人生礼仪", "sc": "成长礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年（孩子入学前或开学日；文昌诞农历二月初三前后尤盛）", "intro": "开笔礼是闽南孩童初次入学或习字时举行的启蒙仪式，包括拜文昌帝君（掌管文章科举的神明）、朱砂开智（用朱砂在额头点「智慧痣」）、启蒙描红（写下人生第一个「人」字）等环节，祈求孩子聪慧好学、学业顺遂。", "items": "毛笔；朱砂（或红色颜料）；红纸（习字用）；文昌帝君供品（文房四宝、花果）；香烛", "steps": "1. 赴庙拜文昌：携孩子至供奉文昌帝君的庙宇，上香祭拜，祈求文昌赐予智慧。\n2. 朱砂开智：由庙祝或家长以朱砂（或红笔）在孩子额头正中点一红点，称「开智慧」。\n3. 击鼓鸣志：让孩子亲手击鼓三下，象征「击响人生的第一声」，立下求学之志。\n4. 描红启蒙：家长或老师引导孩子以毛笔写下第一个「人」字（取「做人」之意），称「开笔」。\n5. 赐福礼：孩子向长辈行礼，长辈赠文房礼品（文具、书包、红包），鼓励好好学习。", "taboo": "开笔礼当日孩子须着整洁衣物（不可穿破旧衣）；仪式中不可喧哗（须保持庄重）；描红的第一个字必须写完整，不可中途放弃。", "story": "拜文昌是闽南科举文化的民间延伸。文昌帝君（文昌星）是中国传统中主管文章与科举的神明，在科举时代，士子赴考前必拜文昌祈求高中。科举废除后，拜文昌的习俗转化为对孩子入学的祝福仪式，并与现代教育体系结合，形成「开笔礼」的新形式。泉州文庙、漳州文庙是举行开笔礼的传统场所。", "diff": "泉州：文庙每年均举办大型开笔礼活动，吸引许多家长带孩子参与；漳州：有传统开笔礼仪式，部分学校亦举办集体开笔礼活动；台湾：台湾各地孔庙在每年开学前举办开笔礼，已成为重要的传统文化活动；新加坡、马来西亚：华文学校保留开笔礼传统，是华文教育文化传承的重要仪式。", "url": ""}, {"n": "做对年（周年祭）", "py": "Tsò-tuì-nî", "c": "👶 人生礼仪", "sc": "丧葬礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "亡者去世周年忌日", "intro": "「做对年」是闽南丧葬礼俗中的重要节点，指亲人去世满一周年时举行的祭祀仪式，标志着家属正式结束重度服丧期。做对年后，家属可恢复正常社交活动（如参加婚宴、节庆），并将亡者的日常供奉从「新丧」转为「祖先常祀」。", "items": "三牲或五牲；饭菜（亡者生前喜食之物）；香烛；金纸、银纸；亡者生前用品（可一并焚化）；白帽、孝服（家属穿戴）", "steps": "1. 择日：做对年须在去世周年忌日当天或前后数日内举行，不可过迟。\n2. 备供：准备三牲五果、亡者喜食菜肴，于灵桌或墓前摆设。\n3. 家属着孝：孝子孝孙着白孝服、白帽，表达哀思。\n4. 上香祭拜：向亡者牌位（或墓前）上香行礼，诵读祭文（或简单禀告过去一年家中事）。\n5. 焚化纸钱：焚化金银纸及亡者遗物（衣物、日用品），供亡者在阴间使用。\n6. 脱孝：做对年礼毕后，家属正式脱下孝服，结束服丧期。\n7. 宴请：部分家庭宴请亲友共餐，告知服丧结束，感谢亲友一年来的关怀。", "taboo": "做对年须在忌日当日或之前举行，不可推迟至忌日之后（延后被认为不孝）；孝期内家属不可参加他人婚宴喜庆，做对年后解禁；脱孝须在祭拜仪式完成后才能进行，不可提前。", "story": "闽南丧葬礼俗时间跨度长，从去世到完整走完礼俗周期，通常历经「做七」（每七天一祭，共七七四十九天）、「百日」（百日祭）、「对年」（一周年）、「三年」（三年除服），形成完整的哀悼时间结构。做对年是最重要的转折点，不仅标志哀悼期结束，也象征亡者从「新鬼」转化为「老祖先」，进入常规祖先祭祀的行列。", "diff": "泉州、漳州：做对年仪式较完整，有专职道士或法师主持的家庭仍沿用传统；台湾：台湾闽南人普遍重视做对年，是家族凝聚的重要时刻；新加坡、马来西亚：闽籍华人保留做对年习俗，通常在家中或殡仪馆举行；现代都市：仪式日趋简化，但核心的「脱孝」象征意义仍被普遍遵守。", "url": ""}, {"n": "归宁（新婚回门）", "py": "Kui-lîng", "c": "👶 人生礼仪", "sc": "婚嫁礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "婚礼后第三日（或第四日）", "intro": "归宁是闽南新婚后新娘携夫婿首次正式回娘家的礼俗，通常于婚礼后第三日举行，称「做三朝」或「归宁」。此为新婚夫妇以「女婿身份」正式进入娘家社交圈的第一步，娘家设宴款待，展示对出嫁女儿的疼爱，也是婚礼后最后一个重要仪式节点。", "items": "归宁礼品（新郎备，通常为糕饼、糖果、酒，成双成对）；新娘新郎新婚礼服（或喜庆新衣）；红包（新郎给娘家长辈）", "steps": "1. 婚礼后第三日晨，新娘梳妆打扮（通常仍着婚服或喜庆服饰）。\n2. 新郎备好归宁礼品，与新娘同乘轿车（传统为轿子）前往娘家。\n3. 抵达娘家，新郎率先进门行礼，呈上礼品。\n4. 新郎向岳父岳母等长辈依序行礼，正式以「女婿」身份相见。\n5. 娘家设丰盛酒席款待，宴请亲友共同见证。\n6. 宴毕，夫妻须于当日日落前返回婆家（不可在娘家过夜）。\n7. 归宁后，娘家日后拜访须提前知会，不可随意来去（新娘已是「别家之人」）。", "taboo": "归宁须于婚后三日内举行，不可拖延；夫妻须同行，新娘不可独自回门；日落前须离开娘家（不可在娘家过夜，否则视为不吉）；归宁礼品不可为单数。", "story": "归宁礼俗体现了闽南传统婚姻中对「出嫁女儿」身份的界定——女儿婚后归属夫家，归宁是以「客人」身份正式回家的第一次，从此娘家不再是日常居所，而成为定期拜访的「亲家」。「归宁三日」与「初二回娘家」（新年习俗）共同构成闽南对媳妇与娘家关系的时间规范。现代社会对「日落前须离开」等规定已多有放宽，但归宁作为婚礼后重要礼俗仍被广泛保留。", "diff": "泉州、漳州：归宁礼数较完整，娘家宴席规格视条件而定；台湾：归宁习俗保留，称「回门」或「归宁」，现代多以聚餐形式进行；新加坡、马来西亚：闽籍华人保留归宁习俗，形式较简化；现代都市：归宁日期已不严格限于第三日，婚后一周内举行即可，但仪式核心（女婿正式登门）仍保留。", "url": ""}, {"n": "开漳圣王信仰（陈元光）", "py": "Khai-tsiang Sìng-ông sìn-gióng (Tân Guân-kong)", "c": "🙏 民间信仰", "sc": "地方守护神信仰", "lv": "L2 特定地区俗", "rg": ["漳州", "厦门", "台湾", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历二月十五（开漳圣王诞辰）；不定期绕境", "intro": "开漳圣王（陈元光，657—711年）是唐代将领，率军平定闽南粤东动乱后屯驻漳州、开疆辟土，奠定漳州文明基础，死后被民间奉为神明。开漳圣王信仰是漳州籍闽南人的重要地方守护神崇拜，随漳州移民扩散至台湾及东南亚，成为联结漳籍华人社群认同的重要纽带。", "items": "开漳圣王神像；香烛、三牲五果；绕境仪仗（鼓乐、神轿、阵头）；平安符", "steps": "1. 农历二月十五诞辰日：各地开漳圣王庙举办祭典，信众进香献礼。\n2. 绕境：神轿出巡辖区，信众随行护驾，阵头表演（舞龙、舞狮、南管北管）。\n3. 进香谒祖：台湾及海外漳籍华人定期组团返回漳州祖庙进香，朝圣祖庙。\n4. 祭典：诵读祭文，向陈元光牌位或神像行三跪九叩大礼。\n5. 演戏酬神：聘请歌仔戏或布袋戏班演出，酬谢神明庇佑。", "taboo": "绕境期间路人须肃立回避（或跟随进香），不可横穿神轿队伍；神明进驾时须净香（点香迎接），不可背对神像；女性生理期间忌入神庙内殿。", "story": "陈元光历史上是唐代将领，被称为「开漳始祖」。他率军平定泉州南部与潮州边界的「蛮獠」动乱，建立漳州郡，推行汉族文化教育，使漳州从边疆蛮荒之地转变为繁荣的文明区域。陈元光死于平乱途中，漳州百姓感念其功德，立庙祭祀，逐渐神化为「开漳圣王」。随着漳州人移居台湾与东南亚，开漳圣王庙遍布各地，形成独特的漳籍华人宗教网络。台湾彰化、云林、嘉义有多座重要的开漳圣王庙。", "diff": "漳州：开漳圣王是漳州最重要的地方神明，各地皆有庙宇；台湾：以漳州移民聚居地（彰化、云林、嘉义等）的开漳圣王庙最为重要；泉州移民区信仰广泽尊王、保生大帝，开漳圣王信众较少；东南亚：新加坡、马来西亚槟城等地有漳籍华人奉祀开漳圣王。", "url": ""}, {"n": "石敢当信仰", "py": "Tsio̍h-kánn-tong sìn-gióng", "c": "🙏 民间信仰", "sc": "辟邪镇宅信仰", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "全年（立于路口、门前常驻；安置时择吉日）", "intro": "「泰山石敢当」是闽南及中国南方广泛流行的辟邪镇宅物，以刻有「石敢当」或「泰山石敢当」字样的小石碑立于路冲、桥头、巷弄转角处，据信可挡住冲来的煞气（「路煞」）、守护门户平安。石敢当信仰是闽南传统堪舆（风水）观念与民间镇宅信仰结合的典型。", "items": "刻有「泰山石敢当」字样的小石碑（或砖）；红纸（安置时包裹石碑，象征辟邪）；香烛（安置时祭拜）；鞭炮（安置时燃放）", "steps": "1. 选址：请堪舆师（风水师）勘察住宅周围，找出「路冲」（路直冲门口）、「桥冲」、「转角煞」等不利方位。\n2. 准备石碑：至石材店或庙宇购置「泰山石敢当」石碑（大小视位置而定）。\n3. 择吉日安置：选定吉日（通常为黄道吉日），于清晨或正午安置。\n4. 祭拜：燃香烛，在石碑前摆设简单供品，祈求石敢当发挥镇煞功效。\n5. 立碑：将石碑立于路冲正面（使「石敢当」字面朝向冲来的方向）。\n6. 燃放鞭炮：燃放鞭炮庆贺，宣告石敢当正式「上任」。", "taboo": "石敢当字面须朝向煞气来源方向（不可背对）；石碑不可随意移动或破坏（否则镇煞失效）；安置时若遇下雨须择日重来（雨水不吉）；不可将破损的石敢当留在原处（须更换）。", "story": "「石敢当」的历史可追溯至汉代，最早见于汉代墓葬铭文。「泰山石敢当」的「泰山」二字出现较晚，但赋予石碑更强的神威（泰山在中国传统中是镇压一切鬼魂的圣山）。闽南地区因宗族聚居、巷弄密集，路冲现象普遍，石敢当信仰特别发达。闽南移民将此信仰带至台湾及东南亚，台湾乡村路冲处仍可见大量石敢当。泰山石敢当于2006年被列入中国国家级非物质文化遗产。", "diff": "泉州、漳州：城乡各处均可见石敢当，堪舆文化发达区域尤为普遍；台湾：台湾乡村及老街区保留大量石敢当，台南、彰化等地可见多样形式（部分配有神面浮雕）；新加坡、马来西亚：早期闽南移民聚落可见，现代城市重建后存留较少；金门：保留完整，金门传统聚落石敢当密度较高。", "url": ""}, {"n": "门神信仰", "py": "Mn̂g-sîn sìn-gióng", "c": "🙏 民间信仰", "sc": "宅居守护神信仰", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（张贴门神；除夕更换新门神）", "intro": "门神是守卫门户的神明，闽南家庭在大门张贴门神画像，以驱邪辟凶、守护家宅平安。闽南最常见的门神为「秦叔宝与尉迟恭」（武将门神，双将守门）或「神荼与郁垒」（古代门神），宫庙则奉祀大型彩绘门神于大殿正门。门神信仰是闽南居家信仰中最日常的一环。", "items": "门神版画（木刻彩印）；浆糊或双面胶（粘贴用）；香烛（更换时祭拜）", "steps": "1. 除夕前或新年期间：更换新门神，将旧门神取下焚化（不可直接丢弃），张贴新门神。\n2. 张贴方式：双将门神分张贴于左右两扇大门，两将须面对面（不可背对）。\n3. 简单祭拜：换贴时点香烛，简单告知门神「换班」，请新门神就位守护。\n4. 全年驻守：门神画像全年张贴，不轻易取下（节日时可在旁另贴装饰，但不遮盖门神面部）。\n5. 宫庙门神：宫庙大门由专业画师彩绘巨幅门神，定期重绘；庙方会举行「门神开光」仪式赋予神力。", "taboo": "门神两将须面对面（不可背对背或各自朝外）；旧门神须焚化（不可随垃圾丢弃，否则对神不敬）；门神面部不可遮挡（不可在其面部贴其他装饰）；不可将破损门神维持不换（须尽快更新）。", "story": "门神信仰的起源故事最广为人知的是「唐太宗梦见两将守门」的传说：唐太宗征战后夜夜梦见鬼魅扰寝，大将秦叔宝与尉迟恭自愿彻夜守护宫门，太宗不忍两将劳苦，命画工绘制两将画像贴于宫门，门神由此流传民间。另一古老版本的门神为「神荼、郁垒」，相传为上古黄帝时期专门捉鬼的神将。闽南宫庙的门神彩绘艺术水平极高，是重要的民间绘画传统，画师传承严格。", "diff": "泉州、漳州：居家门神版画以「秦叔宝与尉迟恭」最为常见；宫庙门神以彩绘形式为主；台湾：门神彩绘艺术发展蓬勃，各地庙宇门神风格各异，部分庙宇门神已成为著名艺术品（如台南开基武庙）；新加坡、马来西亚：闽籍华人家庭仍保留贴门神传统，以版画为主；现代：门神印刷版画产业仍存在，但居家贴门神的习惯在都市有所减少。", "url": ""}, {"n": "过番（下南洋）", "py": "Kuè-huan (Loh lâm-iûnn)", "c": "🌏 侨乡与海外传播", "sc": "移民出洋习俗", "lv": "L2 特定地区俗", "rg": ["泉州", "漳州", "厦门", "金门", "新加坡", "马来西亚", "印尼", "菲律宾", "东南亚闽南社群"], "st": "🔴 待填", "cr": "★★★ 学术专著与期刊", "tm": "历史民俗（明清至民国时期）", "intro": "「过番」（闽南语：kuè-huan，「番」泛指南洋外番之地）是明清至民国时期闽南人大规模移民东南亚的历史现象及其相关习俗的总称。由于福建沿海土地贫乏、人口压力大，大批闽南男性「下南洋」谋生，出发前有一套完整的告别礼俗，反映了离乡背井的悲壮与对故土的深厚情感。", "items": "路途平安符（庙中求取）；写有家乡地址的布条（缝入衣物）；家族合照或族谱页（随身携带）；银两（出行资金）；家乡土（象征性带上一撮，以防客死他乡时「魂归故里」）", "steps": "1. 辞神：出发前至家庙或宗祠向祖先牌位禀告出洋之事，请求祖先庇佑一路平安。\n2. 辞别家人：举行家族送别宴，长辈嘱咐叮咛（「赚够钱就回来，别忘记故乡」）。\n3. 携带身份凭证：将家乡地址、家族信息写在布条上缝入衣物（以防不测时辨认身份）。\n4. 告别码头：于厦门（或泉州、汕头）码头登船，亲友送至码头，以泪相别。\n5. 抵南洋后：在当地同乡会馆（宗亲会）报到，依托同乡网络安顿。\n6. 汇钱回乡：在南洋赚钱后，定期通过「水客」（专业钱信传递人）将钱款汇回家乡（「批信」文化）。\n7. 思乡锦囊：部分人随身带一包家乡土，客死他乡时由同乡将土撒于棺中，让亡者「踩着家乡土归去」。", "taboo": "出发前不可说「再见」（改说「你先行」「保重」等，避免「见」字不吉）；不可打破碗碟（「破家」不吉）；家中长辈送行时不可哭泣过久（「哭坏行程」）；回乡时若已发达，须回乡祭祖方为圆满。", "story": "「过番」是闽南历史上最大规模的人口流动，高峰期在19世纪至20世纪初。当时东南亚（马来亚、荷属东印度、菲律宾等）对劳工需求旺盛，闽南人大批前往开矿、种植、经商。由于当时过番者九死一生（航行危险、水土不服、疾病），「过番哭唐山」（离开唐山时哭泣）是闽南民间至今仍流传的说法。许多过番者终身未能回乡，但其汇回的「侨汇」支撑了泉州、漳州一带大量侨乡宅第的建设。厦门小岛曾是最主要的「过番」码头，留有大量历史遗迹。", "diff": "金门：「金门过番」尤为著名，金门人大量移居南洋，今新加坡、马来西亚有庞大金门籍华人社群，金门县每年举办海外乡亲联谊；泉州：以晋江、石狮、南安等地出番最多；漳州：以龙海、云霄等沿海地区为主；现代：「下南洋」已成历史，但闽南人仍在全球范围内保持强烈的移民传统与海外社群认同。", "url": ""}, {"n": "落叶归根文化", "py": "Lo̍h-ia̍h-kui-kun bûn-huà", "c": "🌏 侨乡与海外传播", "sc": "华侨故土情结", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "印尼", "东南亚闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "全年（春节、清明、祭祖时尤为强烈体现）", "intro": "「落叶归根」是闽南华侨文化的核心情感——无论身处海外多少年，终要回归故土安葬，将骨灰（或遗体）运回家乡埋葬于祖坟，以完成人生最后的「归根」。这一文化信念深刻影响了闽南华侨对财产处置、遗嘱安排及临终仪式的态度，也催生了「侨汇」（汇钱回乡）、「侨批」（家书）等独特文化现象。", "items": "祖坟（故乡的家族墓地）；侨批（海外家书，含家讯与汇款）；金银纸（祭祀用）；故乡带走的泥土或家乡物品（海外随身携带）", "steps": "1. 海外奋斗期：在南洋谋生期间，定期通过水客或邮局汇钱回家（侨汇），并书写家书（侨批）。\n2. 积攒「回乡资本」：目标是赚够钱后衣锦还乡，在家乡建大厝、娶妻生子、光宗耀祖。\n3. 清明祭祖：即使身在海外，也会于清明日在当地华人义山（华人公墓）遥祭故乡祖先，心念归根。\n4. 临终安排：立遗嘱要求子孙将骨灰运回故乡，与祖先同葬（或将故乡土撒入棺中）。\n5. 骨灰运返：海外华侨去世后，由家族将骨灰（或遗骨）运回故乡，择吉日安葬于祖坟（「金斗瓮」盛骨）。\n6. 立碑纪念：在故乡祖坟立碑，注明亡者在海外的奋斗经历，以供后代凭吊。", "taboo": "不可无故抛弃（或变卖）祖坟（极为不孝）；骨灰运返须选吉日入土，不可草率处理；在海外不可入籍（传统观念认为入籍即为「异族」，背叛祖先）——此观念现代已极大弱化。", "story": "「落叶归根」文化使闽南故乡留下了大量「番客楼」（华侨出资建设的洋楼）和「批信局」（侨批传递机构）。「侨批」于2013年被列入UNESCO《世界记忆名录》，是珍贵的历史文献，记录了一个世纪内东南亚闽南华侨的经济史与家庭情感史。泉州、厦门等地的华侨博物馆珍藏大量侨批，是研究华人海外移民史的宝库。近年随着华侨后裔返乡寻根热潮，「落叶归根」文化以新形式延续——不再仅限于遗骨归乡，而是以寻根旅游、宗亲认祖等方式表达对故土的归属感。", "diff": "金门：金门华侨「落叶归根」传统极强，金门义庄（存放海外运回骨灰的建筑）是独特的文化遗产；泉州晋江：「侨汇」文化最发达，晋江商人在全球保持最强的闽南侨乡网络；新加坡、马来西亚：早期华侨坚持落叶归根，二战后逐渐转变为在当地永久定居，但「寻根」情怀延续至第三、四代。", "url": ""}, {"n": "闽南会馆（宗亲会）", "py": "Bân-lâm Huē-kuán (Tsong-tshin-huē)", "c": "🌏 侨乡与海外传播", "sc": "海外华人社群组织", "lv": "L2 特定地区俗", "rg": ["新加坡", "马来西亚", "印尼", "菲律宾", "东南亚闽南社群", "泉州", "漳州", "厦门"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "全年（定期会员活动；重大节庆时集体举办）", "intro": "闽南会馆与宗亲会是海外闽南华人为维系同乡情谊、互助共济而建立的社群组织，也是闽南方言、习俗、信仰在海外延续的重要载体。按地域可分「同乡会」（如「福建会馆」「永春会馆」），按姓氏可分「宗亲会」（如「陈氏宗亲会」「林氏宗亲会」），是海外华人社会结构的基石。", "items": "会馆建筑（常附设神庙、义学、义冢）；族谱、会员册；会馆历年活动档案；神明（供奉共同信仰神明）", "steps": "1. 建立阶段（历史）：早期过番华侨抵达南洋后，同籍乡亲自发聚集，共同出资建立会馆；初建时常同时建神庙（供奉家乡守护神）。\n2. 功能运作：提供新移民落脚庇护；协助医疗、找工作；义冢（华人公墓）管理；华语（闽南语）教育（义学）。\n3. 现代功能转型：联谊与文化传承；组织节庆活动（春节、中元节、神明诞辰）；推动对中国及台湾的商业与文化联结。\n4. 寻根活动：定期组织会员返乡寻根参访，联结海外闽南华人与故乡。\n5. 族谱编修：宗亲会定期联合国内外族人编修族谱，维系宗族认同跨越国界。", "taboo": "（社群组织类，无特定仪式禁忌；惟会馆内神庙祭拜适用一般庙宇礼节）", "story": "新加坡福建会馆（1840年创立）是东南亚历史最悠久、规模最大的闽南同乡组织，至今仍运营多所华文学校（如道南学校、爱同学校），是新加坡华文教育的重要支柱。马来西亚槟城的「五大姓」（郑、谢、林、陈、邱）各有宗祠和宗亲组织，形成独特的五大姓聚落与宗族文化。东南亚各地闽南会馆在当地华人社会中长期担任非正式「行政」功能（解决纠纷、慈善救济），与当地政府相辅相成。现代会馆功能逐渐转向文化传承与商业网络，许多第三、四代华人通过宗亲会重新连结了对闽南文化的认同。", "diff": "新加坡：福建会馆规模最大，是新加坡华人社会的重要机构；马来西亚槟城：五大姓宗祠文化最具特色，世界文化遗产区内仍保存完整宗祠；印度尼西亚：泉州籍华人（尤以闽南人）在雅加达、棉兰等地有大型宗亲组织；菲律宾：闽南（福建）华商会馆历史悠久，马尼拉「唐人街」区域保留多个会馆。", "url": ""}, {"n": "峇峇娘惹文化", "py": "Bâ-bâ-niû-niû bûn-huà", "c": "🌏 侨乡与海外传播", "sc": "海峡华人融合文化", "lv": "L2 特定地区俗", "rg": ["新加坡", "马来西亚", "印尼"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "全年（节庆、婚礼、饮食日常）", "intro": "峇峇娘惹（Baba-Nyonya）是15至20世纪初在马来半岛（马六甲、槟城）和新加坡定居的早期华人（主要为闽南籍）与当地马来族通婚后代的统称：男性称「峇峇」（Baba），女性称「娘惹」（Nyonya）。他们形成了独特的融合文化——保留闽南祖先崇拜与节庆，同时融入马来语言、服饰、饮食，创造出东南亚最具代表性的华人融合文化。", "items": "峇峇娘惹服饰（Nyonya Kebaya：娘惹蜡染上衣配沙龙裙）；娘惹瓷器（青花与粉彩混合风格）；娘惹美食（叻沙、娘惹糕、仁当等）；闽南祖先牌位（保留中式祭祖）；娘惹珠绣绣品", "steps": "（非仪式性条目，以文化特征描述为主）\n1. 语言：峇峇语（Baba Malay）为闽南语与马来语的混合语，是峇峇娘惹的母语。\n2. 祭祖：保留闽南祖先崇拜，供奉祖先牌位、拜天公，以闽南礼俗为基础，融入马来装饰风格。\n3. 婚嫁：婚礼融合闽南传统礼俗与马来习俗，持续多日，仪式繁复，是峇峇娘惹文化的集中展现。\n4. 饮食：娘惹料理以闽南烹调技法融合马来香料，形成独特风味（叻沙、娘惹粽、娘惹糕等）。\n5. 服饰：娘惹Kebaya以精细手工刺绣（或珠绣）装饰，配搭沙龙，融合东西方美学。\n6. 器皿：娘惹瓷器（Peranakan Ware）以粉红色为主调，融合中式纹样与马来、欧洲元素，是世界级收藏品类。", "taboo": "（融合文化条目，遵从闽南祖先崇拜基本礼节）", "story": "峇峇娘惹文化形成于明清时代闽南移民与马来半岛本地人通婚的历史过程。由于早期移民以男性为主，娶当地妇女为妻，后代在双重文化浸润下形成独特的混合认同。峇峇娘惹长期以英语（后期）和马来语作为日常语言，但坚持闽南式祖先崇拜，在殖民地时代的英属马来亚中享有较高社会地位（因善用英语，与英国殖民者关系较好）。马六甲、槟城、新加坡的峇峇娘惹博物馆保存了大量文物。槟城峇峇娘惹传统已获 UNESCO 文化遗产关注。近年「娘惹」文化因新加坡电视剧《小娘惹》（2008、2020年翻拍）的播出重获全球华人社区关注。", "diff": "马六甲：最早形成峇峇娘惹聚落，马六甲鸡场街保存完整峇峇屋（传统大宅）；槟城：峇峇娘惹聚落与文化遗产保存极佳，乔治市世界文化遗产区内有峇峇娘惹博物馆；新加坡：新加坡晶美娘惹博物馆（Peranakan Museum）为全球最重要的峇峇娘惹文化博物馆；印度尼西亚：爪哇一带亦有「土生华人」（Peranakan）文化，与马来亚峇峇娘惹略有不同。", "url": ""}, {"n": "发糕（huat-kué）", "py": "Huat-kué", "c": "🍜 饮食民俗", "sc": "节庆糕点", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★ 在地媒体与机构网站", "tm": "全年（年节、喜庆时最盛；春节、开市、乔迁必备）", "intro": "发糕（闽南语：huat-kué）是闽南最重要的节庆糕点之一，以在来米浆或糯米浆加糖发酵蒸制而成，表面自然开裂成「笑口」（开花）形，寓意「发财」「好彩头」「笑口常开」。「huat」即「发」，发糕是春节、开业、乔迁、满月等喜庆场合的必备供品与赠礼，在闽南文化中地位极重要。", "items": "在来米（或糯米）；红砂糖（或黑糖）；酵母（或老面）；红色食用色素（表面点红色）；蒸笼", "steps": "1. 磨浆：将在来米浸水后磨成细浆（或使用在来米粉）。\n2. 加糖：加入红砂糖或黑糖，搅拌溶解；加入酵母（或老面），充分混合。\n3. 发酵：将米浆置于温暖处静置发酵数小时至膨胀起泡（发酵程度影响成品「笑口」大小）。\n4. 入模：将发酵米浆倒入底衬红色糯米纸（或红纸）的模具中（约八分满）。\n5. 蒸制：放入大蒸笼，大火蒸约25至30分钟。\n6. 观「笑口」：蒸制过程中表面自然开裂成花瓣状（「笑」），开裂越大越吉利。\n7. 点红：出笼后在「笑口」处点上红色食用色素，增添喜气。\n8. 供奉：用于祭神供祖、拜天公，或赠送亲友，象征共享「发」气。", "taboo": "发糕蒸制过程中不可掀盖（影响发酵与笑口）；蒸好的发糕不可说「失败」「没发」等不吉之语；发糕出笼若未开花（「笑口」），民间认为不吉（需重新制作，不可用于祭祀）；发糕不可作为丧葬祭品（红色喜庆物不适合用于白事）。", "story": "发糕「笑口」的形成是科学与民俗完美结合的例子：蒸制时表面先凝固，而内部米浆受热膨胀，顶破已凝固的表面，形成自然开裂的「笑口」。开裂越大，代表发酵程度好、发糕「发」得好，与「发财」的吉意完美契合。发糕在闽南文化中几乎是「喜庆」的同义词，无论拜神、开市、做生日都少不了。东南亚闽南华人将发糕带入南洋，马来西亚、新加坡的发糕（Huat Kueh）已成为当地新年必购糕点，在超市与老字号糕饼铺大量出售。", "diff": "泉州、漳州：传统发糕以在来米浆制作，红糖发糕为主；台湾：台湾发糕风味多样，有原味、红糖、芋头、紫薯等创意口味；新加坡、马来西亚：发糕（Huat Kueh）是新年必备，市售发糕有多种尺寸，大型发糕常见于开市典礼。", "url": ""}, {"n": "菜头粿（萝卜糕／煎馃）", "py": "Tshài-thâu-kué (Loh-bak-kóe / Tsian-kué)", "c": "🍜 饮食民俗", "sc": "传统糕点小食", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★ 在地媒体与机构网站", "tm": "全年（冬至、春节尤盛；日常小食）", "intro": "菜头粿（闽南语：tshài-thâu-kué，菜头即萝卜）是以白萝卜丝与在来米浆混合蒸制而成的传统糕点，是闽南与粤港最普遍的年节食品之一。蒸好后可直接食用（「白粿」），或切片用油煎至表面金黄香脆（「煎馃」），是早餐、点心或年节祭品的百搭食物。「菜头」闽南语与「好彩头」谐音，因此冬至与春节时菜头粿是必备祭品。", "items": "白萝卜（大量，刨丝）；在来米粉；水；盐；白胡椒；虾米（可选）；腊肠或香菇（可选）；猪油或食用油（煎制用）", "steps": "1. 备料：白萝卜洗净刨丝，加盐略腌出水，挤干备用。\n2. 调浆：在来米粉加冷水搅匀成生浆（生粉水）。\n3. 炒料：热锅加油，将虾米、腊肠、香菇（选用）炒香，加入萝卜丝翻炒至软，加盐、白胡椒调味。\n4. 混合：将炒好的萝卜丝趁热倒入生粉水中（利用余热使部分淀粉糊化），快速搅拌均匀成糊状。\n5. 蒸制：将米糊倒入涂油的模具（方形浅盘），置入蒸锅大火蒸40至50分钟至完全凝固。\n6. 放凉：取出后室温放凉，可冷藏定型（更易切片）。\n7. 煎馃：切成约1至1.5厘米厚片，热平底锅加较多油，将粿片两面煎至金黄酥脆（「煎馃」）。\n8. 上桌：可搭配酱油膏、辣椒酱食用；祭祀时整块蒸好即可供奉。", "taboo": "（饮食类，无特定礼俗禁忌；惟用于祭祀时须保持整洁，不可已有切口）", "story": "菜头粿是闽南「物尽其用」饮食智慧的体现——白萝卜是冬季大宗蔬菜，价廉易得，以米浆结合萝卜丝蒸制成糕，既延长保存期，又产生新的风味。「菜头」的闽南语发音近似「好彩头」（好运气），使其在冬至与春节中不仅是食物，也是吉祥象征。新加坡、马来西亚的菜头粿（Chai Tow Kway）已发展出独特的「黑（甜）」与「白（咸）」两种炒法，是当地最受欢迎的小贩中心食物之一，与闽南原版略有不同但一脉相承。", "diff": "泉州、漳州：菜头粿以蒸食与简单香煎为主，少有加酱油炒制；台湾：萝卜糕（菜头粿）是年货必备，煎法多样；新加坡、马来西亚：Chai Tow Kway发展出黑（加甜酱油）、白（不加酱油）两种炒法，已成为独立菜系；香港：「萝卜糕」亦极普及，以广府风味为主，与闽南版配料略异。", "url": ""}, {"n": "麻粩（炸枣）", "py": "Muâ-láu (Tsia-tsó)", "c": "🍜 饮食民俗", "sc": "传统油炸糕点", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "全年（节庆、祭祀时必备；年节、喜庆、丧礼皆用）", "intro": "麻粩（闽南语：muâ-láu）又称「炸枣」，是闽南经典油炸糕点，以糯米粉团裹包甜馅（豆沙、花生糖等），外滚芝麻或爆米香（「米芳」），入锅炸至金黄膨胀，外脆内软，是祭祀供品、喜庆零食及礼盒伴手礼的常见选项。外型圆润讨喜，寓意「团圆」「圆满」。", "items": "糯米粉；水；糖（调团用）；豆沙馅或花生糖粉（内馅）；白芝麻或爆米香（外裹）；食用油（大量，炸制用）", "steps": "1. 调团：糯米粉加温水、少量糖揉成光滑面团，分成小剂子。\n2. 包馅：将小剂子压扁，包入豆沙馅或花生糖粉，收口捏紧，搓圆。\n3. 裹层：将糯米团表面均匀沾湿（手沾水），在白芝麻或爆米香中来回滚裹，使表面均匀附着。\n4. 静置：裹好芝麻的糯米球静置10至15分钟（让芝麻粘牢）。\n5. 炸制：锅中倒入大量食用油，中温（约160至170°C）下锅，以「保温炸法」慢炸——初入锅不翻动，待糯米球浮起后，不断轻翻使受热均匀，炸至表面金黄（约8至12分钟）。\n6. 出锅：捞出沥油，放凉后食用（放凉后外皮更酥脆）。", "taboo": "油温不可过高（表面焦糊而内部未熟）；炸制过程中不可用铲强压（糯米球易碎）；制作时忌讳捏出「尖形」（须保持圆润球形，圆形寓意圆满）。", "story": "麻粩的「炸枣」别称来自其油炸后外形膨胀、浑圆如枣的外观。闽南传统糕点铺（饼铺）是麻粩的重要产地，在节庆前后大量生产供应。有趣的是，麻粩虽以「麻」（芝麻）命名，但部分地区也以「爆米香」（米芳）代替芝麻裹层，产生不同口感。麻粩既是喜事礼品，也是丧事祭品，闽南礼俗中几乎「万用」——年节拜拜用、结婚喜庆用、丧礼普渡亦用，是真正横跨喜丧两用的传统糕点。", "diff": "泉州、漳州：各地饼铺均有生产，口味以传统芝麻外层为主；台湾：炸枣在台湾乡村庙会摊贩及传统饼铺仍常见，但都市年轻人较陌生；新加坡、马来西亚：闽南华人传统点心铺保留炸枣制作，但规模缩小；现代：手工麻粩/炸枣有向特色伴手礼转型的趋势，部分品牌推出精装礼盒。", "url": ""}, {"n": "闽南咸粥", "py": "Bân-lâm kiâm-muê", "c": "🍜 饮食民俗", "sc": "日常饮食", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾"], "st": "🟢 已验证", "cr": "★★ 在地媒体与机构网站", "tm": "全年（日常早餐、夜市小食）", "intro": "闽南咸粥（闽南语：kiâm-muê）是以稀饭为基底、加入鲜蚵（牡蛎）、虾、猪肉片、芹菜等海鲜料熬制的咸味稀饭，是闽南最具代表性的日常饮食之一。闽南咸粥有别于广式「煲粥」（米粒煮至完全融化），保留米粒颗粒感，汤头鲜香，是泉州、厦门、台湾台南等地早餐及夜市的重要食物，折射出闽南沿海渔业文化与日常饮食风貌。", "items": "白米（在来米为佳）；鲜蚵（牡蛎）；鲜虾；猪肉片（或肉燥）；虾米；芹菜；油葱酥（炸红葱头）；柴鱼（可用于熬底汤）；盐、酱油、白胡椒", "steps": "1. 熬粥底：白米洗净，加大量清水（比例约1:8至1:10）煮成稀米粥，保留米粒颗粒感（不宜过烂）。\n2. 准备配料：鲜蚵洗净备用；猪肉片以酱油、太白粉腌制；虾米泡发；芹菜切末；炸好油葱酥备用。\n3. 炒香料：热锅加油，将虾米炒香，加入猪肉片快炒变色，加入高汤（或水）煮沸。\n4. 加入粥底：将炒好的料汇入粥底中，大火煮沸，调整浓稠度与咸淡（加盐、白胡椒）。\n5. 烫蚵：将鲜蚵直接下入沸粥中，快速烫熟（约30秒至1分钟，不可过久以免蚵仔老缩）。\n6. 上桌：盛碗后撒上芹菜末、油葱酥，淋少许酱油，即可食用。", "taboo": "（日常饮食类，无特定礼俗禁忌）", "story": "闽南咸粥是闽南人「靠海吃海」生活方式的典型体现。鲜蚵是台湾、泉州、厦门沿海的重要养殖贝类，产量大、价格亲民，自然成为平民咸粥的主角。台南的「蚵仔咸粥」（以鲜蚵为主料）已发展为台南最具代表性的早餐文化，与台南碗粿、米糕并列为「台南早餐三宝」。台南蚵仔咸粥通常在传统市场或庙口摊贩供应，清晨四五点即开始营业，候队人潮常见，是台南人的集体饮食记忆。厦门及泉州的咸粥风味与台南版略有不同——大陆版更重视芹菜末与油葱酥的香气层次，台南版鲜蚵份量更为慷慨。", "diff": "台南：蚵仔咸粥最为著名，鲜蚵份量充足，是台南早餐文化的核心；泉州：咸粥（稀饭）在早餐摊普及，配料以虾米、肉燥为主，鲜蚵量较少；厦门：厦门稀饭文化接近台南版，强调海鲜鲜味；漳州：咸粥较简朴，配料以肉燥、花生为常见。", "url": ""}, {"n": "泉州花灯", "py": "Tsuân-tsiu hue-ting", "c": "🏡 传统建筑与工艺", "sc": "节庆工艺", "lv": "L2 泉州", "rg": ["泉州", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历正月十五元宵节（制作始于腊月）", "intro": "泉州花灯是中国著名的传统花灯，以刻纸（剪纸）、针刺纸、彩绘、宫灯等多种技法制成，造型精美、色彩绚烂。每逢元宵节，泉州城内悬灯结彩，西街、中山路花灯连绵数里，号称「天下上元，灯烛之盛，无逾闽中」，是全国最具规模的元宵花灯展之一，2008年列入国家级非遗名录。", "items": "竹篾（骨架）；宣纸或彩纸（灯面）；刻纸刀、针（刻纸与针刺工艺）；颜料；蜡烛或LED灯泡；丝线（装饰流苏）", "steps": "1. 设计：确定花灯造型（宫灯、走马灯、动物灯、故事灯等）与纹样。\n2. 制骨架：用竹篾依造型弯曲扎绑成立体骨架，接口用细铁丝固定。\n3. 糊纸：将宣纸或薄纸糊于骨架外，形成灯面。\n4. 刻纸/针刺：在灯面上用刻纸刀刻出镂空纹样，或用针密集刺孔形成图案（透光后呈现精细花纹）。\n5. 彩绘：在灯面绘制人物、花鸟、吉祥纹样，填色渲染。\n6. 装饰：加装流苏、彩带、转动构件（走马灯）等。\n7. 安灯：元宵节前悬挂于家门、庙宇、街道，点灯展示。", "taboo": "花灯悬挂方向有讲究（正面须朝外）；宗教场所花灯须注意纹样（不可用凶煞图案）；制作花灯过程中忌说不吉利的话。", "story": "泉州花灯历史可追溯至唐代，唐玄宗时泉州已有「上元张灯」的记载。宋代泉州花灯达到鼎盛，苏轼曾写诗赞泉州灯节之盛。泉州花灯以「刻纸糊灯」最具特色——通过密集的镂空刻纸，使灯光透过纸面呈现精细的光影图案，这是泉州独有的工艺。现存最具代表性的泉州花灯艺人有李尧宝（已故）一脉，其刻纸花灯技艺被称为「绝世之作」。", "diff": "泉州：花灯规模最大，元宵节花灯展吸引数十万游客，刻纸花灯最具代表性；台湾：台湾元宵灯节亦盛大，台南「盐水蜂炮」与台北「平溪天灯」是各地花灯节的变体；新加坡、马来西亚：华人新村与庙宇元宵节悬挂花灯，部分泉州样式仍有保留；海外：泉州花灯曾多次参加海外展览，是对外文化交流的重要载体。", "url": ""}, {"n": "尾牙", "py": "Bué-gê", "c": "🎉 岁时节庆", "sc": "牙祭习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历十二月十六", "intro": "尾牙是闽南一年最后一次土地公祭（牙祭），商家祭拜福德正神后宴请员工，是年底最重要的酬谢宴席。鸡头朝向的员工意味着可能被解雇，此俗在台湾演变为年度企业尾牙宴文化。", "items": "三牲（猪、鸡、鱼）或五牲、发糕、水果、香烛、金纸；酒席食物", "steps": "1. 农历十二月十六，商家于土地公神龛前摆设供品（与头牙相同）。2. 祭拜完毕后，雇主宴请全体员工，称吃尾牙。3. 酒席上有整只白斩鸡，雇主将鸡头朝向来年不续约的员工，以此暗示（有此俗者少数）。4. 席间发放年终奖金或礼品。5. 散席后各自回家准备过年。", "taboo": "尾牙宴不可先散席；受邀者不可无故缺席（失礼）；鸡头禁忌需慎用（恐伤感情）。", "story": "尾牙之尾指年末收尾，是一年牙祭的终结。历史上闽南商行在尾牙宴上结算账目、发放薄酬，雇佣关系在新年后重新确认。鸡头朝向被辞员工之俗虽在现代社会已基本废除，但仍是台湾流行文化中的知名典故。", "diff": "泉州、漳州：商家保留做尾牙习俗，但尾牙宴规模较小；台湾：尾牙宴已演变为全台企业年度盛事，常有艺人表演，媒体争相报道；新加坡、马来西亚：华商商家保留做牙习俗，称福德正神诞。", "url": "https://app.notion.com/p/3731313e55f381dd9727f6c74dcd69de"}]);
DATA = DATA.concat([{"n": "送神（谢灶）", "py": "Sàng-sîn (Siā-tsàu)", "c": "🎉 岁时节庆", "sc": "过年习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "农历十二月廿四", "intro": "腊月廿四，灶神（灶君）及各路神明上天述职，向玉皇大帝汇报人间善恶。闽南家户在灶台前备甜食祭拜送神，盼灶神在天庭说好话、报吉祥，是闽南过年周期的正式起点。", "items": "麦芽糖、汤圆、甜粿、水果、香烛、金纸（四方金）；部分地区备甘蔗一对（供神明骑乘上天）", "steps": "1. 腊月廿四傍晚，于灶台前或神明桌摆设供品，以甜食为主（麦芽糖、汤圆），意在甜嘴，让灶神上天多说好话。2. 全家上香祭拜，恭送灶神及诸神升天。3. 焚化神马（纸马）及金纸，象征神明乘马上天。4. 送神后撤下旧灶神画像，待初四接神时再换新。5. 送神后即可开始大扫除（掸尘）。", "taboo": "供品忌用荤腥（送神为素祭）；麦芽糖亦有封嘴之意，切勿在神明面前说坏话；送神后至接神前，神龛可暂时空置，不宜随意摆放杂物。", "story": "灶神信仰源于上古火神崇拜，秦汉时灶神已成为家庭守护神。宋代以后，腊月送灶、正月接灶的习俗定型。闽南灶神称「灶君」或「司命灶君」，神像多为一对夫妇（灶君与灶神娘）。用麦芽糖祭灶，一说是粘住灶神嘴巴，使其「上天言好事，下界降吉祥」。", "diff": "泉州、漳州：送神日期为腊月廿四；台湾：部分地区沿用官府旧例，官廿三民廿四，即「官三民四」，腊月廿三或廿四送神均有；新加坡、马来西亚：保留送神习俗，甜食供品与闽南本土相同。", "url": "https://app.notion.com/p/3731313e55f3815d97f0cd9c2966246a"}, {"n": "掸尘（送神后大扫除）", "py": "Tán-hún (Tàng-sìn āu tuā-sàu-tshù)", "c": "🎉 岁时节庆", "sc": "过年习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "农历十二月廿四至除夕前", "intro": "送神后（腊月廿四起）至除夕前，闽南家户进行全屋彻底大扫除，称「掸尘」。扫去一年的灰尘与晦气，为新年迎接好运打扫干净，是过年前不可省略的仪式性清洁。", "items": "扫帚、长柄掸尘棒（绑布或竹枝）、抹布、脸盆；部分地区用芙蓉枝或竹枝作掸尘棒，取「除旧」之意", "steps": "1. 送神后（腊月廿四起）择吉日开始大扫除，须在除夕前完成。2. 以长柄掸尘棒扫去墙角、屋顶、门框上的蜘蛛网与积尘。3. 清洗门窗、家具、神明桌、祖先牌位。4. 整理收纳杂物，丢弃破旧物品。5. 扫完后不得再将垃圾扫入屋内。6. 除夕前完成，正月初一起严禁扫地。", "taboo": "掸尘须在神明送走后进行，不可在神明在家时清扫（怕冒犯神明）；正月初一至初三严禁扫地、倒垃圾（扫走财运）；不可将灰尘直接往门外扫（须先收集再集中处理）。", "story": "掸尘习俗源于「腊日」清洁除秽的古礼。「尘」与「陈」谐音，扫尘即扫陈，除去旧年一切不好的事物，迎接新一年的开始。闽南俗谚：「送神送到上西天，掸尘掸到年底边」，说明掸尘与送神是过年周期中相互衔接的两件大事。", "diff": "各地大扫除的时间不完全统一，但均须在除夕前完成；台湾民间有择吉日扫尘的习惯，通常在腊月廿四至廿八之间；新加坡、马来西亚华人家庭保留此俗，称「春节大扫除」。", "url": ""}, {"n": "贴春联", "py": "tiap chhun-liân", "c": "🎉 岁时节庆", "sc": "年节习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "农历除夕（腊月三十）", "intro": "春联是闽南年俗核心元素之一，除夕前家家户户在门框、厅堂张贴红纸黑字或金字对联，祈求新年平安吉祥。闽南春联内容多以福禄寿喜、渔农商贸为主题。闽南贴春联形制独特，家中有三年内丧事者，当年须用白纸或绿纸春联，以示哀思。", "items": "红纸对联（上联、下联、横批）、门心、浆糊或双面胶、剪刀", "steps": "1. 除夕上午打扫门庭，清洗门框。\n2. 撕去旧春联，清除残胶。\n3. 选购或书写新对联（上联、下联、横批、门心）。\n4. 大门两侧各贴一幅对联，横批贴于门楣，门心贴于门板中央。\n5. 厅堂可加贴「春」字或「福」字斗方。\n6. 猪舍、仓库、水井等处亦贴专属小联。", "taboo": "家中三年内有丧者不贴红联，改贴白/绿/紫纸；新联贴好前不可扯破；横批与上联位置不可颠倒（上联贴右侧）。", "story": "贴春联源于古代桃符习俗，宋代开始以纸代木，元明后普及全国。闽南贴春联形制独特，金门、漳州一带还保留「春条」传统，将吉语小纸条贴于农具、牲畜旁。", "diff": "泉州：春联外还贴「护门符」；漳州：部分农村习惯在除夕夜贴；台湾：城市多购买印刷品；新加坡、马来西亚：闽南华人保留此俗，内容多加入「生意兴隆」等商业祝语。", "url": "https://app.notion.com/p/3731313e55f38101a77fede1fedb5da9"}, {"n": "围炉", "py": "Uî-lô", "c": "🎉 岁时节庆", "sc": "年节团圆 / 除夕家宴", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚"], "st": "🟢 已验证", "cr": "★★★★ 国家省级非遗与方志", "tm": "农历除夕夜", "intro": "除夕夜全家人围坐在同一张桌子吃年夜饭，称为「围炉」。桌上必有几道固定菜色：整条鱼（年年有余）、猪肠猪肚（长长久久、有肠有肚）、韭菜（长寿）、年糕或菜头粿（步步高升）。出门在外的家人若无法赶回，仍要在桌上留一副碗筷，代表家人心意相连。", "items": "整条鱼、猪肠或猪肚、韭菜、芹菜、菜头（萝卜）、年糕或菜头粿、长年菜（芥菜或菠菜）、米酒、米饭、香烛、金纸、压岁钱红包", "steps": "1. 选日备料：除夕当天上午，家人分工采买食材。必备菜色：整条鱼（不切、不翻面上桌）、猪肠或猪肚、韭菜、芹菜、菜头（萝卜）、年糕或菜头粿、长年菜（芥菜或菠菜）。\n2. 清洁家宅：下午完成全屋大扫除，但除夕傍晚开始不可再扫地，以免将财气扫出门。\n3. 祭祖神：入夜前先在公妈厅上香，向神明与祖先禀报新年将至，燃烧金纸、敬酒三巡。\n4. 备桌围坐：晚餐桌上若有家人未能返家，仍须留一副碗筷，象征心意相连。长辈坐上位，晚辈依序入坐，不可提前动筷。\n5. 长辈开席：由家中最年长者先动筷，说一句吉祥话，众人才开始用餐。\n6. 不翻鱼：整条鱼端上桌后只吃一面，不可翻面，翻鱼象征「翻船」不吉利。\n7. 守岁（可选）：饭后一家人守在一起看电视或聊天至深夜，长辈发压岁钱给晚辈。", "taboo": "席间不能空位，在外的家人需留碗筷；打破器皿要说「岁岁平安」；鱼不能翻面，要说「顺过来」；不催促他人离席。", "story": "围炉源于中国古代除夕祭祖、合家团圆的传统。闽南人称除夕夜为「过年暝」，全家围坐火炉旁共食，象征家族凝聚与温暖。火炉在农业社会中兼具驱寒与祭祀的功能，后逐渐演化为强调家庭团圆的节庆仪式。", "diff": "台湾围炉菜色偏向炸食、卤肉饭；闽南本地（泉漳厦）则重视「全鱼」「全鸡」象征完整；海外华人社区（新加坡、马来西亚）常简化为火锅形式。", "url": "https://app.notion.com/p/3681313e55f3807bb81ef463fadf9d51"}, {"n": "开口吉（开嘴吉）", "py": "Khui-tshuì-kiat", "c": "🏠 宗族与日常礼节", "sc": "新年礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "正月初一清晨", "intro": "正月初一起床后，第一句开口的话必须是吉祥语，称「开口吉」或「开嘴吉」。若一早说出不吉利的话，被认为会影响全年运势。长辈会提前叮嘱孩子，家中也会互相提醒。", "items": "无需特定物品；部分家户在床头或门口贴「开口见喜」红纸条作提醒", "steps": "1. 除夕夜睡前，家长叮嘱家中成员：明日起床第一句话须说吉祥语。2. 正月初一起床后，开口即说：「新年好」「恭喜发财」「万事如意」「新年大吉」等。3. 晚辈向长辈拜年，长辈回应并发红包（压岁钱）。4. 出门拜访亲友时，见面先说吉祥话再寒暄。5. 全日避免说「破」「死」「输」「坏」「病」「鬼」等字眼。", "taboo": "初一全日忌说负面词汇（死、破、穷、坏、病、输、鬼等）；打破碗碟须说「岁岁平安」化解；哭泣被视为不吉，家中有小儿哭闹须安抚；不可催促他人、不可说「完了」「没了」。", "story": "开口吉的习俗体现了闽南人重视「言语力量」的信仰观——语言本身具有召唤现实的力量，吉祥话说出口即有成真的可能。此俗与「讨吉利」文化密切相关，闽南语中大量日常用语都有避讳替换词，如「猪肝」称「猪大利」（大利谐音）。", "diff": "各地吉祥语内容略有不同：泉州惯说「新正大吉，恭喜发财」；台湾常用国语「新年快乐」混合闽南语；新加坡、马来西亚保留较完整的闽南语拜年用语，如「新年好，万事如意」。", "url": ""}, {"n": "正月初一诸禁忌", "py": "Tsiann-gue̍h tshe-it tsū-kim-kì", "c": "🏠 宗族与日常礼节", "sc": "新年禁忌", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "正月初一全日", "intro": "闽南正月初一有一套完整的禁忌体系，涵盖饮食、劳作、财务、语言各方面。核心逻辑是：初一的行为象征全年状态，因此要全力「守好」这一天，避免任何可能招来霉运的举动。", "items": "（禁忌为行为规范，无需物品；食物须于除夕备好，初一不开灶）", "steps": "【饮食】1. 全日吃斋（素食），不杀生、不动荤腥，表示慈悲开年。2. 不开灶生火，食物除夕前备好（或吃冷食、素食）。\n【劳作】3. 不扫地、不倒垃圾（财运留在家中，初五后才可扫）。4. 不动剪刀、针线、菜刀（剪断财路、断姻缘）。5. 不洗衣（流走财运）。\n【财务】6. 不花钱、不动钱财（初一破财，全年漏财）。7. 不讨债、不还债（逼债者全年遭讨，还债者财运流失）。\n【行为】8. 不打骂孩童（初一哭声不吉）。9. 不催促、不争吵、不说不吉利的话。10. 不午睡（初一睡懒觉，全年懒散）。", "taboo": "以上各条本身即为禁忌。若不慎违犯，有化解说法：打破碗碟说「岁岁平安」；不小心说了不吉利的话，赶快说「童言无忌」；意外流血，说「红红火火」。", "story": "闽南初一禁忌体系折射出「象征同构」的民俗思维：初一的行为与全年命运同构，扫地即扫财，花钱即漏财，动刀即伤运。这套逻辑贯穿整个闽南禁忌文化，也是闽南人对新年第一天高度重视的集体表现。不开灶的习俗还有另一层解释：让灶神（除夕前刚送走）回来之前，灶台得到一天的休息。", "diff": "台湾：部分城市年轻族群已不严格遵守，但不扫地、不花钱仍是最广泛遵守的两条；新加坡、马来西亚：闽籍华人家庭大多保留吃斋、不扫地、不花钱三项核心禁忌；金门：禁忌执行较为严格，老一辈仍完整遵守全套。", "url": ""}, {"n": "出行迎财神（行好脚步）", "py": "Tshut-hîng gîng Tsâi-sîn (Kiânn hó kha-pōo)", "c": "🎉 岁时节庆", "sc": "过年习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟡 部分完成", "cr": "★★ 在地媒体与机构网站", "tm": "正月初一清晨", "intro": "正月初一清晨，闽南家户按当年黄历所示吉利方向出门「行好脚步」，走几步再返家，象征踏出好运、迎接财神。有些家户会到附近庙宇上头香，以抢得新年第一炷香为吉。", "items": "香烛（赴庙上头香用）；红包（压岁钱，随身携带散财）；部分地区带橘子出门（橘与「吉」谐音）", "steps": "1. 初一清晨，查阅黄历或请长辈告知当年吉利出行方向（财神方位）。2. 穿上新衣、新鞋，代表新气象。3. 面朝吉利方向迈出几步（「行好脚步」），再折返家中。4. 部分家庭赶赴附近庙宇争抢「头香」（第一炷香），以求全年蒙神庇佑。5. 回家后长辈给晚辈发压岁钱（红包），晚辈说吉祥话道谢。", "taboo": "出行方向忌朝凶方（黄历所示不吉方向）；出门时忌回头（回头则运势折返）；不可空手出门再空手回（出门带吉祥物，回来带「财气」）。", "story": "行好脚步习俗源于「出行」仪式，相信人在特定时间、特定方向踏出的第一步具有象征力量。闽南人将财神信仰与出行方向结合，认为朝财神所在方位出行，可以将财神引回家中。争抢庙宇头香的习俗在台湾尤为盛行，著名庙宇如台南大天后宫、台北行天宫在初一零时便人潮汹涌。", "diff": "泉州、漳州：行好脚步以家庭为单位进行，较为低调；台湾：争抢头香的习俗极为流行，各大庙宇初一零时人山人海，媒体竞相报道；新加坡、马来西亚：部分华人家庭保留此俗，但多与华人庙宇拜拜结合。", "url": ""}, {"n": "初二回娘家", "py": "Tshe-jī tńg-kheh", "c": "🏠 宗族与日常礼节", "sc": "新年礼俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "正月初二", "intro": "正月初二是出嫁女儿携夫婿回娘家拜年的固定日，称「回娘家」或「做客」。初一不得回（规矩），初二才是正日。娘家备丰盛饭菜款待，女婿须带礼品，岳家赠红包回礼。", "items": "礼品（糕饼、罐头、补品、水果各一对，须成双）；红包（女婿给岳家长辈）；岳家备办酒席", "steps": "1. 正月初二，出嫁女儿与丈夫携子女，备好礼品回娘家。2. 礼品须成双（一对对，忌单数）。3. 到娘家后，向父母、长辈拜年，呈上礼品。4. 娘家设酒席款待，以丰盛为敬。5. 女婿向岳父岳母敬茶、说吉祥话，岳家长辈回赠红包。6. 日落前须离开娘家返回婆家（不可在娘家过夜）。", "taboo": "初一不可回娘家（民俗说法：初一回娘家，会把娘家财运带走）；礼品忌单数、忌奇数；不可空手而去；日落前须离开（留宿娘家不吉）。", "story": "初二回娘家的习俗，体现了闽南传统社会中对出嫁女儿身份的界定——她已是「别家之人」，只能在特定日子以「客人」身份回家。此俗也是旧时代女性与原生家庭维系情感的重要机会。现代社会中，此俗仍广泛保留，但「日落前须离开」的限制在城市中已逐渐淡化。", "diff": "泉州、漳州：初二回娘家规矩严格，礼品讲究成双；台湾：初二回娘家已成全台共识，这一天高速公路塞车，被称为「返乡潮」的一部分；新加坡、马来西亚：闽籍华人保留此俗，但娘家若在外地则以视频拜年代替；各地娘家款待方式不同，但酒席款待的核心不变。", "url": ""}, {"n": "初三忌门（赤狗日）", "py": "Tshe-sann kì-mn̂g (Tshiah-káu-ji̍t)", "c": "🎉 岁时节庆", "sc": "过年习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "正月初三", "intro": "闽南视正月初三为「赤狗日」，赤狗为凶神，主口舌、争吵。此日不宜出门拜年，不宜宴请宾客，留在家中休息，避免与人发生争执，是新年假期中少数以「静」为主的一天。", "items": "无特定供品；部分地区于初三傍晚「烧门神纸」，送走旧门神", "steps": "1. 正月初三，尽量留在家中，不出门拜年（不招待来客，来客也会理解）。2. 家人之间避免争论、抬杠，以和为贵。3. 部分地区于初三傍晚举行「烧门神纸」仪式：将除夕贴上的旧门神纸取下，一并焚化，送旧门神离任。4. 当天适合在家整理、休息，准备初四接神。", "taboo": "忌出门拜年（赤狗所到，易生口舌是非）；忌宴请宾客；忌争吵、动怒；忌动刀（延续初一禁忌）；部分地区忌说「赤狗日」三字，以免招来不吉。", "story": "赤狗日的起源说法不一。一说源于民间传说：正月初三是「穷神」生日，请穷神走（「送穷」），这一天若出门，会把穷神带走，带到别人家，引起邻里不快。另一说源于古代岁时占卜，初三日干支为凶，不宜活动。台湾民间更流行的说法是：初三「老鼠娶亲」，人不宜打扰，要早早熄灯就寝。", "diff": "泉州、漳州：初三忌门习俗较完整，大多数家庭不出门拜年；台湾：初三在台湾还有「老鼠娶亲日」之说，民间在初三夜早早就寝，并在墙角撒米，不扰老鼠；新加坡、马来西亚：部分闽籍家庭保留初三在家的习俗，但商业社会中已有所淡化。", "url": ""}, {"n": "初四接神", "py": "Tshe-sì tsiap-sîn", "c": "🎉 岁时节庆", "sc": "过年习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群", "全球闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "正月初四", "intro": "腊月廿四送走的众神，于正月初四从天庭述职完毕，返回人间各自岗位。闽南家户于初四备供品、燃鞭炮，恭迎灶神及诸路神明归位，称「接神」。接神后家中方算诸神归位、新年圆满。", "items": "三牲（猪、鸡、鱼）或五果、汤圆、甜食、香烛、金纸；新的灶神画像（换贴于灶台上方）；鞭炮", "steps": "1. 正月初四傍晚（通常为下午四时后），在神明桌及灶台前摆设供品。2. 全家上香，恭迎众神归来。3. 将新灶神画像贴于灶台上方，取代腊月廿四取下的旧像。4. 燃放鞭炮，声势越大越表示欢迎诚意。5. 焚化金纸，礼毕。6. 接神后禁止搬移家具（神明刚回位，不可打扰安置）。", "taboo": "接神前不可在灶台前乱放杂物（神明归位处须洁净）；接神后当日不可搬移家具或大动土木；鞭炮须在户外燃放，不可在室内；接神仪式须在傍晚前完成（过了子时为初五，接神已迟）。", "story": "送神与接神构成闽南年节信仰的完整循环。送神象征神明离开监察岗位，人间短暂「无神管束」；接神则象征秩序与庇护重新降临。民间也因此有「送神风，接神雨」的气象谚语，意为送神日多风、接神日多雨，以天象呼应神明出行与归来。", "diff": "泉州、漳州：接神日期为初四，与送神（廿四）呼应；台湾：大多数地区亦为初四接神，但部分地区为初五；商家接神后方开始准备初五「开市」（隔开）；新加坡、马来西亚：闽籍华人普遍保留接神仪式，尤以在庙宇供职者最为重视。", "url": ""}, {"n": "初五隔开（开市大吉）", "py": "Tshe-gōo keh-khui (Khui-tshī tuā-kiat)", "c": "🎉 岁时节庆", "sc": "过年习俗", "lv": "L1 共通闽南俗", "rg": ["泉州", "漳州", "厦门", "金门", "台湾", "新加坡", "马来西亚", "东南亚闽南社群"], "st": "🟡 部分完成", "cr": "★★★ 学术专著与期刊", "tm": "正月初五", "intro": "正月初五称「隔开」，意为隔断了新年头四天的各项禁忌，从此日起恢复正常生活作息。商家于初五正式「开市」，燃放鞭炮，祭拜财神，期望新年生意兴隆。初五后扫地、花钱等禁忌解除。", "items": "三牲（猪、鸡、鱼）、发糕、水果、香烛、金纸；鞭炮（开市用，越响越吉利）；红包（员工开工利是）", "steps": "1. 正月初五清晨，商家于店门前摆设供品，祭拜财神（或土地公）。2. 燃放鞭炮，宣告正式开市营业。3. 老板向员工发开工红包（利是），员工互道「开市大吉」「生意兴隆」。4. 家户于初五起可恢复扫地、倒垃圾（须从屋内往外扫，象征向外「扫进」财运）。5. 初五后可正常花钱，日常生活完全恢复。", "taboo": "开市鞭炮不可中途停止（响到底才吉利）；开市当天忌说不吉利的话；员工忌无故缺席开市仪式；扫地方向须由内往外扫（初五起可扫，但方向与平日相反，仍象征扫进财运）。", "story": "「隔开」之名源于「隔断禁忌」，是新年禁忌期的正式结束节点。初五也是「路头神」（财神）的生日，故商家在此日开市，有向财神「报到」的意义。传统上，商家开市前后燃放鞭炮的长短与响度，被视为该年生意好坏的预兆，因此商家都尽量燃放最长、最响的鞭炮。", "diff": "泉州、漳州：初五隔开，商家开市；台湾：部分商家择初五，部分择初二、初三（因竞争需要提早开市），各地不一，但鞭炮开市的仪式感仍在；新加坡、马来西亚：初五开市习俗保留完整，华人商圈在初五可见大规模鞭炮（或电子鞭炮）开市场面。", "url": ""}, {"n": "清水祖师信仰", "py": "Tshing-tsuí Tsóo-su sìn-îng", "c": "🙏 民间信仰", "sc": "地方保护神 / 安溪移民信仰", "lv": "L2 次区域俗", "rg": ["泉州", "厦门", "台湾"], "st": "🟢 已验证", "cr": "★★★ 学术专著与期刊", "tm": "农历正月初六清水祖师圣诞", "intro": "清水祖师本名陈昭应，北宋安溪人，出家后在安溪清水岩修行，以苦行和行医济民著称，圆寂后被奉为神明。其造像特征为黑脸（相传为苦修
